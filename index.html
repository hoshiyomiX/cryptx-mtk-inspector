// Validate fix against actual file contents and render appropriately
function validateAndRenderFix(rc){
  if(!rc.fix || !rc.fix.trim()){
    return { html: '', noEditNeeded: false };
  }

  // Parse fix text to extract target file and additions
  const lines = rc.fix.split('\n');
  let targetFile = null;
  let additions = [];
  let removals = [];
  let context = [];
  let fileSections = []; // Track multiple FILE: sections

  for(const line of lines){
    // Detect file pattern
    const fileMatch = line.match(/^(?:FILE|file|File)[:\s]+(.+)$/);
    if(fileMatch){
      // If we already have a file section, save it before starting new one
      if(targetFile && (additions.length > 0 || context.length > 0)){
        fileSections.push({ file: targetFile, additions: [...additions], context: [...context] });
        additions = [];
        context = [];
      }
      targetFile = fileMatch[1].trim();
      continue;
    }

    // Track additions
    if(line.startsWith('+') && !line.startsWith('++')){
      additions.push(line.substring(1).trim());
    }
    // Track removals
    else if(line.startsWith('-') && !line.startsWith('--')){
      removals.push(line.substring(1).trim());
    }
    // Track context
    else if(line.trim() && !line.match(/^(FILE|file|File):/)){
      context.push(line.replace(/^#\s*/, '').trim());
    }
  }

  // Save last file section
  if(targetFile && (additions.length > 0 || context.length > 0)){
    fileSections.push({ file: targetFile, additions: [...additions], context: [...context] });
  }

  // For multi-file fixes, use simplified rendering without file validation
  if(fileSections.length > 1){
    // Multi-file fix - render each section separately
    return { html: renderMultiFileDiff(fileSections, rc.fix), noEditNeeded: false };
  }

  // Extract service name from evidence if available
  let serviceName = null;
  if(rc.evidence && rc.evidence.length > 0){
    for(const e of rc.evidence){
      // Match "service_name: class xxx" pattern
      const svcMatch = e.match(/^([^:\s]+):\s*class/);
      if(svcMatch){
        serviceName = svcMatch[1];
        break;
      }
      // Also match "service_name:" pattern for other issues
      const svcMatch2 = e.match(/^([^:\s]+):/);
      if(svcMatch2 && !serviceName){
        serviceName = svcMatch2[1];
      }
    }
  }

  // Also look for service names in the fix text itself
  if(!serviceName){
    for(const line of lines){
      const svcMatch = line.match(/service\s+(\S+)\s+\//);
      if(svcMatch){
        serviceName = svcMatch[1];
        break;
      }
    }
  }

  // If we have a target file, check if additions already exist
  if(targetFile && additions.length > 0){
    const snippet = getActualFileSnippet(targetFile, 50, serviceName);
    if(snippet.exists && snippet.content){
      // For class-related issues, check if the SPECIFIC service has the correct class
      const isClassFix = additions.some(a => a.trim().startsWith('class '));

      if(isClassFix){
        // Class fixes require serviceName to validate properly
        if(serviceName){
          // Find the service in the file and check its class
          const serviceRegex = new RegExp(`service\\s+${serviceName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\s`, 'i');
          const fileLines = snippet.content.split('\n');
          let serviceStartIdx = -1;
          let currentClass = null;

          // Find service definition
          for(let i = 0; i < fileLines.length; i++){
            if(serviceRegex.test(fileLines[i])){
              serviceStartIdx = i;
              // Look for class line within next 20 lines
              for(let j = i; j < Math.min(i + 20, fileLines.length); j++){
                const classMatch = fileLines[j].match(/^\s*class\s+(\S+)/);
                if(classMatch){
                  currentClass = classMatch[1];
                  break;
                }
                // Stop if we hit another service definition
                if(j > i && /^\s*service\s+\S+\s+\//.test(fileLines[j])){
                  break;
                }
              }
              break;
            }
          }

          // Extract the expected class from additions
          const expectedClassMatch = additions.find(a => a.trim().startsWith('class '));
          const expectedClass = expectedClassMatch ? expectedClassMatch.trim().replace('class ', '').trim() : null;

          // Check if the service already has the correct class
          if(expectedClass && currentClass === expectedClass){
            return { html: '', noEditNeeded: true, reason: `Service '${serviceName}' already has class '${expectedClass}' in ${snippet.path}` };
          }

          // Service exists but class is wrong/missing - show diff
          return {
            html: renderSmartDiff(snippet, additions, removals, context, targetFile, serviceName),
            noEditNeeded: false
          };
        } else {
          // Class fix but no serviceName - can't validate, show diff directly
          return {
            html: renderSmartDiff(snippet, additions, removals, context, targetFile, null),
            noEditNeeded: false
          };
        }
      }

      // Non-class fixes: check if additions already exist anywhere (with exact match)
      const allPresent = additions.every(add => {
        const cleanAdd = add.trim();
        // Use exact match to avoid false positives
        return lineExistsInFile(snippet.content, cleanAdd, true);
      });

      if(allPresent){
        return { html: '', noEditNeeded: true, reason: `All required changes already present in ${snippet.path}` };
      }

      // Show actual file content with diff
      return {
        html: renderSmartDiff(snippet, additions, removals, context, targetFile, serviceName),
        noEditNeeded: false
      };
    }
  }

  // Fallback to standard diff rendering
  return { html: renderGitHubDiff(rc.fix), noEditNeeded: false };
}

// Render multi-file diff with proper file separation
function renderMultiFileDiff(fileSections, rawFix){
  let html = '';

  for(const section of fileSections){
    html += '<div class="diff-body">';
    html += `<div class="diff-file-header">
      <span class="mi" style="font-size:16px">description</span>
      <span style="flex:1">${esc(section.file)}</span>
      <span class="md-chip" style="font-size:10px;background:var(--md-tertiary)20;color:var(--md-tertiary)">Suggested</span>
    </div>`;

    // Show context lines
    for(const ctx of section.context){
      if(ctx.trim()){
        html += `<div class="diff-line diff-context"><span class="diff-line-num"></span>${esc(ctx)}</div>`;
      }
    }

    // Show additions
    for(const add of section.additions){
      if(add.trim()){
        html += `<div class="diff-line diff-add"><span class="diff-line-num"></span><span class="diff-add-text">${esc(add)}</span></div>`;
      }
    }

    html += '</div>';
  }

  return html;
}

// Render diff with actual file content context
function renderSmartDiff(snippet, additions, removals, context, targetFile, serviceName){
  let html = '<div class="diff-body">';

  // Show actual file header
  html += `<div class="diff-file-header">
    <span class="mi" style="font-size:16px">description</span>
    <span style="flex:1">${esc(snippet.path)}</span>
    <span class="md-chip" style="font-size:10px;background:var(--md-primary)20;color:var(--md-primary)">Actual file</span>
  </div>`;

  // If we have a service name, find and show lines around that service
  if(serviceName && snippet.lines){
    let serviceLineIdx = -1;
    const searchPattern = new RegExp(`service\\s+${serviceName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\s`, 'i');
    
    for(let i = 0; i < snippet.lines.length; i++){
      if(searchPattern.test(snippet.lines[i])){
        serviceLineIdx = i;
        break;
      }
    }

    if(serviceLineIdx >= 0){
      // Show lines around the service definition
      const startLine = Math.max(0, serviceLineIdx);
      const endLine = Math.min(snippet.lines.length, serviceLineIdx + 20);
      
      for(let i = startLine; i < endLine; i++){
        const line = snippet.lines[i];
        const lineNum = i + 1;
        
        // Stop at next service definition
        if(i > serviceLineIdx && /^\s*service\s+\S+\s+\//.test(line)){
          break;
        }
        
        // Check if line is the class line (for removal)
        const isClassLine = line && /^\s*class\s+/.test(line);
        
        if(isClassLine){
          // Show as removal (red)
          html += `<div class="diff-line diff-remove">
            <span class="diff-line-num">${lineNum}</span>
            <span><span class="diff-remove-text">-</span>${esc(line)}</span>
          </div>`;
        } else {
          // Show as context (gray)
          html += `<div class="diff-line diff-context">
            <span class="diff-line-num">${lineNum}</span>
            <span>${esc(line)}</span>
          </div>`;
        }
      }
    } else {
      // Service not found, show last few lines
      const existingLines = snippet.lines.slice(-10);
      let lineNum = Math.max(1, snippet.lines.length - 10);
      for(const line of existingLines){
        if(line !== undefined && line !== null){
          html += `<div class="diff-line diff-context">
            <span class="diff-line-num">${lineNum}</span>
            <span>${esc(line)}</span>
          </div>`;
          lineNum++;
        }
      }
    }
  } else {
    // No service name, show last few lines of file
    const existingLines = (snippet.lines || []).slice(-10);
    let lineNum = Math.max(1, (snippet.lines || []).length - 10);
    for(const line of existingLines){
      if(line !== undefined && line !== null){
        html += `<div class="diff-line diff-context">
          <span class="diff-line-num">${lineNum}</span>
          <span>${esc(line)}</span>
        </div>`;
        lineNum++;
      }
    }
  }

  // Show what needs to be added
  if(additions.length > 0){
    for(const add of additions){
      html += `<div class="diff-line diff-add">
        <span class="diff-line-num">+</span>
        <span><span class="diff-add-text">+</span>${esc(add)}</span>
      </div>`;
    }
  }

  html += '</div>';
  return html;
}

      l=l.replace(/(metadata_encryption=\S+)/gi,'<span class="hl-r">$1</span>');

      if(line.trim().startsWith('#'))l=`<span class="hl-cm">${l}</span>`;

    h+=`</pre></details>`;

  el.innerHTML=h;

}

// ===== DECRYPT FLOW — BUILT FROM ACTUAL INIT DATA =====

function renderFlowTab(){

  const tee=S.tee.type,sig=TEE_DB[tee],bc=S.boardConfig.all;

  const dataE=S.fstab.flatMap(f=>f.entries).filter(e=>e.mount==='/data');

  const chk=id=>{const c=S.checks.find(c=>c.id===id);return c?c.ok:false;};

  const allRC=Object.entries(S.fileContents).filter(([p])=>p.endsWith('.rc'));

  const teeSvcs=S.initServices.filter(s=>s.isTEE);

  const kmSvcs=S.initServices.filter(s=>s.isCrypto);

  const gkSvcs=S.initServices.filter(s=>s.isGK);

  // Parse actual on-triggers and imports from init.rc files

  const initTriggers=[];

  const initImports=[];

  for(const[fp,content] of allRC){

    if(!content)continue;

    const lines=content.split('\n');

    for(let i=0;i<lines.length;i++){

      const t=lines[i].trim();

      if(t.startsWith('on ')){

        // Gather all actions under this trigger

        const actions=[];

        for(let j=i+1;j<lines.length;j++){

          const al=lines[j];

          if(!al.match(/^\s/)&&al.trim().length>0&&!al.trim().startsWith('#'))break;

          if(al.trim().length>0&&!al.trim().startsWith('#'))actions.push(al.trim());

        }

        initTriggers.push({trigger:t,actions,file:fp.split('/').pop(),line:i+1});

      }

      if(t.startsWith('import ')){

        initImports.push({path:t.replace('import ','').trim(),file:fp.split('/').pop(),line:i+1});

      }

    }

  }

  // Build dynamic flow steps from ACTUAL parsed data

  const steps=[];

  // === STEP 1: Recovery Boot & Init Imports ===

  const rcFiles=allRC.map(([p])=>p.split('/').pop());

  steps.push({

    t:'Recovery Boot',

    d:`init loads ${rcFiles.length} .rc file${rcFiles.length!==1?'s':''}`,

    st:'pass',

    dt:rcFiles.length>0?rcFiles.join(', '):'No .rc files found',

    ico:'restart_alt',

    details:[

      ...initImports.slice(0,6).map(im=>`import ${im.path} (${im.file}:${im.line})`),

      ...(initImports.length>6?[`... +${initImports.length-6} more imports`]:[])

    ]

  });

  // === STEP 2: Fstab Parse ===

  const fstabFiles=S.fstab.map(f=>f.path.split('/').pop());

  const dataEntry=dataE[0];

  steps.push({

    t:'Parse Fstab',

    d:S.fstab.length>0?`Found: ${fstabFiles.join(', ')}`:'No fstab files in tree!',

    st:chk('fstab_exists')&&chk('fstab_data')?'pass':'fail',

    dt:dataEntry?`/data → ${dataEntry.fs} | device: ${dataEntry.device}`:'No /data mount point found!',

    ico:'table_chart',

    details:dataEntry?[

      `Mount: ${dataEntry.mount} → ${dataEntry.fs}`,

      `Device: ${dataEntry.device}`,

      dataEntry.fbe?`fileencryption=${dataEntry.fbeSpec||'yes'}`:null,

      dataEntry.metaEnc?`metadata_encryption=${dataEntry.metaSpec||'yes'}`:null,

      dataEntry.wrapped?'wrappedkey_v0':null,

      dataEntry.inline?'inlinecrypt':null,

      dataEntry.keyDir?`keydirectory=${dataEntry.keyDir}`:null,

    ].filter(Boolean):['No /data entry']

  });

  // === STEP 3: Encryption Detection ===

  const encType=dataEntry?.fbe?'FBE':dataEntry?.forced?'FDE':'None';

  steps.push({

    t:'Detect Encryption',

    d:`/data encryption: ${encType}`,

    st:chk('fstab_fbe')?'pass':chk('fstab_data')?'warn':'fail',

    dt:dataEntry?.fbe?`FBE cipher: ${dataEntry.fbeSpec||'detected'}${dataEntry.metaEnc?' + metadata_encryption':''}${dataEntry.wrapped?' + wrappedkey':''}`

      :dataEntry?.forced?'Legacy FDE (forceencrypt)':'No encryption flags on /data',

    ico:'enhanced_encryption',

    details:dataEntry?[

      `Raw flags: ${dataEntry.flags.substring(0,120)}${dataEntry.flags.length>120?'...':''}`

    ]:[]

  });

  // === STEP 4: Crypto Config ===

  const isModern=!bc['TW_INCLUDE_CRYPTO']&&!bc['TW_INCLUDE_CRYPTO_FBE']&&dataE.some(e=>e.fbe);

  const cryptoFlags=Object.entries(S.boardConfig.crypto);

  steps.push({

    t:'Crypto Configuration',

    d:isModern?'Modern build: auto-detected from fstab':'Legacy build: BoardConfig flags',

    st:chk('bc_crypto')&&chk('bc_fbe')?'pass':chk('bc_crypto')||chk('bc_fbe')?'warn':'fail',

    dt:isModern?'TWRP/OF auto-detects crypto from fstab — no flags needed'

      :(cryptoFlags.length>0?cryptoFlags.map(([k,v])=>`${k}=${v}`).join(' | '):'No crypto flags in BoardConfig!'),

    ico:'settings',

    details:[

      ...cryptoFlags.map(([k,v])=>`${k} := ${v}`),

      isModern?'✓ Modern build: TW_INCLUDE_CRYPTO not required':null,

      bc['TW_USE_FSCRYPT_POLICY']?`TW_USE_FSCRYPT_POLICY := ${bc['TW_USE_FSCRYPT_POLICY']}`:null,

    ].filter(Boolean)

  });

  // === STEP 5: hwservicemanager ===

  const hwsvcTriggers=initTriggers.filter(t=>t.actions.some(a=>/hwservicemanager|start\s+hwservicemanager/i.test(a)));

  const hwsvcRefs=initTriggers.filter(t=>t.trigger.includes('hwservicemanager'));

  steps.push({

    t:'hwservicemanager',

    d:'HIDL/AIDL service manager for HAL registration',

    st:'pass',

    dt:'Auto-started by recovery binary (always available)',

    ico:'dns',

    details:[

      'Recovery binary starts hwservicemanager internally',

      ...hwsvcRefs.map(t=>`Trigger "${t.trigger}" in ${t.file}:${t.line}`),

      ...hwsvcTriggers.map(t=>`${t.file}:${t.line} → ${t.actions.find(a=>/hwservice/i.test(a))||t.actions[0]}`)

    ]

  });

  // === STEP 6: TEE Daemon(s) — FROM ACTUAL INIT.RC ===

  if(teeSvcs.length>0){

    for(const svc of teeSvcs){

      const bc_=S.binaryChecks.find(b=>b.svc.name===svc.name);

      const binOk=bc_&&(bc_.status==='found'||bc_.status==='copied');

      const triggerInfo=svc.triggers.length>0

        ?svc.triggers.map(t=>`${t.action} by "${t.trigger}" in ${t.file.split('/').pop()}`).join('; ')

        :(svc.disabled?'DISABLED — no trigger found!':'Starts on class '+svc.className);

      steps.push({

        t:`TEE: ${svc.name}`,

        d:`${svc.file.split('/').pop()}:${svc.line} → ${svc.binary}`,

        st:binOk?(svc.disabled&&svc.triggers.length===0?'warn':'pass'):'fail',

        dt:binOk

          ?`Binary: ${bc_.detail} | ${triggerInfo}`

          :`BINARY NOT FOUND: ${svc.binary}`,

        ico:TEE_DB[svc.teeType]?.icon||'shield',

        details:[

          `Service: ${svc.name}`,

          `Binary: ${svc.binary}`,

          `Class: ${svc.className||'(none)'}`,

          `User: ${svc.user||'root'} | Group: ${svc.group||'root'}`,

          svc.disabled?'⚠ disabled':'✓ enabled',

          svc.seclabel?`SELabel: ${svc.seclabel}`:'⚠ No seclabel',

          ...svc.triggers.map(t=>`Trigger: ${t.action} on "${t.trigger}"`),

          ...svc.props.filter(p=>!['disabled','oneshot','override'].includes(p)&&!p.startsWith('class ')&&!p.startsWith('user ')&&!p.startsWith('group ')&&!p.startsWith('seclabel ')&&!p.startsWith('writepid ')).map(p=>`Prop: ${p}`),

          `File: ${svc.file}:${svc.line}`,

          bc_?`Binary status: ${bc_.status} — ${bc_.detail}`:'Binary check: N/A',

        ]

      });

    }

    // TrustKernel: check tee-supplicant pair

    if(tee==='trustkernel'){

      const hasSup=S.initServices.some(s=>/tee[-_]supplicant/i.test(s.name+s.binary));

      if(!hasSup){

        steps.push({

          t:'tee-supplicant (MISSING!)',

          d:'TrustKernel requires tee-supplicant alongside teed',

          st:'fail',dt:'NOT FOUND — teed cannot operate without tee-supplicant',

          ico:'link_off',details:['TrustKernel TEE needs both teed and tee-supplicant','Add service tee-supplicant /vendor/bin/tee-supplicant to init.rc']

        });

      }

    }

  }else{

    steps.push({

      t:'TEE Daemon',

      d:tee!=='unknown'?`${sig.name} detected but NO daemon service in init.rc!`:'No TEE daemon found in any init.rc',

      st:'fail',

      dt:tee!=='unknown'?`Expected: ${sig.daemons.join(' or ')}`:'Cannot decrypt without TEE daemon',

      ico:'shield',

      details:tee!=='unknown'?[

        `Detected TEE type: ${sig.name} (${S.tee.confidence}% confidence)`,

        `Expected daemon: ${sig.daemons.join(' or ')}`,

        `Expected binary: /vendor/bin/${sig.daemons[0]}`,

        'Fix: Add TEE daemon service to init.recovery.*.rc'

      ]:['No TEE type detected — check init.rc files for TEE-related services']

    });

  }

  // === STEP 7: Keymaster HAL(s) — FROM ACTUAL INIT.RC ===

  if(kmSvcs.length>0){

    for(const svc of kmSvcs){

      const bc_=S.binaryChecks.find(b=>b.svc.name===svc.name);

      const binOk=bc_&&(bc_.status==='found'||bc_.status==='copied');

      const triggerInfo=svc.triggers.length>0

        ?svc.triggers.map(t=>`${t.action} by "${t.trigger}"`).join('; ')

        :(svc.disabled?'DISABLED — no trigger!':'Starts on class '+svc.className);

      steps.push({

        t:`Keymaster: ${svc.name}`,

        d:`${svc.file.split('/').pop()}:${svc.line} → ${svc.binary}`,

        st:binOk?(svc.disabled&&svc.triggers.length===0?'warn':'pass'):'fail',

        dt:binOk?`Binary OK | ${triggerInfo}`:`BINARY NOT FOUND: ${svc.binary}`,

        ico:'vpn_key',

        details:[

          `Service: ${svc.name}`,

          `Binary: ${svc.binary}`,

          `Class: ${svc.className||'(none)'}`,

          `User: ${svc.user||'system'} | Group: ${svc.group||'system'}`,

          svc.disabled?'⚠ disabled':'✓ enabled',

          svc.seclabel?`SELabel: ${svc.seclabel}`:'⚠ No seclabel',

          ...svc.triggers.map(t=>`Trigger: ${t.action} on "${t.trigger}"`),

          `File: ${svc.file}:${svc.line}`,

          bc_?`Binary: ${bc_.status} — ${bc_.detail}`:'',

        ].filter(Boolean)

      });

    }

  }else{

    steps.push({

      t:'Keymaster HAL',

      d:'No keymaster/keymint service found in any init.rc!',

      st:'fail',

      dt:'Cannot derive encryption keys without keymaster',

      ico:'vpn_key',

      details:['No service matching keymaster/keymint/km pattern found',

        tee!=='unknown'?`For ${sig.name}, expected: ${sig.kmBins[0]||'keymaster HAL binary'}`:'',

        'Fix: Add keymaster HAL service to init.recovery.*.rc'].filter(Boolean)

    });

  }

  // === STEP 8: Security Patch Level ===

  const propPatch=S.props.all['ro.build.version.security_patch']||S.props.all['ro.vendor.build.security_patch']||'';

  const bcPatch=bc['PLATFORM_SECURITY_PATCH']||'';

  const patchMatch=!propPatch||!bcPatch||propPatch===bcPatch;

  steps.push({

    t:'Security Patch Validation',

    d:'Keymaster uses PLATFORM_SECURITY_PATCH for key derivation',

    st:bcPatch?(patchMatch?'pass':'fail'):'fail',

    dt:bcPatch

      ?(patchMatch?`${bcPatch}${propPatch?' (matches props)':''}`:`MISMATCH! BoardConfig: ${bcPatch} vs Props: ${propPatch}`)

      :'PLATFORM_SECURITY_PATCH NOT SET — key derivation will fail!',

    ico:'calendar_today',

    details:[

      bcPatch?`BoardConfig: PLATFORM_SECURITY_PATCH := ${bcPatch}`:'BoardConfig: NOT SET!',

      bc['PLATFORM_VERSION']?`PLATFORM_VERSION := ${bc['PLATFORM_VERSION']}`:'PLATFORM_VERSION: not set',

      propPatch?`Props: ro.build.version.security_patch=${propPatch}`:'Props: no security_patch prop',

      bc['VENDOR_SECURITY_PATCH']?`VENDOR_SECURITY_PATCH := ${bc['VENDOR_SECURITY_PATCH']}`:'',

      !bcPatch?'Fix: Set PLATFORM_SECURITY_PATCH to match stock ROM (adb shell getprop ro.build.version.security_patch)':'',

      !patchMatch?'Fix: Make BoardConfig and prop file values match exactly':'',

    ].filter(Boolean)

  });

  // === STEP 9: Gatekeeper(s) — FROM ACTUAL INIT.RC ===

  if(gkSvcs.length>0){

    for(const svc of gkSvcs){

      const bc_=S.binaryChecks.find(b=>b.svc.name===svc.name);

      const binOk=bc_&&(bc_.status==='found'||bc_.status==='copied');

      steps.push({

        t:`Gatekeeper: ${svc.name}`,

        d:`${svc.file.split('/').pop()}:${svc.line} → ${svc.binary}`,

        st:binOk?'pass':'warn',

        dt:binOk?`Binary OK`:`Binary not found (optional for decrypt)`,

        ico:'lock_person',

        details:[`Service: ${svc.name}`,`Binary: ${svc.binary}`,`File: ${svc.file}:${svc.line}`,

          bc_?`Status: ${bc_.status} — ${bc_.detail}`:'']

      });

    }

  }else{

    steps.push({

      t:'Gatekeeper',d:'No gatekeeper service (optional — needed for lockscreen credentials)',

      st:'warn',dt:'Not found. Decrypt may still work if no lockscreen password is set.',

      ico:'lock_person',details:['Gatekeeper validates PIN/password during decrypt','If device has no lockscreen, decrypt works without it']

    });

  }

  // === STEP 10: Key Derivation (aggregate) ===

  const teeReady=teeSvcs.length>0&&S.binaryChecks.some(b=>b.svc.isTEE&&(b.status==='found'||b.status==='copied'));

  const kmReady=kmSvcs.length>0&&S.binaryChecks.some(b=>b.svc.isCrypto&&(b.status==='found'||b.status==='copied'));

  const patchReady=!!bcPatch;

  const blockers=[!teeReady&&'TEE daemon',!kmReady&&'Keymaster',!patchReady&&'Security patch'].filter(Boolean);

  steps.push({

    t:'Key Derivation',

    d:'TEE derives FBE/FDE keys via keymaster HAL',

    st:blockers.length===0?'pass':'fail',

    dt:blockers.length===0?'All prerequisites met — keys can be derived'

      :`BLOCKED by: ${blockers.join(', ')}`,

    ico:'key',

    details:[

      `TEE daemon: ${teeReady?'✓ Ready':'✗ Not ready'}`,

      `Keymaster: ${kmReady?'✓ Ready':'✗ Not ready'}`,

      `Patch level: ${patchReady?'✓ Set':'✗ Not set'}`,

      blockers.length>0?`Fix: resolve ${blockers.join(', ')} first`:'All clear for key derivation',

    ]

  });

  // === STEP 11: Mount /data ===

  const fbeReady=dataE.some(e=>e.fbe);

  const cryptoReady=chk('bc_crypto')&&chk('bc_fbe');

  const allOk=teeReady&&kmReady&&patchReady&&fbeReady;

  const mountBlockers=[!teeReady&&'TEE',!kmReady&&'Keymaster',!patchReady&&'Patch',!fbeReady&&'FBE flags',!cryptoReady&&'Crypto config'].filter(Boolean);

  steps.push({

    t:'Mount /data (Decrypted)',

    d:'Apply fscrypt policy → mount decrypted /data partition',

    st:allOk?'pass':'fail',

    dt:allOk?'✅ /data mounted with decryption — recovery can access user data'

      :`❌ FAILED — blocked by: ${mountBlockers.join(' + ')}`,

    ico:'folder_open',

    details:allOk?['Decryption chain complete','OrangeFox/TWRP can access /data']:

      [...mountBlockers.map(b=>`✗ ${b}`), 'Recovery will show encrypted /data or stuck at splash']

  });

  // Find first failure for blocking

  let ff=-1;

  for(let i=0;i<steps.length;i++){if(steps[i].st==='fail'){ff=i;break;}}

  let h=`<div class="section-title"><span class="mi">lock_open</span> Decryption Flow</div>

    <div class="body-small" style="color:var(--md-on-surface-variant);margin-bottom:20px">

      Built from <strong>actual init.rc services & triggers</strong> found in this device tree. Red = failure point.

    </div>`;

  for(let i=0;i<steps.length;i++){

    const s=steps[i];

    const blocked=ff>=0&&i>ff;

    const st=blocked?'skip':s.st;

    const ico=st==='pass'?'check_circle':st==='fail'?'cancel':st==='warn'?'warning':'block';

    const stColor=st==='pass'?'var(--md-success)':st==='fail'?'var(--md-error)':st==='warn'?'var(--md-warning)':'var(--md-outline)';

    const delay=i*0.08;

    const isLast=i===steps.length-1;

    h+=`<div class="flow-step" style="animation-delay:${delay}s">

      <div class="flow-indicator">

        <div class="flow-dot ${st}"><span class="mi" style="font-size:18px">${ico}</span></div>

        ${!isLast?`<div class="flow-connector ${st}"></div>`:''}

      </div>

      <div class="flow-body">

        <div class="flow-body-card ${st}">

          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">

            <span class="mi" style="font-size:18px;color:${stColor}">${s.ico}</span>

            <span class="label-large">${esc(s.t)}</span>

            <span class="md-chip" style="font-size:10px;padding:2px 8px;background:${stColor}18;color:${stColor};border-color:${stColor}30">${st.toUpperCase()}</span>

          </div>

          <div class="body-small" style="color:var(--md-on-surface-variant)">${esc(s.d)}</div>

          <div class="path-text" style="margin-top:6px;color:${stColor}">${esc(s.dt)}</div>

          ${s.details&&s.details.length>0?`

          <details style="margin-top:8px">

            <summary class="label-small" style="cursor:pointer;color:var(--md-outline);display:flex;align-items:center;gap:4px">

              <span class="mi" style="font-size:14px">info</span> Details (${s.details.length})

            </summary>

            <div style="margin-top:6px;padding:8px 12px;border-radius:8px;background:color-mix(in srgb,${stColor} 4%,transparent);border:1px solid color-mix(in srgb,${stColor} 10%,transparent)">

              ${s.details.map(d=>`<div class="body-small mono" style="color:var(--md-on-surface-variant);padding:2px 0">${esc(d)}</div>`).join('')}

            </div>

          </details>`:''}

        </div>

      </div>

    </div>`;

  }

  if(ff>=0){

    h+=`<div class="issue-card issue-critical" style="margin-top:16px">

      <div class="title-small" style="color:var(--md-error)"><span class="mi" style="font-size:20px;vertical-align:middle">error</span> Decryption Chain Broken</div>

      <div class="body-small" style="margin-top:8px">Chain breaks at step <strong>${ff+1}: ${esc(steps[ff].t)}</strong></div>

      <div class="body-small" style="margin-top:4px;color:var(--md-error)">${esc(steps[ff].dt)}</div>

      ${steps[ff].details?`<div style="margin-top:8px;padding:10px 14px;border-radius:10px;background:color-mix(in srgb,var(--md-error) 6%,transparent)">

        ${steps[ff].details.map(d=>`<div class="body-small mono" style="color:var(--md-on-surface-variant)">${esc(d)}</div>`).join('')}

      </div>`:''}

      <div class="body-small" style="margin-top:8px;color:var(--md-on-surface-variant)">All ${steps.length-ff-1} subsequent steps are blocked. Fix this step first.</div>

    </div>`;

  }else if(steps.every(s=>s.st==='pass')){

    h+=`<div class="md-card" style="margin-top:16px;border-color:var(--md-success);background:color-mix(in srgb,var(--md-success) 6%,var(--md-surface-container))">

      <div class="title-small" style="color:var(--md-success)"><span class="mi" style="font-size:20px;vertical-align:middle">check_circle</span> Full Decryption Chain OK</div>

      <div class="body-small" style="margin-top:4px">All ${steps.length} steps pass. Decryption should work on this device tree.</div>

    </div>`;

  }

  document.getElementById('tab-flow').innerHTML=h;

}

function renderFilesTab(){

  let h=`<div class="files-layout">

    <div class="files-sidebar">

      <div class="label-large" style="margin-bottom:8px;color:var(--md-on-surface-variant)"><span class="mi" style="font-size:16px;vertical-align:middle">folder</span> Files</div>`;

  const cat=(l,f,ico)=>{if(!f.length)return '';

    let r=`<details ${['fstab','boardconfig','initrc'].includes(l.toLowerCase().replace(/\s/g,''))?'open':''}>

      <summary class="label-small" style="color:var(--md-outline);cursor:pointer;margin:8px 0 4px;display:flex;align-items:center;gap:4px"><span class="mi" style="font-size:14px">${ico}</span>${l} (${f.length})</summary>`;

    for(const fp of f)r+=`<div class="tree-item ${/fstab|boardconfig/i.test(fp)?'critical':''}" onclick="viewFile('${fp}')"><span class="mi" style="font-size:14px">description</span><span class="mono" style="font-size:11px;word-break:break-all">${fp.split('/').pop()}</span></div>`;

    return r+'</details>';};

  h+=cat('Fstab',S.files.fstab,'table_chart');

  h+=cat('BoardConfig',S.files.boardconfig,'settings');

  h+=cat('Init RC',S.files.initrc,'terminal');

  h+=cat('Properties',S.files.prop,'tune');

  h+=cat('Makefiles',S.files.mk,'build');

  h+=cat('SEPolicy',S.files.sepolicy,'security');

  h+=cat('XML',S.files.xml,'code');

  h+=cat('Config',S.files.conf,'settings_applications');

  h+=cat('Prebuilt',S.files.prebuilt.slice(0,40),'inventory');

  h+=cat('Other',S.files.other.slice(0,30),'draft');

  h+=`</div><div class="files-viewer"><div id="fileViewer" class="body-medium" style="color:var(--md-on-surface-variant);padding:20px">Select a file to view</div></div></div>`;

  document.getElementById('tab-files').innerHTML=h;

}

async function viewFile(path){

  const v=document.getElementById('fileViewer');

  v.innerHTML='<div style="display:flex;align-items:center;gap:8px;padding:20px"><div class="spinner" style="width:20px;height:20px"></div> Loading...</div>';

  const c=await fetchFileRaw(path);

  if(!c){v.innerHTML='<div style="color:var(--md-error);padding:20px">Failed to fetch</div>';return;}

  let h=`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--md-surface-container);border-bottom:1px solid var(--md-outline-variant);flex-wrap:wrap;gap:8px">

    <span class="path-text" style="color:var(--md-primary);font-weight:500">${esc(path)}</span>

    <button class="md-btn md-btn-tonal" style="padding:6px 14px;font-size:12px;flex-shrink:0" onclick="copyText(S.fileContents['${path}'])"><span class="mi" style="font-size:14px">content_copy</span></button></div>`;

  h+=`<pre class="code" style="max-height:500px;overflow-y:auto;border:none;border-radius:0;margin:0">`;

  c.split('\n').forEach((line,i)=>{

    let l=esc(line);

    l=l.replace(/(fileencryption|metadata_encryption|forceencrypt|wrappedkey|inlinecrypt|encryptable)/gi,'<span class="hl-r">$1</span>');

    l=l.replace(/(keymaster|gatekeeper|keymint|mobicore|trustonic|trustkernel|beanpod|microtrust|teei|isee|teed|mcDriverDaemon)/gi,'<span class="hl-r">$1</span>');

    l=l.replace(/(TW_INCLUDE_CRYPTO\w*|PLATFORM_\w+|VENDOR_SECURITY_\w+)/g,'<span class="hl-y">$1</span>');

    l=l.replace(/(service\s+\S+)/g,'<span class="hl-b">$1</span>');

    l=l.replace(/(\/vendor\/\S+|\/system\/\S+|\/dev\/\S+)/g,'<span class="hl-p">$1</span>');

    if(line.trim().startsWith('#'))l=`<span class="hl-cm">${l}</span>`;

    h+=`<span class="ln">${i+1}</span>${l}\n`;

  });

  h+=`</pre>`;v.innerHTML=h;

}

(function init(){

  initTheme();

  initTabs();

  initSwipe();

  const t=getToken();

  if(t){document.getElementById('tokenInput').value=t;updateTokenStatus(true);checkRateLimit();}

  else{updateTokenStatus(false);}

  if(location.hash){const u=decodeURIComponent(location.hash.slice(1));if(u.includes('github.com'))document.getElementById('repoInput').value=u;}

})();

</script>
