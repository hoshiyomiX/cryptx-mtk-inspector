<!DOCTYPE html>

<html lang="en" data-theme="dark">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CryptX v3.6 — MTK Decrypt Inspector</title>

<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Mono:wght@400;700&family=Google+Sans+Text:wght@400;500;700&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

<style>

:root,[data-theme="dark"]{

  --md-primary:#A8C7FA;--md-on-primary:#062E6F;--md-primary-container:#1B4D95;--md-on-primary-container:#D3E3FD;

  --md-secondary:#BEC6DC;--md-on-secondary:#283141;--md-secondary-container:#3E4759;--md-on-secondary-container:#DAE2F9;

  --md-tertiary:#D6BEE4;--md-on-tertiary:#3B2948;--md-tertiary-container:#533F60;--md-on-tertiary-container:#F2DAFF;

  --md-error:#FFB4AB;--md-on-error:#690005;--md-error-container:#93000A;--md-on-error-container:#FFDAD6;

  --md-surface:#111318;--md-on-surface:#E2E2E9;--md-surface-variant:#44474E;--md-on-surface-variant:#C4C6D0;

  --md-surface-dim:#111318;--md-surface-bright:#37393E;--md-surface-container-lowest:#0C0E13;

  --md-surface-container-low:#191C20;--md-surface-container:#1D1F25;--md-surface-container-high:#282A2F;

  --md-surface-container-highest:#33353A;--md-outline:#8E9099;--md-outline-variant:#44474E;

  --md-success:#A8DAB5;--md-on-success:#00391A;--md-success-container:#005228;

  --md-warning:#E6C446;--md-on-warning:#3C2F00;

  --md-inverse-surface:#E2E2E9;--md-inverse-on-surface:#2E3036;--md-inverse-primary:#415F91;

}

[data-theme="light"]{

  --md-primary:#415F91;--md-on-primary:#FFFFFF;--md-primary-container:#D3E3FD;--md-on-primary-container:#001D36;

  --md-secondary:#565F71;--md-on-secondary:#FFFFFF;--md-secondary-container:#DAE2F9;--md-on-secondary-container:#131C2B;

  --md-tertiary:#705574;--md-on-tertiary:#FFFFFF;--md-tertiary-container:#F9D8FE;--md-on-tertiary-container:#29132E;

  --md-error:#BA1A1A;--md-on-error:#FFFFFF;--md-error-container:#FFDAD6;--md-on-error-container:#410002;

  --md-surface:#F9F9FF;--md-on-surface:#191C20;--md-surface-variant:#E0E2EC;--md-on-surface-variant:#44474E;

  --md-surface-dim:#D9D9E0;--md-surface-bright:#F9F9FF;--md-surface-container-lowest:#FFFFFF;

  --md-surface-container-low:#F3F3FA;--md-surface-container:#EDEDF4;--md-surface-container-high:#E7E8EE;

  --md-surface-container-highest:#E1E2E8;--md-outline:#74777F;--md-outline-variant:#C4C6D0;

  --md-success:#1B6D30;--md-on-success:#FFFFFF;--md-success-container:#A4F4AF;

  --md-warning:#6D5E00;--md-on-warning:#FFFFFF;

  --md-inverse-surface:#2E3036;--md-inverse-on-surface:#F0F0F7;--md-inverse-primary:#A8C7FA;

}

*{box-sizing:border-box;margin:0;padding:0;}

::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-track{background:transparent;}

::-webkit-scrollbar-thumb{background:var(--md-outline-variant);border-radius:99px;}

html{scroll-behavior:smooth;}

body{background:var(--md-surface);color:var(--md-on-surface);font-family:'Google Sans Text','Google Sans',system-ui,sans-serif;min-height:100vh;transition:background .3s,color .3s;}

.mono{font-family:'Google Sans Mono',monospace;}

.mi{font-family:'Material Symbols Rounded';font-weight:normal;font-style:normal;font-size:20px;line-height:1;

  letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;word-wrap:normal;direction:ltr;

  -webkit-font-smoothing:antialiased;font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}

.mi-o{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}

.surface-2{background:color-mix(in srgb,var(--md-primary) 8%,var(--md-surface));transition:background .3s;}

.md-card{background:var(--md-surface-container);border-radius:24px;padding:24px;border:1px solid var(--md-outline-variant);transition:all .3s cubic-bezier(.4,0,.2,1);}

.md-card:hover{border-color:var(--md-outline);box-shadow:0 2px 6px 2px rgba(0,0,0,.15);}

.md-card-elevated{background:var(--md-surface-container-low);border-radius:24px;padding:24px;box-shadow:0 1px 3px 0 rgba(0,0,0,.3),0 4px 8px 3px rgba(0,0,0,.15);transition:all .3s cubic-bezier(.4,0,.2,1);}

.md-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:999px;border:none;cursor:pointer;font-family:inherit;font-weight:500;font-size:14px;transition:all .25s cubic-bezier(.4,0,.2,1);}

.md-btn-filled{background:var(--md-primary);color:var(--md-on-primary);}.md-btn-filled:hover{box-shadow:0 2px 6px rgba(0,0,0,.3);transform:translateY(-1px);}

.md-btn-tonal{background:var(--md-secondary-container);color:var(--md-on-secondary-container);}.md-btn-tonal:hover{opacity:.9;transform:translateY(-1px);}

.md-btn-outlined{background:transparent;color:var(--md-primary);border:1px solid var(--md-outline);}.md-btn-outlined:hover{background:color-mix(in srgb,var(--md-primary) 8%,transparent);}

.md-btn-icon{background:transparent;border:none;color:var(--md-on-surface-variant);cursor:pointer;padding:12px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;transition:all .25s cubic-bezier(.4,0,.2,1);}

.md-btn-icon:hover{background:var(--md-surface-container-highest);transform:scale(1.08);}

.md-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid var(--md-outline-variant);background:var(--md-surface-container-high);color:var(--md-on-surface-variant);white-space:nowrap;transition:all .2s;}

.chip-primary{background:color-mix(in srgb,var(--md-primary) 15%,transparent);color:var(--md-primary);border-color:color-mix(in srgb,var(--md-primary) 30%,transparent);}

.chip-secondary{background:color-mix(in srgb,var(--md-secondary) 15%,transparent);color:var(--md-secondary);border-color:color-mix(in srgb,var(--md-secondary) 30%,transparent);}

.chip-tertiary{background:color-mix(in srgb,var(--md-tertiary) 15%,transparent);color:var(--md-tertiary);border-color:color-mix(in srgb,var(--md-tertiary) 30%,transparent);}

.chip-error{background:color-mix(in srgb,var(--md-error) 15%,transparent);color:var(--md-error);border-color:color-mix(in srgb,var(--md-error) 30%,transparent);}

.chip-success{background:color-mix(in srgb,var(--md-success) 15%,transparent);color:var(--md-success);border-color:color-mix(in srgb,var(--md-success) 30%,transparent);}

.chip-warning{background:color-mix(in srgb,var(--md-warning) 15%,transparent);color:var(--md-warning);border-color:color-mix(in srgb,var(--md-warning) 30%,transparent);}

.md-input-outlined{width:100%;padding:16px 18px;background:transparent;border:1px solid var(--md-outline-variant);border-radius:16px;color:var(--md-on-surface);font-family:inherit;font-size:15px;transition:all .25s cubic-bezier(.4,0,.2,1);outline:none;}

.md-input-outlined:focus{border-color:var(--md-primary);border-width:2px;}

.title-large{font-size:24px;font-weight:500;line-height:32px;}

.title-medium{font-size:18px;font-weight:500;line-height:26px;}

.title-small{font-size:15px;font-weight:500;line-height:22px;}

.label-large{font-size:15px;font-weight:500;line-height:22px;}

.label-small{font-size:12px;font-weight:500;line-height:18px;letter-spacing:.3px;}

.body-medium{font-size:15px;line-height:22px;}

.body-small{font-size:13px;line-height:18px;}

.spinner{width:24px;height:24px;border:3px solid var(--md-outline-variant);border-top-color:var(--md-primary);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;}

@keyframes spin{to{transform:rotate(360deg)}}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.fade-in{animation:fadeIn .3s ease;}

.progress-bar{width:100%;height:6px;background:var(--md-surface-container-highest);border-radius:3px;overflow:hidden;}

.progress-fill{height:100%;background:var(--md-primary);border-radius:3px;transition:width .3s;}

.path-text{word-break:break-all;overflow-wrap:anywhere;font-family:'Google Sans Mono',monospace;font-size:12px;}

.section-title{font-size:17px;font-weight:500;margin-bottom:18px;display:flex;align-items:center;gap:10px;color:var(--md-on-surface);}

.token-card{margin-top:16px;padding:20px;border-radius:20px;background:var(--md-surface-container);border:1px solid var(--md-outline-variant);transition:all .2s;}

.token-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}

.token-input-wrap{flex:1;min-width:200px;position:relative;}

.token-input-wrap .mi{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--md-outline);font-size:20px;}

.common-tree-card{margin-top:20px;padding:20px 24px;border-radius:24px;background:color-mix(in srgb,var(--md-tertiary) 6%,var(--md-surface-container));border:1px solid color-mix(in srgb,var(--md-tertiary) 20%,transparent);transition:all .2s;}

/* MD3 EXPRESSIVE - Theme FAB */

.md-fab-theme{
  position:fixed;
  top:16px;
  right:20px;
  z-index:200;
  width:56px;
  height:56px;
  border-radius:16px;
  background:var(--md-primary-container);
  border:none;
  box-shadow:0 3px 5px -1px rgba(0,0,0,.2),0 6px 10px 0 rgba(0,0,0,.14),0 1px 18px 0 rgba(0,0,0,.12);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .25s cubic-bezier(.4,0,.2,1);
}
.md-fab-theme:hover{
  box-shadow:0 5px 5px -3px rgba(0,0,0,.2),0 8px 10px 1px rgba(0,0,0,.14),0 3px 14px 2px rgba(0,0,0,.12);
  transform:scale(1.05);
}
.md-fab-theme:active{transform:scale(.95);}
.md-fab-theme .mi{
  font-size:24px;
  color:var(--md-on-primary-container);
  font-variation-settings:'FILL' 1,'wght' 500,'GRAD' 0,'opsz' 24;
}

/* MD3 EXPRESSIVE - Validation Summary Card */

.validation-summary-card{
  background:var(--md-surface-container);
  border:1px solid var(--md-outline-variant);
  border-radius:20px;
  padding:16px 20px;
  margin-bottom:12px;
  transition:all .2s;
}
.validation-summary-card:hover{
  border-color:var(--md-outline);
}
.validation-category{
  padding:12px 16px;
  border-radius:16px;
  background:var(--md-surface-container-high);
  margin-bottom:8px;
  border:1px solid var(--md-outline-variant);
}
.validation-category:last-child{margin-bottom:0;}

/* TABS — STICKY */

.tabs-wrapper{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--md-surface) 85%,transparent);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--md-outline-variant);}

.md-tabs{display:flex;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;gap:0;}

.md-tabs::-webkit-scrollbar{display:none;}

.md-tab{padding:14px 20px;background:none;border:none;color:var(--md-on-surface-variant);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .25s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;gap:8px;}

.md-tab:hover{color:var(--md-on-surface);background:color-mix(in srgb,var(--md-on-surface) 4%,transparent);}

.md-tab.active{color:var(--md-primary);border-bottom-color:var(--md-primary);}

/* CAROUSEL */

.tab-carousel-wrapper{overflow:hidden;position:relative;-webkit-overflow-scrolling:touch;touch-action:pan-y pinch-zoom;}

.tab-carousel{display:flex;transition:transform .35s cubic-bezier(.4,0,.2,1);will-change:transform;backface-visibility:hidden;}

.tab-carousel.dragging{transition:none !important;}

.tab-panel{flex:0 0 auto;padding:24px 0;min-height:200px;overflow:hidden;overflow-x:hidden;box-sizing:border-box;}

.tab-panel>*{max-width:100%;overflow-wrap:anywhere;word-break:break-word;}

/* VERDICT */

.verdict-pass{background:linear-gradient(135deg,color-mix(in srgb,var(--md-success) 12%,var(--md-surface-container)) 0%,var(--md-surface-container) 100%);border:1px solid color-mix(in srgb,var(--md-success) 25%,transparent);border-radius:24px;}

.verdict-fail{background:linear-gradient(135deg,color-mix(in srgb,var(--md-error) 12%,var(--md-surface-container)) 0%,var(--md-surface-container) 100%);border:1px solid color-mix(in srgb,var(--md-error) 25%,transparent);border-radius:24px;}

.verdict-uncertain{background:linear-gradient(135deg,color-mix(in srgb,var(--md-warning) 12%,var(--md-surface-container)) 0%,var(--md-surface-container) 100%);border:1px solid color-mix(in srgb,var(--md-warning) 25%,transparent);border-radius:24px;}

.gauge-ring{position:relative;display:flex;align-items:center;justify-content:center;}

.gauge-ring svg{position:absolute;transform:rotate(-90deg);}

.gauge-ring circle{fill:none;stroke-linecap:round;}

/* OVERVIEW */

.ov-card{background:var(--md-surface-container-high);border-radius:16px;padding:16px 18px;display:flex;align-items:center;gap:14px;border:1px solid var(--md-outline-variant);transition:all .2s;}

.ov-card:hover{border-color:var(--md-outline);}

.ov-card .mi{font-size:28px;color:var(--md-primary);flex-shrink:0;}

/* ISSUES */

.rc-card{border-radius:20px;padding:20px 24px;margin-bottom:14px;border:1px solid var(--md-outline-variant);transition:all .25s cubic-bezier(.4,0,.2,1);}

.rc-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.1);}

.rc-critical{background:color-mix(in srgb,var(--md-error) 6%,var(--md-surface-container));border-color:color-mix(in srgb,var(--md-error) 20%,transparent);}

.rc-high{background:color-mix(in srgb,var(--md-warning) 6%,var(--md-surface-container));border-color:color-mix(in srgb,var(--md-warning) 20%,transparent);}

.rc-medium{background:color-mix(in srgb,var(--md-tertiary) 6%,var(--md-surface-container));border-color:color-mix(in srgb,var(--md-tertiary) 20%,transparent);}

/* BINCHECK */

.dep-chain{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}

.dep-node{padding:8px 16px;border-radius:12px;font-size:13px;font-weight:500;border:1px solid var(--md-outline-variant);background:var(--md-surface-container);transition:all .25s cubic-bezier(.4,0,.2,1);}

.dep-ok{border-color:var(--md-success);color:var(--md-success);background:color-mix(in srgb,var(--md-success) 8%,var(--md-surface-container));}

.dep-fail{border-color:var(--md-error);color:var(--md-error);background:color-mix(in srgb,var(--md-error) 8%,var(--md-surface-container));}

.dep-warn{border-color:var(--md-warning);color:var(--md-warning);background:color-mix(in srgb,var(--md-warning) 8%,var(--md-surface-container));}

.bin-card-inner{display:flex;flex-direction:column;gap:10px;}

.bin-card-row{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;}

.bin-card-label{font-size:12px;font-weight:500;color:var(--md-outline);min-width:60px;flex-shrink:0;}

/* FSTAB */

.fstab-entry{background:var(--md-surface-container);border:1px solid var(--md-outline-variant);border-radius:18px;padding:18px;margin-bottom:12px;transition:all .25s cubic-bezier(.4,0,.2,1);}

.fstab-entry:hover{border-color:var(--md-outline);transform:translateY(-1px);}

.fstab-data{border-color:color-mix(in srgb,var(--md-primary) 40%,transparent);background:color-mix(in srgb,var(--md-primary) 5%,var(--md-surface-container));}

.fstab-flags{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}

.fstab-raw{font-family:'Google Sans Mono',monospace;font-size:11px;color:var(--md-outline);margin-top:10px;padding-top:10px;border-top:1px solid var(--md-outline-variant);word-break:break-all;overflow-wrap:anywhere;}

/* FLOW — simulation style */

.flow-step{display:flex;gap:16px;align-items:stretch;margin-bottom:0;opacity:0;animation:flowStepIn .4s ease forwards;}

@keyframes flowStepIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}

.flow-indicator{display:flex;flex-direction:column;align-items:center;min-width:36px;}

.flow-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--md-outline-variant);background:var(--md-surface-container);transition:all .3s;flex-shrink:0;}

.flow-dot.pass{border-color:var(--md-success);background:color-mix(in srgb,var(--md-success) 15%,var(--md-surface-container));color:var(--md-success);}

.flow-dot.fail{border-color:var(--md-error);background:color-mix(in srgb,var(--md-error) 15%,var(--md-surface-container));color:var(--md-error);}

.flow-dot.warn{border-color:var(--md-warning);background:color-mix(in srgb,var(--md-warning) 15%,var(--md-surface-container));color:var(--md-warning);}

.flow-dot.skip{border-color:var(--md-outline-variant);background:var(--md-surface-container);color:var(--md-outline);}

.flow-dot.running{border-color:var(--md-primary);background:color-mix(in srgb,var(--md-primary) 15%,var(--md-surface-container));color:var(--md-primary);animation:pulse 1s ease infinite;}

@keyframes pulse{0%,100%{box-shadow:0 0 0 0 color-mix(in srgb,var(--md-primary) 30%,transparent)}50%{box-shadow:0 0 0 8px transparent}}

.flow-connector{width:2px;flex:1;min-height:16px;margin:4px 0;transition:background .3s;}

.flow-connector.pass{background:var(--md-success);}

.flow-connector.fail{background:var(--md-error);}

.flow-connector.warn{background:var(--md-warning);}

.flow-connector.skip{background:var(--md-outline-variant);}

.flow-body{flex:1;padding:4px 0 20px;min-width:0;}

.flow-body-card{padding:14px 18px;border-radius:16px;background:var(--md-surface-container);border:1px solid var(--md-outline-variant);}

.flow-body-card.pass{border-color:color-mix(in srgb,var(--md-success) 25%,transparent);}

.flow-body-card.fail{border-color:color-mix(in srgb,var(--md-error) 25%,transparent);background:color-mix(in srgb,var(--md-error) 4%,var(--md-surface-container));}

.flow-body-card.warn{border-color:color-mix(in srgb,var(--md-warning) 25%,transparent);}

.flow-body-card.skip{opacity:.5;}

/* FIXER */

.fix-block{margin-bottom:24px;border-radius:24px;overflow:hidden;border:1px solid var(--md-outline-variant);background:var(--md-surface-container);}

.fix-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--md-surface-container-high);gap:12px;flex-wrap:wrap;}

.fix-body{padding:0;font-family:'Google Sans Mono',monospace;font-size:12px;line-height:1.7;overflow-x:auto;}

.diff-header{display:block;padding:6px 18px;background:color-mix(in srgb,var(--md-primary) 10%,var(--md-surface-container-lowest));color:var(--md-primary);font-weight:700;}

.diff-add{display:block;padding:2px 18px;background:color-mix(in srgb,#4CAF50 10%,var(--md-surface-container-lowest));color:#4CAF50;border-left:3px solid #4CAF50;}

.diff-remove{display:block;padding:2px 18px;background:color-mix(in srgb,#F44336 10%,var(--md-surface-container-lowest));color:#F44336;border-left:3px solid #F44336;text-decoration:line-through;}

.diff-context{display:block;padding:2px 18px;color:var(--md-on-surface-variant);}

/* FILES */

.files-layout{display:flex;gap:16px;min-height:400px;}

.files-sidebar{width:240px;flex-shrink:0;overflow-y:auto;max-height:600px;padding-right:8px;}

.files-viewer{flex:1;min-width:0;background:var(--md-surface-container-lowest);border-radius:16px;border:1px solid var(--md-outline-variant);overflow:hidden;}

.tree-item{padding:6px 10px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .2s;overflow:hidden;}

.tree-item:hover{background:var(--md-surface-container-highest);}

.tree-item.critical{color:var(--md-primary);}

@media(max-width:768px){

  .files-layout{flex-direction:column;}

  .files-sidebar{width:100%;max-height:250px;}

}

/* CODE */

.code{font-family:'Google Sans Mono',monospace;font-size:13px;line-height:1.7;background:var(--md-surface-container-lowest);padding:16px;border-radius:14px;overflow-x:auto;color:var(--md-on-surface-variant);white-space:pre;border:1px solid var(--md-outline-variant);}

.ln{display:inline-block;width:32px;text-align:right;margin-right:12px;color:var(--md-outline);user-select:none;font-size:11px;}

.hl-r{color:var(--md-error);font-weight:500;}.hl-y{color:var(--md-warning);font-weight:500;}

.hl-g{color:var(--md-success);}.hl-b{color:var(--md-primary);font-weight:500;}

.hl-p{color:var(--md-tertiary);}.hl-cm{color:var(--md-outline);}

.issue-card{border-radius:18px;padding:18px 20px;margin-bottom:14px;border:1px solid;}

.issue-critical{background:color-mix(in srgb,var(--md-error) 8%,var(--md-surface-container));border-color:color-mix(in srgb,var(--md-error) 20%,transparent);}

.issue-warning{background:color-mix(in srgb,var(--md-warning) 8%,var(--md-surface-container));border-color:color-mix(in srgb,var(--md-warning) 20%,transparent);}

/* GITHUB DIFF STYLE */

.diff-block{margin-top:16px;border-radius:16px;overflow:hidden;border:1px solid var(--md-outline-variant);background:var(--md-surface-container);}

.diff-header{display:flex;align-items:center;gap:8px;padding:12px 16px;background:var(--md-surface-container-high);font-weight:500;font-size:14px;color:var(--md-primary);border-bottom:1px solid var(--md-outline-variant);}

.diff-body{font-family:'Google Sans Mono',monospace;font-size:12px;line-height:1.6;overflow-x:auto;max-height:400px;overflow-y:auto;}

.diff-file-header{display:flex;align-items:center;gap:8px;padding:8px 16px;background:color-mix(in srgb,var(--md-tertiary) 8%,var(--md-surface-container-lowest));color:var(--md-tertiary);font-weight:600;border-bottom:1px solid var(--md-outline-variant);}

.diff-file-header .mi{font-size:18px;}

.diff-line{display:flex;align-items:flex-start;padding:2px 16px;transition:background .15s;}

.diff-line:hover{background:color-mix(in srgb,var(--md-on-surface) 3%,transparent);}

.diff-add{background:color-mix(in srgb,#3fb950 10%,transparent);border-left:3px solid #3fb950;}

.diff-remove{background:color-mix(in srgb,#f85149 10%,transparent);border-left:3px solid #f85149;text-decoration:line-through;color:var(--md-on-surface-variant);}

.diff-context{background:var(--md-surface-container-lowest);border-left:3px solid var(--md-outline-variant);color:var(--md-on-surface-variant);}

.diff-add .diff-line-num{color:#3fb950;}

.diff-remove .diff-line-num{color:#f85149;}

.diff-line-num{display:inline-block;min-width:36px;color:var(--md-outline);user-select:none;font-size:11px;text-align:right;padding-right:12px;}

.diff-add-text{color:#3fb950;font-weight:500;}

.diff-remove-text{color:#f85149;font-weight:500;}

.diff-hunk-header{padding:8px 16px;background:color-mix(in srgb,var(--md-primary) 5%,var(--md-surface-container-lowest));color:var(--md-on-surface-variant);font-style:italic;border-top:1px solid var(--md-outline-variant);border-bottom:1px solid var(--md-outline-variant);}

.diff-empty{text-align:center;padding:16px;color:var(--md-on-surface-variant);font-style:italic;}

</style>

</head>

function getCarouselWidth(){

  const w=document.querySelector('.tab-carousel-wrapper');

  if(!w)return window.innerWidth;

  // Force layout recalc

  void w.offsetHeight;

  const cw=w.clientWidth;

  return cw>0?cw:window.innerWidth-40;

}

function updateCarouselSizing(){

  const w=getCarouselWidth();

  if(w<=0)return;

  const panels=document.querySelectorAll('.tab-panel');

  const n=panels.length;

  panels.forEach(p=>{

    p.style.width=w+'px';

    p.style.minWidth=w+'px';

    p.style.maxWidth=w+'px';

    p.style.overflow='hidden';

  });

  const carousel=document.getElementById('tabCarousel');

  if(carousel){

    carousel.style.width=(w*n)+'px';

    carousel.classList.add('dragging');

    carousel.style.transform=`translateX(-${currentTabIdx*w}px)`;

    void carousel.offsetHeight;

    requestAnimationFrame(()=>{

      carousel.classList.remove('dragging');

    });

  }

}

function switchTab(id){

  const idx=TAB_ORDER.indexOf(id);if(idx<0)return;

  currentTabIdx=idx;

  const w=getCarouselWidth();

  const carousel=document.getElementById('tabCarousel');

  carousel.style.transform=`translateX(-${idx*w}px)`;

  document.querySelectorAll('.md-tab').forEach(t=>t.classList.remove('active'));

  const btn=document.querySelector(`.md-tab[data-tab="${id}"]`);

  if(btn){btn.classList.add('active');btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});}

}

function initTabs(){

  document.querySelectorAll('.md-tab').forEach(btn=>{

    btn.addEventListener('click',()=>switchTab(btn.dataset.tab));

  });

}

function initSwipe(){

  const carousel=document.getElementById('tabCarousel');

  const wrapper=carousel.parentElement;

  if(!carousel)return;

  let startX=0,startY=0,dragging=false,deltaX=0,decided=false,isHorizontal=false;

  carousel.addEventListener('touchstart',e=>{

    startX=e.touches[0].clientX;startY=e.touches[0].clientY;

    dragging=true;decided=false;isHorizontal=false;deltaX=0;

    carousel.classList.add('dragging');

  },{passive:true});

  carousel.addEventListener('touchmove',e=>{

    if(!dragging)return;

    const dx=e.touches[0].clientX-startX;

    const dy=e.touches[0].clientY-startY;

    if(!decided){

      if(Math.abs(dx)>8||Math.abs(dy)>8){decided=true;isHorizontal=Math.abs(dx)>Math.abs(dy);}

      return;

    }

    if(!isHorizontal)return;

    deltaX=dx;

    const w=getCarouselWidth();

    const baseOffset=-currentTabIdx*w;

    carousel.style.transform=`translateX(${baseOffset+deltaX}px)`;

  },{passive:true});

  carousel.addEventListener('touchend',()=>{

    if(!dragging)return;

    dragging=false;

    carousel.classList.remove('dragging');

    const w=getCarouselWidth();

    const threshold=w*0.2;

    if(isHorizontal&&deltaX<-threshold&&currentTabIdx<TAB_ORDER.length-1){

      switchTab(TAB_ORDER[currentTabIdx+1]);

    }else if(isHorizontal&&deltaX>threshold&&currentTabIdx>0){

      switchTab(TAB_ORDER[currentTabIdx-1]);

    }else{

      switchTab(TAB_ORDER[currentTabIdx]);

    }

    deltaX=0;

  },{passive:true});

  let resizeTimer;

  window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(updateCarouselSizing,100);});

  if(typeof ResizeObserver!=='undefined'){

    const ro=new ResizeObserver(()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(updateCarouselSizing,50);});

    ro.observe(wrapper);

  }

}

const API_CACHE = {};

function updateRateLimitUI(){

  const el=document.getElementById('rateLimitInfo'),b=document.getElementById('rateLimitBadge');

  el.style.display='flex';const r=parseInt(RATE_LIMIT.remaining)||0;

  b.textContent=`${RATE_LIMIT.remaining}/${RATE_LIMIT.limit}`;

  b.className='md-chip '+(r<10?'chip-error':r<30?'chip-warning':'chip-success');

async function checkRateLimit(){try{const h={};const t=getToken();if(t)h['Authorization']=`token ${t}`;const r=await fetch('https://api.github.com/rate_limit',{headers:h});const d=await r.json();RATE_LIMIT.remaining=d.rate.remaining;RATE_LIMIT.limit=d.rate.limit;updateRateLimitUI();}catch(e){}}

function parseUrl(url){url=url.trim().replace(/\.git$/,'').replace(/\/+$/,'');const m=url.match(/github\.com\/([^\/]+)\/([^\/]+)/);if(!m)throw new Error('Invalid GitHub URL');return{owner:m[1],repo:m[2]};}

async function ghGet(p){

  if(API_CACHE[p])return API_CACHE[p];

  const headers={'Accept':'application/vnd.github.v3+json'};const token=getToken();if(token)headers['Authorization']=`token ${token}`;

  const r=await fetch(`https://api.github.com/${p}`,{headers});

  const rl=r.headers.get('X-RateLimit-Remaining'),ll=r.headers.get('X-RateLimit-Limit');

  if(rl){RATE_LIMIT.remaining=rl;RATE_LIMIT.limit=ll;updateRateLimitUI();}

  if(r.status===403)throw new Error(`GitHub 403! ${!getToken()?'Add Token!':''}`);

  if(!r.ok)throw new Error(`GitHub ${r.status}: ${r.statusText}`);

  const data=await r.json();API_CACHE[p]=data;return data;

}

async function fetchFileRaw(path,owner,repo,branch){

  owner=owner||S.owner;repo=repo||S.repo;branch=branch||S.branch;

  const key=`${owner}/${repo}/${branch}/${path}`;

  if(S.fileContents[key])return S.fileContents[key];

  if(S.fileContents[path])return S.fileContents[path];

  const sKey=`f_${owner}_${repo}_${branch}_${path}`;

  const cached=sessionStorage.getItem(sKey);if(cached){S.fileContents[path]=cached;return cached;}

  try{const url=`https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${path}`;

    const r=await fetch(url);if(!r.ok)return null;const c=await r.text();S.fileContents[path]=c;

    try{sessionStorage.setItem(sKey,c);}catch(e){}return c;}catch{return null;}

}

function categorize(tree){

  const c={fstab:[],boardconfig:[],initrc:[],prop:[],sepolicy:[],mk:[],prebuilt:[],xml:[],conf:[],other:[]};

  for(const f of tree){

    const p=f.path.toLowerCase();

    if(/fstab/i.test(p))c.fstab.push(f.path);

    else if(/boardconfig.*\.mk$/i.test(p))c.boardconfig.push(f.path);

    else if(/\.rc$/i.test(p))c.initrc.push(f.path);

    else if(/\.prop$/i.test(p))c.prop.push(f.path);

    else if(/sepolicy|\.te$/i.test(p))c.sepolicy.push(f.path);

    else if(/\.mk$/i.test(p))c.mk.push(f.path);

    else if(/\.xml$/i.test(p))c.xml.push(f.path);

    else if(/\.cfg$|\.conf$/i.test(p))c.conf.push(f.path);

    else if(/prebuilt|vendor|lib|bin|firmware/i.test(p))c.prebuilt.push(f.path);

    else c.other.push(f.path);

  }

  return c;

}

async function fetchAllRelevant(){

  const toFetch=[];

  for(const f of S.tree){

    const p=f.path.toLowerCase();

    if(SKIP_EXT.test(p))continue;

    if(f.size && f.size > 500000)continue;

    const isText=/\.(rc|mk|prop|te|xml|cfg|conf|txt|sh|fstab|json|md)$/i.test(p)||!/\.[a-z0-9]+$/i.test(p);

    const isCritical=CRITICAL_PATTERNS.some(pat=>pat.test(p));

    if(isText||isCritical) toFetch.push(f.path);

  }

  S.totalFetchable=toFetch.length;S.fetchedCount=0;

  const counter=document.getElementById('scanCounter');

  for(let i=0;i<toFetch.length;i+=20){

    const batch=toFetch.slice(i,i+20);

    await Promise.all(batch.map(p=>fetchFileRaw(p)));

    S.fetchedCount=Math.min(i+20,toFetch.length);

    counter.textContent=`${S.fetchedCount}/${toFetch.length} files fetched`;

    load('Scanning files...',`${S.fetchedCount}/${toFetch.length}`,10+Math.round(S.fetchedCount/toFetch.length*22));

  }

  S.fetchedCount=toFetch.length;

}

async function checkCommonTree(){

  S.commonTrees=[];

  const seen=new Set();

  const allContent=Object.entries(S.fileContents).filter(([,c])=>c);

  const DEVICE_TREE_INDICATORS = /common|device|recovery|shared|platform|mt\d+|tn\d+|sm\d+/i;

  const NON_TREE_REPOS = /\b(kernel|vendor|hardware|prebuilts|packages|frameworks|system|build|manifest|toolchain|clang|gcc|lineage-sdk)\b/i;

  for(const[path,content] of allContent){

    const fn=path.toLowerCase();

    const basename=fn.split('/').pop();

    // === SOURCE 1: GitHub URLs in ANY text file ===

    const ghMatches=content.match(/https?:\/\/github\.com\/[^\s"'\\)<>\]\[,]+/g)||[];

    for(const rawUrl of ghMatches){

      // Extract branch from /tree/branchname OR -b branch nearby

      const treeBranch=rawUrl.match(/\/tree\/([^\s\/\]"']+)/);

      let branch=treeBranch?treeBranch[1]:'';

      // Check for -b branch near URL in content

      if(!branch){

        const escUrl=rawUrl.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

        const brMatch=content.match(new RegExp(escUrl.substring(0,60).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'[^\\n]*?-b\\s+(\\S+)'));

        if(brMatch)branch=brMatch[1];

      }

      // Also check git clone ... -b branch URL pattern

      if(!branch){

        const escUrl2=rawUrl.substring(0,50).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

        const brMatch2=content.match(new RegExp('-b\\s+(\\S+)[^\\n]*?'+escUrl2));

        if(brMatch2)branch=brMatch2[1];

      }

      tryAddGitHubUrl(rawUrl, branch, path, seen);

    }

    // === SOURCE 2: inherit-product / -include in .mk files ===

    if(/\.mk$/i.test(basename)){

      const inheritMatches=content.matchAll(/inherit-product[^,]*,\s*(\S+)\)/gi);

      for(const m of inheritMatches){

        const mkPath=m[1].replace(/\$\([^)]+\)\/?/g,'').trim();

        if(!mkPath.includes('/'))continue;

        const parts=mkPath.split('/');

        if(parts.length>=3){

          const commonName=parts.slice(0,3).join('/');

          if(!S.tree.some(f=>f.path.toLowerCase().startsWith(parts[2].toLowerCase()+'/'))){

            addCommonTreeHint(commonName, path, seen);

          }

        }

      }

      const includeMatches=content.matchAll(/-?include\s+.*?\/\.\.\/([^\s\/]+)\//gi);

      for(const m of includeMatches){

        const commonDir=m[1];

        if(DEVICE_TREE_INDICATORS.test(commonDir)){

          addCommonTreeHint(`device/*/${commonDir}`, path, seen);

        }

      }

    }

    // === SOURCE 3: vendorsetup.sh / .sh files — deep patterns ===

    if(/\.sh$/i.test(basename)){

      // git clone patterns (various forms)

      const cloneMatches=[...content.matchAll(/git\s+clone\s+[^\n]*/gi)];

      for(const m of cloneMatches){

        const urlMatch=m[0].match(/https?:\/\/[^\s"'\\)]+/);

        const brMatch=m[0].match(/-b\s+(\S+)/);

        if(urlMatch)tryAddGitHubUrl(urlMatch[0], brMatch?brMatch[1]:'', path, seen);

      }

      // Variable assignments pointing to common paths

      const localPaths=content.matchAll(/(?:COMMON_PATH|PLATFORM_PATH|DEVICE_COMMON)\s*[:+?]?=\s*device\/([^\s]+)/gi);

      for(const m of localPaths){

        addCommonTreeHint(`device/${m[1]}`, path, seen);

      }

    }

  }

  // === SOURCE 4: BoardConfig include paths ===

  for(const fp of S.files.boardconfig){

    const c=S.fileContents[fp];if(!c)continue;

    const incMatches=c.matchAll(/-?include\s+(\S+)/gi);

    for(const m of incMatches){

      const p=m[1].replace(/\$\([^)]+\)\/?/g,'').trim();

      if(p.includes('../')&&DEVICE_TREE_INDICATORS.test(p)){

        const dir=p.match(/\.\.\/([^/]+)/);

        if(dir)addCommonTreeHint(`device/*/${dir[1]}`, fp, seen);

      }

    }

    // Also: include $(DEVICE_PATH)/../common/... or COMMON_PATH

    const commonVars=c.matchAll(/(?:COMMON_PATH|DEVICE_COMMON|PLATFORM_PATH)\s*[:+?]?=\s*(\S+)/gi);

    for(const m of commonVars){

      addCommonTreeHint(m[1], fp, seen);

    }

  }

  // === SOURCE 5: AndroidProducts.mk / any .mk referencing sibling dirs ===

  for(const fp of S.files.mk){

    const c=S.fileContents[fp];if(!c)continue;

    // Look for paths like device/infinix/mt6789-common or device/infinix/Infinix-X6880-common

    const devicePaths=c.matchAll(/device\/([^\/\s]+)\/([^\/\s)]+)/gi);

    for(const m of devicePaths){

      const brand=m[1], devName=m[2];

      const fullPath=`device/${brand}/${devName}`;

      // Don't flag our own repo path

      const isOwnRepo=S.tree.some(f=>f.path.toLowerCase().startsWith(devName.toLowerCase()+'/'));

      const isCommonIndicator=/common|platform|mt\d+|shared/i.test(devName);

      if(!isOwnRepo && isCommonIndicator){

        addCommonTreeHint(fullPath, fp, seen);

      }

    }

  }

  // Filter non-device-tree repos

  S.commonTrees=S.commonTrees.filter(t=>{

    if(t.url){

      const repoName=(t.repo||'').toLowerCase();

      if(NON_TREE_REPOS.test(repoName)&&!DEVICE_TREE_INDICATORS.test(repoName))return false;

      return true;

    }

    return true;

  });

  if(S.commonTrees.length>0){

    document.getElementById('commonTreeArea').style.display='block';

    renderCommonTreeNotification();

  }else{

    document.getElementById('commonTreeArea').innerHTML='';

    document.getElementById('commonTreeArea').style.display='none';

  }

  function tryAddGitHubUrl(url, branch, source, seen){

    if(!url)return;

    try{

      let clean=url.replace(/\.git$/,'').replace(/\/+$/,'').replace(/\/tree\/[^\s]*/,'');

      // Remove trailing punctuation that might have been captured

      clean=clean.replace(/[,;:)\]]+$/,'');

      const treeBranch=url.match(/\/tree\/([^\s\/\]"']+)/);

      branch=branch||treeBranch?.[1]||'';

      const parsed=parseUrl(clean);

      const key=`${parsed.owner}/${parsed.repo}`.toLowerCase();

      if(seen.has(key))return;

      if(parsed.owner.toLowerCase()===S.owner.toLowerCase()&&parsed.repo.toLowerCase()===S.repo.toLowerCase())return;

      seen.add(key);

      S.commonTrees.push({url:clean,owner:parsed.owner,repo:parsed.repo,branch,source,type:'github'});

    }catch(e){}

  }

  function addCommonTreeHint(path, source, seen){

    const key='hint:'+path.toLowerCase();

    if(seen.has(key))return;

    seen.add(key);

    S.commonTrees.push({url:'',owner:'',repo:'',branch:'',source,type:'path_hint',hintPath:path});

  }

}

async function scanCommonTree(url,owner,repo,branch){

  setStatus(`Scanning ${repo}...`,'chip-warning');

  try{

    if(!branch){

      const repoData=await ghGet(`repos/${owner}/${repo}`);

      branch=repoData.default_branch||'main';

    }

    const d=await ghGet(`repos/${owner}/${repo}/git/trees/${branch}?recursive=1`);

    const ctFiles=(d.tree||[]).filter(f=>f.type==='blob');

    for(const f of ctFiles){

      const key=`common/${f.path}`;

      S.tree.push({...f,path:key});

      S.treeSet.add(key.toLowerCase());

      S.treePathMap[key.toLowerCase()]=key;

    }

    const toFetch=[];

    for(const f of ctFiles){

      const p=f.path.toLowerCase();

      if(SKIP_EXT.test(p))continue;

      if(f.size&&f.size>500000)continue;

      const isText=/\.(rc|mk|prop|te|xml|cfg|conf|txt|sh|fstab|json|md)$/i.test(p)||!/\.[a-z0-9]+$/i.test(p);

      const isCritical=CRITICAL_PATTERNS.some(pat=>pat.test(p));

      if(isText||isCritical)toFetch.push(f.path);

    }

    for(let i=0;i<toFetch.length;i+=20){

      const batch=toFetch.slice(i,i+20);

      await Promise.all(batch.map(async p=>{

        const c=await fetchFileRaw(p,owner,repo,branch);

        if(c)S.fileContents[`common/${p}`]=c;

      }));

    }

    S.files=categorize(S.tree);

    S.fetchedCount+=toFetch.length;

    detectTEE();parseFstab();parseBoardConfig();parseDeviceMk();parseXmlManifest();parseProps();

    parseInitServices();deepBinaryCheck();analyzeDependencyChain();runValidation();computeVerdict();analyzeRootCauses();generateFixes();

    renderAll();

    requestAnimationFrame(()=>{ updateCarouselSizing(); setTimeout(updateCarouselSizing, 50); });

    setStatus(`+ ${repo} merged · ${S.fetchedCount} files`,'chip-success');

  }catch(e){

    setStatus(`Error scanning ${repo}`,'chip-error');console.error(e);

  }

}

function detectTEE(){

  const scores={trustonic:0,trustkernel:0,beanpod:0,microtrust:0};

  const evidence={trustonic:[],trustkernel:[],beanpod:[],microtrust:[]};

  const allC=Object.entries(S.fileContents).filter(([,c])=>c).map(([p,c])=>({path:p,content:c}));

  for(const[tee,sig] of Object.entries(TEE_DB)){

    const eset=new Set();

    for(const{path,content} of allC){

      const cl=content.toLowerCase();

      for(const pat of sig.rcPat){if(pat.test(content)){scores[tee]+=14;eset.add(`Pattern /${pat.source}/ in ${path}`);}}

      for(const d of sig.daemons){if(cl.includes(d.toLowerCase())){scores[tee]+=12;eset.add(`Daemon "${d}" in ${path}`);}}

      for(const s of sig.services){if(new RegExp('\\b'+s+'\\b','i').test(content)){scores[tee]+=6;eset.add(`Service "${s}" in ${path}`);}}

      for(const h of sig.hals){if(cl.includes(h.toLowerCase())){scores[tee]+=4;eset.add(`HAL "${h}" in ${path}`);}}

      for(const k of sig.kmBins){if(cl.includes(k.toLowerCase())){scores[tee]+=10;eset.add(`KM bin "${k}" in ${path}`);}}

      for(const d of sig.devNodes){if(content.includes(d)){scores[tee]+=8;eset.add(`Dev "${d}" in ${path}`);}}

    }

    for(const f of S.tree){

      const fl=f.path.toLowerCase();

      for(const d of sig.daemons){if(fl.endsWith('/'+d.toLowerCase())||fl===d.toLowerCase()){scores[tee]+=18;eset.add(`Daemon binary: ${f.path}`);}}

      for(const k of sig.kmBins){const kn=k.toLowerCase().split('/').pop();if(fl.includes(kn)){scores[tee]+=14;eset.add(`KM binary: ${f.path}`);}}

      for(const g of sig.gkBins){const gn=g.toLowerCase().split('/').pop();if(fl.includes(gn)){scores[tee]+=8;eset.add(`GK binary: ${f.path}`);}}

    }

    evidence[tee]=[...eset];

  }

  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);

  const best=sorted[0],second=sorted[1];

  let conf=0;

  if(best[1]>0){conf=Math.min(100,Math.round(best[1]*0.8));if(second[1]>0&&second[1]>best[1]*0.5)conf=Math.max(15,conf-25);}

  S.tee={type:best[1]>10?best[0]:'unknown',confidence:conf,scores,evidence,allScores:sorted};

}

function parseFstab(){

  S.fstab=[];

  for(const fp of S.files.fstab){

    const c=S.fileContents[fp];if(!c)continue;

    const entries=[];

    c.split('\n').forEach((line,i)=>{

      const t=line.trim();if(!t||t.startsWith('#'))return;

      const p=t.split(/\s+/);if(p.length<4)return;

      const flags=p.slice(3).join(' ');

      entries.push({lineNum:i+1,device:p[0],mount:p[1],fs:p[2],flags,raw:line,

        fbe:/fileencryption/i.test(flags),metaEnc:/metadata_encryption/i.test(flags),

        wrapped:/wrappedkey/i.test(flags),inline:/inlinecrypt/i.test(flags),

        forced:/forceencrypt|forcefdeorfbe|encryptable/i.test(flags),

        fbeSpec:(flags.match(/fileencryption=([^\s,]+)/i)||[])[1]||null,

        metaSpec:(flags.match(/metadata_encryption=([^\s,]+)/i)||[])[1]||null,

        keyDir:(flags.match(/keydirectory=([^\s,]+)/i)||[])[1]||null,

      });

    });

    S.fstab.push({path:fp,content:c,entries});

  }

  // Detect filesystem fallbacks (EROFS + ext4)
  detectFilesystemFallbacks();
}

// Detect dual filesystem entries (EROFS + ext4 fallback)
function detectFilesystemFallbacks(){
  const mountPoints = {};
  
  S.fstab.forEach(fstab => {
    fstab.entries.forEach(entry => {
      const mp = entry.mount;
      if(!mountPoints[mp]) mountPoints[mp] = {entries:[],fsTypes:[]};
      mountPoints[mp].entries.push(entry);
      if(!mountPoints[mp].fsTypes.includes(entry.fs)) {
        mountPoints[mp].fsTypes.push(entry.fs);
      }
    });
  });
  
  S.fstabFallbacks = [];
  
  Object.entries(mountPoints).forEach(([mount, data]) => {
    const hasErofs = data.fsTypes.includes('erofs');
    const hasExt4 = data.fsTypes.includes('ext4');
    
    if(hasErofs && hasExt4) {
      S.fstabFallbacks.push({
        mountPoint: mount,
        status: 'optimal',
        primary: 'erofs',
        fallback: 'ext4',
        message: `${mount}: EROFS with ext4 fallback configured`
      });
    } else if(hasErofs && !hasExt4 && ['system','vendor','product','system_ext'].includes(mount.replace('/',''))) {
      S.fstabFallbacks.push({
        mountPoint: mount,
        status: 'warning',
        primary: 'erofs',
        fallback: 'none',
        message: `${mount}: EROFS only - consider adding ext4 fallback for recovery compatibility`
      });
    }
  });
}

function parseBoardConfig(){

  S.boardConfig={all:{},crypto:{},kernel:{},platform:{},raw:{}};

  for(const fp of S.files.boardconfig){

    const c=S.fileContents[fp];if(!c)continue;S.boardConfig.raw[fp]=c;

    for(const line of c.split('\n')){

      const m=line.match(/^\s*([A-Z_][A-Z0-9_]*)\s*[:+?]?=\s*(.*)$/);

      if(m){const[,k,v]=m;const vt=v.trim();S.boardConfig.all[k]=vt;

        if(/CRYPTO|ENCRYPT|FBE|FDE|KEYMASTER|GATEKEEPER|FSCRYPT/i.test(k))S.boardConfig.crypto[k]=vt;

        if(/KERNEL|DTB|BOOT|HEADER|RAMDISK|CMDLINE/i.test(k))S.boardConfig.kernel[k]=vt;

        if(/PLATFORM|VERSION|PATCH|VENDOR_SECURITY/i.test(k))S.boardConfig.platform[k]=vt;

      }

    }

  }
  
  // Detect A15+ compatibility mode
  detectA15PlusMode();
}

// Detect Android 15+ compatibility mode
function detectA15PlusMode(){
  const bc = S.boardConfig.all;
  const platformVersion = bc['PLATFORM_VERSION'] || '';
  
  const indicators = {
    platformVersion99: A15_COMPAT_VERSION.test(platformVersion),
    noMetadataDecrypt: bc['TW_INCLUDE_FBE_METADATA_DECRYPT'] !== 'true',
    noMetadataPartition: bc['BOARD_USES_METADATA_PARTITION'] !== 'true',
    suppressSecureErase: bc['BOARD_SUPPRESS_SECURE_ERASE'] === 'true',
    forceKeymasterVer: bc['TW_FORCE_KEYMASTER_VER'] === 'true',
    highSecurityPatch: (bc['PLATFORM_SECURITY_PATCH'] || '').startsWith('2099')
  };
  
  const isA15Compat = indicators.platformVersion99 || 
    (indicators.noMetadataDecrypt && indicators.noMetadataPartition && indicators.highSecurityPatch);
  
  S.a15plus = {
    isA15Compat: isA15Compat,
    platformVersion: platformVersion,
    indicators: indicators,
    securityPackages: S.deviceMk.packages.filter(p => p.includes('android.hardware.security'))
  };
  
  // Detect Android version first (needed for version-specific checks)
  detectAndroidVersion();
  
  // Also detect recovery libraries and service triggers
  detectRecoveryLibs();
  detectServiceTriggers();
  detectDrbinFiles();
}

// =================================================================
// ANDROID VERSION DETECTION
// =================================================================

function detectAndroidVersion(){
  const bc = S.boardConfig.all;
  const props = S.props.all;
  const packages = S.deviceMk.packages;
  
  let detectedVersion = null;
  let apiLevel = null;
  let source = '';
  let confidence = 0;
  
  // Check for manual version override first
  if(S.manualVersion){
    detectedVersion = S.manualVersion;
    apiLevel = ANDROID_VERSIONS[S.manualVersion]?.api || (S.manualVersion + 19);
    source = 'Manual selection';
    confidence = 100;
  } else {
    // Method 1: Check PLATFORM_VERSION (most common)
    const platformVer = bc['PLATFORM_VERSION'] || '';
    if(platformVer){
      // Handle A15+ workaround version (99.x.x)
      if(A15_COMPAT_VERSION.test(platformVer)){
        detectedVersion = 15;
        apiLevel = 35;
        source = 'PLATFORM_VERSION (A15+ compat)';
        confidence = 95;
      } else {
        // Parse normal version (e.g., 14.0.0 -> 14)
        const majorVer = parseInt(platformVer.split('.')[0]);
        if(majorVer >= 11 && majorVer <= 16){
          detectedVersion = majorVer;
          apiLevel = ANDROID_VERSIONS[majorVer]?.api || (majorVer + 19);
          source = 'PLATFORM_VERSION';
          confidence = 80;
        }
      }
    }
    
    // Method 2: Check PRODUCT_SHIPPING_API_LEVEL (more reliable)
    const shippingApi = parseInt(bc['PRODUCT_SHIPPING_API_LEVEL'] || props['ro.product.first_api_level'] || '');
    if(shippingApi && shippingApi >= 30 && shippingApi <= 36){
      detectedVersion = parseInt(API_TO_ANDROID[shippingApi] || (shippingApi - 19));
      apiLevel = shippingApi;
      source = 'PRODUCT_SHIPPING_API_LEVEL';
      confidence = 95;
    }
    
    // Method 3: Check PRODUCT_TARGET_VNDK_VERSION
    const vndkVer = parseInt(bc['PRODUCT_TARGET_VNDK_VERSION'] || props['ro.vndk.version'] || '');
    if(vndkVer && vndkVer >= 30 && vndkVer <= 36 && confidence < 90){
      detectedVersion = parseInt(API_TO_ANDROID[vndkVer] || (vndkVer - 19));
      apiLevel = vndkVer;
      source = 'PRODUCT_TARGET_VNDK_VERSION';
      confidence = 85;
    }
    
    // Method 4: Check for version-specific packages (heuristic)
    if(confidence < 70){
      if(packages.includes('android.hardware.security.keymint') || 
         packages.includes('android.hardware.security.secureclock')){
        detectedVersion = 15;
        apiLevel = 35;
        source = 'Keymint packages detected';
        confidence = 60;
      } else if(packages.includes('android.hardware.keymaster@4.1-service') ||
                packages.includes('libkeymaster41')){
        // Could be 12, 13, or 14 - assume 13+ for safety
        if(!detectedVersion || detectedVersion < 13){
          detectedVersion = 13;
          apiLevel = 33;
          source = 'Keymaster 4.1 packages detected';
          confidence = 50;
        }
      }
    }
    
    // Method 5: Check property file for API level
    if(confidence < 50){
      const propApi = parseInt(props['ro.build.version.sdk'] || props['ro.build.version.preview_sdk'] || '');
      if(propApi && propApi >= 30){
        detectedVersion = parseInt(API_TO_ANDROID[propApi] || (propApi - 19));
        apiLevel = propApi;
        source = 'System properties';
        confidence = 70;
      }
    }
  }
  
  // Get version info from mapping
  const versionInfo = detectedVersion ? ANDROID_VERSIONS[detectedVersion] : null;
  
  S.androidVersion = {
    version: detectedVersion,
    apiLevel: apiLevel,
    name: versionInfo?.name || (detectedVersion ? `Android ${detectedVersion}` : 'Unknown'),
    codename: versionInfo?.codename || '',
    color: versionInfo?.color || '#9E9E9E',
    source: source,
    requirements: versionInfo?.requirements || null,
    confidence: confidence
  };
  
  // Update A15+ detection based on Android version
  if(detectedVersion >= 15 && !S.a15plus.isA15Compat){
    S.a15plus.isA15Compat = true;
    S.a15plus.indicators.versionBased = true;
  }
  // If manual version is < 15, override A15+ detection
  if(detectedVersion && detectedVersion < 15 && S.manualVersion){
    S.a15plus.isA15Compat = false;
    S.a15plus.indicators.manualOverride = true;
  }
}

// Get version-specific required libraries
function getVersionRequiredLibraries(){
  const ver = S.androidVersion.version;
  if(!ver) return RECOVERY_KEYMASTER_LIBS;
  return VERSION_LIBRARIES[ver] || RECOVERY_KEYMASTER_LIBS;
}

// Get version-specific required flags
function getVersionRequiredFlags(){
  const ver = S.androidVersion.version;
  if(!ver) return { required: [], optional: [], removed: [] };
  return VERSION_FLAGS[ver] || { required: [], optional: [], removed: [] };
}

// Get version-specific service class requirements
function getVersionServiceClasses(){
  const ver = S.androidVersion.version;
  if(!ver) return { tee: 'core', keymaster: 'early_hal', gatekeeper: 'hal' };
  return VERSION_SERVICE_CLASS[ver] || VERSION_SERVICE_CLASS[14];
}

// Check if a flag should be present based on Android version
function shouldHaveFlag(flagName){
  const flags = getVersionRequiredFlags();
  if(flags.removed?.includes(flagName)) return 'removed';
  if(flags.required?.includes(flagName)) return 'required';
  if(flags.optional?.includes(flagName)) return 'optional';
  return 'irrelevant';
}

// Detect recovery libraries for keymaster compatibility
function detectRecoveryLibs(){
  const mkContent = S.deviceMk.raw;
  const modules = [];
  const sourceFiles = [];
  
  // Parse TARGET_RECOVERY_DEVICE_MODULES
  const modulesMatch = mkContent.match(/TARGET_RECOVERY_DEVICE_MODULES\s*[:+?]?=\s*([^\n]+(?:\\[\s\S]*?[^\n]+)*)/i);
  if(modulesMatch){
    const mods = modulesMatch[1].replace(/\\\n/g, ' ').trim().split(/\s+/).filter(x=>x&&x!=='\\');
    modules.push(...mods);
  }
  
  // Parse RECOVERY_LIBRARY_SOURCE_FILES
  const sourceMatch = mkContent.match(/RECOVERY_LIBRARY_SOURCE_FILES\s*[:+?]?=\s*([^\n]+(?:\\[\s\S]*?[^\n]+)*)/i);
  if(sourceMatch){
    const srcs = sourceMatch[1].replace(/\\\n/g, ' ').trim().split(/\s+/).filter(x=>x&&x!=='\\');
    sourceFiles.push(...srcs);
  }
  
  // Check for missing critical libraries
  const missing = RECOVERY_KEYMASTER_LIBS.filter(lib => {
    const found = modules.some(m => m.toLowerCase().includes(lib.toLowerCase())) ||
                  sourceFiles.some(s => s.toLowerCase().includes(lib.toLowerCase()));
    return !found;
  });
  
  S.recoveryLibs = { modules, sourceFiles, missing };
}

// Detect service trigger patterns for proper TEE/Keymaster startup
function detectServiceTriggers(){
  const allRC = Object.entries(S.fileContents)
    .filter(([p]) => p.endsWith('.rc'))
    .map(([,c]) => c || '')
    .join('\n');
  
  // Check for init.tee.rc file (Trustonic pattern)
  const hasInitTeeRc = S.files.initrc.some(f => f.toLowerCase().includes('init.tee.rc'));
  
  S.serviceTriggers = {
    hwservicemanager: SERVICE_TRIGGER_PATTERNS.hwservicemanager.test(allRC),
    vendorListener: SERVICE_TRIGGER_PATTERNS.vendorListener.test(allRC),
    cryptoState: SERVICE_TRIGGER_PATTERNS.cryptoEncrypted.test(allRC),
    cryptoFile: SERVICE_TRIGGER_PATTERNS.cryptoFile.test(allRC),
    initTeeRc: hasInitTeeRc
  };
}

// Detect Trustonic drbin files in tree or referenced in init.rc
function detectDrbinFiles(){
  S.drbinFiles = [];
  
  const allRC = Object.entries(S.fileContents)
    .filter(([p]) => p.endsWith('.rc'))
    .map(([,c]) => c || '')
    .join('\n');
  
  // Check for drbin references in init.rc files
  const drbinMatches = allRC.matchAll(/([a-f0-9]{32}\.drbin)/gi);
  const referencedDrbins = new Set();
  for(const m of drbinMatches){
    referencedDrbins.add(m[1]);
  }
  
  // Check for drbin files in tree
  const treeDrbins = S.tree.filter(f => f.path.toLowerCase().endsWith('.drbin'));
  
  // Build drbin analysis using CRITICAL_DRBINS constant
  for(const [filename, description] of Object.entries(TRUSTONIC_DRBINS)){
    const inTree = treeDrbins.some(f => f.path.toLowerCase().includes(filename.toLowerCase()));
    const referenced = referencedDrbins.has(filename);
    S.drbinFiles.push({
      filename,
      description,
      inTree,
      referenced,
      critical: CRITICAL_DRBINS.includes(filename)
    });
  }
  
  // Add any unknown drbins found in tree or referenced
  for(const drbin of treeDrbins){
    const name = drbin.path.split('/').pop();
    if(!S.drbinFiles.some(d => d.filename === name)){
      S.drbinFiles.push({
        filename: name,
        description: 'unknown',
        inTree: true,
        referenced: referencedDrbins.has(name),
        critical: false
      });
    }
  }
  
  for(const ref of referencedDrbins){
    if(!S.drbinFiles.some(d => d.filename === ref)){
      S.drbinFiles.push({
        filename: ref,
        description: 'unknown',
        inTree: false,
        referenced: true,
        critical: false
      });
    }
  }
}

function parseDeviceMk(){

  S.deviceMk={packages:[],copyFiles:[],raw:''};

  for(const fp of S.files.mk){

    const c=S.fileContents[fp];if(!c)continue;

    S.deviceMk.raw+=`\n# === ${fp} ===\n${c}`;

    for(const m of c.matchAll(/PRODUCT_PACKAGES\s*\+?=\s*([\s\S]*?)(?=\n\S|\n\n|$)/gi)){

      const val=m[1].replace(/\\\n/g,' ');

      S.deviceMk.packages.push(...val.trim().split(/\s+/).filter(x=>x&&x!=='\\'));

    }

    for(const m of c.matchAll(/PRODUCT_COPY_FILES\s*\+?=\s*([\s\S]*?)(?=\n\S|\n\n|$)/gi)){

      const val=m[1].replace(/\\\n/g,' ');

      S.deviceMk.copyFiles.push(...val.trim().split(/\s+/).filter(x=>x&&x!=='\\'));

    }

  }

}

function parseXmlManifest(){

  S.xmlManifest={services:[],raw:''};

  for(const fp of S.files.xml){

    const c=S.fileContents[fp];if(!c)continue;

    if(/manifest|compatibility|vintf/i.test(fp)||/<manifest/i.test(c)){

      S.xmlManifest.raw+=c;

      for(const m of c.matchAll(/<hal[^>]*>[\s\S]*?<name>([^<]+)<\/name>[\s\S]*?<\/hal>/gi))S.xmlManifest.services.push(m[1]);

      for(const m of c.matchAll(/<fqname>([^<]+)<\/fqname>/gi))S.xmlManifest.services.push(m[1]);

      for(const m of c.matchAll(/<name>([^<]+)<\/name>/gi)){if(/keymaster|gatekeeper|keymint/i.test(m[1]))S.xmlManifest.services.push(m[1]);}

    }

  }

}

function parseProps(){

  S.props={all:{},raw:''};

  for(const fp of S.files.prop){

    const c=S.fileContents[fp];if(!c)continue;S.props.raw+=c+'\n';

    for(const line of c.split('\n')){const m=line.match(/^([^#=]+)=(.*)$/);if(m)S.props.all[m[1].trim()]=m[2].trim();}

  }

}

// INIT SERVICES — DEEP PARSE

// =================================================================

function parseInitServices(){

  S.initServices=[];

  for(const fp of S.files.initrc){

    const c=S.fileContents[fp];if(!c)continue;

    const lines=c.split('\n');let cur=null;

    for(let i=0;i<lines.length;i++){

      const l=lines[i].trim();

      const sm=l.match(/^service\s+(\S+)\s+(.*)/);

      if(sm){

        if(cur)S.initServices.push(cur);

        const binary=sm[2].trim().split(/\s+/)[0];

        cur={name:sm[1],binary,args:sm[2].trim(),file:fp,line:i+1,props:[],rawLines:[l],

          className:'',user:'',group:'',disabled:false,oneshot:false,seclabel:'',interfaceDecls:[],

          triggers:[],writepid:'',override:false,

          isHAL:false,isTEE:false,isCrypto:false,isGK:false,teeType:null};

        const n=(sm[1]+' '+sm[2]).toLowerCase();

        if(/keymaster|keymint|km4|strongbox/i.test(n))cur.isCrypto=true;

        if(/gatekeeper/i.test(n))cur.isGK=true;

        if(/hardware.*service|hidl|aidl/i.test(n))cur.isHAL=true;

        for(const[tee,sig] of Object.entries(TEE_DB)){

          if(sig.rcPat.some(p=>p.test(sm[1]+' '+sm[2]))){cur.isTEE=true;cur.teeType=tee;}

        }

      }else if(cur&&l&&!l.startsWith('#')&&!l.startsWith('on ')&&!l.startsWith('import ')){

        cur.rawLines.push(l);cur.props.push(l);

        if(l.startsWith('class '))cur.className=l.replace('class ','').trim();

        if(l.startsWith('user '))cur.user=l.replace('user ','').trim();

        if(l.startsWith('group '))cur.group=l.replace('group ','').trim();

        if(l==='disabled')cur.disabled=true;

        if(l==='oneshot')cur.oneshot=true;

        if(l.startsWith('seclabel '))cur.seclabel=l.replace('seclabel ','').trim();

        if(l.startsWith('writepid '))cur.writepid=l.replace('writepid ','').trim();

        if(l==='override')cur.override=true;

        // Parse interface declarations (A15+ requirement)
        if(l.startsWith('interface ')){
          const iface=l.replace('interface ','').trim();
          cur.interfaceDecls.push(iface);
        }

      }else if(l.startsWith('on ')||l.startsWith('import ')){if(cur)S.initServices.push(cur);cur=null;}

    }

    if(cur)S.initServices.push(cur);

  }

  for(const fp of S.files.initrc){

    const c=S.fileContents[fp];if(!c)continue;const lines=c.split('\n');let currentTrigger=null;

    for(const line of lines){const t=line.trim();

      if(t.startsWith('on '))currentTrigger=t;

      else if(currentTrigger&&/^\s+(start|enable)\s+(\S+)/.test(line)){

        const m=line.match(/^\s+(start|enable)\s+(\S+)/);

        if(m){const svc=S.initServices.find(s=>s.name===m[2]);if(svc)svc.triggers.push({trigger:currentTrigger,action:m[1],file:fp});}

      }else if(!t.startsWith(' ')&&!t.startsWith('\t')&&t.length>0&&!t.startsWith('#'))currentTrigger=null;

    }

  }

}

// =================================================================

// DEEP BINARY CHECK

// =================================================================

function deepBinaryCheck(){

  S.binaryChecks=[];S.serviceAnalysis=[];

  for(const svc of S.initServices){

    if(!svc.binary||svc.binary.startsWith('#'))continue;

    const binPath=svc.binary.replace(/^\/+/,'');

    const binName=binPath.split('/').pop();

    const exactMatch=S.treeSet.has(binPath.toLowerCase());

    const nameMatch=S.tree.some(f=>{const fn=f.path.toLowerCase().split('/').pop();return fn===binName.toLowerCase();});

    const pathPartial=S.tree.some(f=>f.path.toLowerCase().includes(binName.toLowerCase()));

    const inCopyFiles=S.deviceMk.copyFiles.some(cf=>cf.toLowerCase().includes(binName.toLowerCase()));

    const inPackages=S.deviceMk.packages.some(p=>p.toLowerCase()===binName.toLowerCase()||p.toLowerCase().includes(binName.toLowerCase().split('@')[0]));

    let status='missing',risk='critical',detail='';

    if(exactMatch){status='found';risk='none';detail=`Binary at exact path: ${binPath}`;}

    else if(nameMatch){

      const found=S.tree.find(f=>f.path.toLowerCase().split('/').pop()===binName.toLowerCase());

      status='found';risk='low';detail=`Found at: ${found?.path}`;

    }else if(pathPartial){

      const found=S.tree.find(f=>f.path.toLowerCase().includes(binName.toLowerCase()));

      status='found';risk='low';detail=`Found at: ${found?.path}`;

    }else if(inCopyFiles){status='copied';risk='low';detail='In PRODUCT_COPY_FILES';}

    else if(inPackages){status='packaged';risk='medium';detail='In PRODUCT_PACKAGES (built from source)';}

    else{status='missing';risk='critical';detail='NOT FOUND anywhere! Service WILL CRASH.';}

    const analysis={svc,binPath,binName,exactMatch,nameMatch,inCopyFiles,inPackages,status,risk,detail,

      isCritical:svc.isCrypto||svc.isTEE||svc.isGK};

    S.serviceAnalysis.push(analysis);

    if(svc.isCrypto||svc.isTEE||svc.isGK)S.binaryChecks.push(analysis);

  }

}

function analyzeDependencyChain(){

  S.depChain=[];

  const tee=S.tee.type,sig=TEE_DB[tee];

  const allRC=Object.entries(S.fileContents).filter(([p])=>p.endsWith('.rc')).map(([,c])=>c||'').join('\n');

  const hasHwSvc=/hwservicemanager/i.test(allRC);

  S.depChain.push({name:'hwservicemanager',type:'system',status:hasHwSvc?'ok':'info',detail:hasHwSvc?'Referenced in init.rc':'Auto-started by recovery (OK)',critical:false});

  const teeSvcs=S.initServices.filter(s=>s.isTEE);

  if(teeSvcs.length>0){

    for(const ts of teeSvcs){const bc=S.binaryChecks.find(b=>b.svc.name===ts.name);

      const binOk=bc&&(bc.status==='found'||bc.status==='copied');

      S.depChain.push({name:ts.name,type:'tee',status:binOk?'ok':'missing_bin',

        detail:`Binary: ${ts.binary} → ${bc?.status||'?'}`,critical:true});}

  }else S.depChain.push({name:'TEE Daemon',type:'tee',status:'not_found',detail:'No TEE daemon in init.rc',critical:true});

  if(tee==='trustkernel'){

    const hasSup=S.initServices.some(s=>/tee[-_]supplicant/i.test(s.name+s.binary));

    S.depChain.push({name:'tee-supplicant',type:'tee',status:hasSup?'ok':'missing',detail:hasSup?'Found':'Missing! Required for TrustKernel',critical:true});

  }

  const kmSvcs=S.initServices.filter(s=>s.isCrypto);

  if(kmSvcs.length>0){

    for(const km of kmSvcs){const bc=S.binaryChecks.find(b=>b.svc.name===km.name);

      const binOk=bc&&(bc.status==='found'||bc.status==='copied');

      S.depChain.push({name:km.name,type:'keymaster',status:binOk?'ok':'missing_bin',

        detail:`Binary: ${km.binary} → ${bc?.status||'?'}`,critical:true});}

  }else S.depChain.push({name:'Keymaster',type:'keymaster',status:'not_found',detail:'No keymaster service!',critical:true});

  const gkSvcs=S.initServices.filter(s=>s.isGK);

  if(gkSvcs.length>0){for(const gk of gkSvcs){const bc=S.binaryChecks.find(b=>b.svc.name===gk.name);

    const binOk=bc&&(bc.status==='found'||bc.status==='copied');

    S.depChain.push({name:gk.name,type:'gatekeeper',status:binOk?'ok':'missing_bin',detail:`Binary: ${gk.binary} → ${bc?.status||'?'}`,critical:false});}}

  const hasWait=/wait.*keymaster|wait_for_keymaster|exec.*wait.*keymaster/i.test(allRC);

  S.depChain.push({name:'wait_for_keymaster',type:'sync',status:hasWait?'ok':'missing',detail:hasWait?'Found':'NOT found',critical:false});

}
