function runValidation(){

  S.checks=[];

  const bc=S.boardConfig.all;

  const dataE=S.fstab.flatMap(f=>f.entries).filter(e=>e.mount==='/data');

  const tee=S.tee.type,sig=TEE_DB[tee];

  const allRC=Object.entries(S.fileContents).filter(([p])=>p.endsWith('.rc')).map(([,c])=>c||'').join('\n');

  const kmSvcs=S.initServices.filter(s=>s.isCrypto);

  const gkSvcs=S.initServices.filter(s=>s.isGK);

  const teeSvcs=S.initServices.filter(s=>s.isTEE);

  function chk(id,cat,label,test,weight,pass_msg,fail_msg,severity='auto'){

    S.checks.push({id,cat,label,ok:!!test,weight,msg:test?pass_msg:fail_msg,severity});

  }

  chk('tee_detected','TEE','TEE Type Identified',tee!=='unknown',15,`${sig?.name} (${S.tee.confidence}%)`,'No TEE detected');

  chk('tee_daemon_svc','TEE','TEE Daemon in init.rc',teeSvcs.length>0,18,

    `Found: ${teeSvcs.map(s=>s.name).join(', ')}`,`No TEE daemon service! ${sig?sig.daemons[0]+' required':''}`);

  const teeBinOk=teeSvcs.length>0&&S.binaryChecks.some(b=>b.svc.isTEE&&(b.status==='found'||b.status==='copied'));

  chk('tee_daemon_bin','TEE','TEE Daemon Binary EXISTS',teeBinOk||teeSvcs.length===0,16,

    teeSvcs.length>0?'Binary found in tree':'N/A',

    `MISSING: ${teeSvcs.map(s=>s.binary).join(', ')}`,'critical');

  const teeTriggerOk=teeSvcs.length===0||teeSvcs.some(s=>s.triggers.length>0||!s.disabled);

  chk('tee_daemon_trigger','TEE','TEE Daemon Can Start',teeTriggerOk,10,

    teeSvcs.length>0?`${teeSvcs.some(s=>!s.disabled)?'Not disabled':'Has trigger'}`:'N/A','Disabled with NO trigger!');

  if(tee==='trustkernel'){

    const hasSup=S.initServices.some(s=>/tee[-_]supplicant/i.test(s.name+s.binary));

    chk('tk_supplicant','TEE','TrustKernel tee-supplicant',hasSup,12,'Found','Missing! TrustKernel requires tee-supplicant alongside teed');

  }

  chk('keymaster_svc','Keymaster','Keymaster/Keymint Service',kmSvcs.length>0,18,

    `Found: ${kmSvcs.map(s=>s.name).join(', ')}`,'NO keymaster service');

  const kmBinOk=kmSvcs.length>0&&S.binaryChecks.some(b=>b.svc.isCrypto&&(b.status==='found'||b.status==='copied'));

  chk('keymaster_bin','Keymaster','Keymaster Binary EXISTS',kmBinOk||kmSvcs.length===0,16,

    kmSvcs.length>0?'Binary found':'N/A',`MISSING: ${kmSvcs.map(s=>s.binary).join(', ')}`,'critical');

  const kmTriggerOk=kmSvcs.length===0||kmSvcs.some(s=>s.triggers.length>0||!s.disabled);

  chk('keymaster_trigger','Keymaster','Keymaster Can Start',kmTriggerOk,8,'Can start','Disabled with no trigger!');

  if(tee!=='unknown'&&kmSvcs.length>0){

    const kmMatchesTee=kmSvcs.some(s=>{const n=(s.name+' '+s.binary).toLowerCase();return sig.kmBins.some(k=>n.includes(k.toLowerCase().split('/').pop().split('@')[0]));});

    chk('km_tee_match','Keymaster','Keymaster Matches TEE',kmMatchesTee||kmSvcs.some(s=>s.binary.toLowerCase().includes(tee)),8,

      `Matches ${sig.name}`,`Keymaster may not match detected TEE (${sig.name})`);

  }

  chk('gatekeeper_svc','Gatekeeper','Gatekeeper Service',gkSvcs.length>0,8,

    `Found: ${gkSvcs.map(s=>s.name).join(', ')}`,'No gatekeeper');

  const gkBinOk=gkSvcs.length>0&&S.binaryChecks.some(b=>b.svc.isGK&&(b.status==='found'||b.status==='copied'));

  chk('gatekeeper_bin','Gatekeeper','Gatekeeper Binary EXISTS',gkBinOk||gkSvcs.length===0,6,'Found or N/A','Gatekeeper binary NOT FOUND');

  chk('fstab_exists','Fstab','Fstab File Exists',S.fstab.length>0,12,`${S.fstab.length} fstab file(s)`,'No fstab!');

  chk('fstab_data','Fstab','/data Entry',dataE.length>0,12,'/data found','No /data in fstab!');

  chk('fstab_fbe','Fstab','fileencryption= on /data',dataE.some(e=>e.fbe),14,

    `${dataE.find(e=>e.fbe)?.fbeSpec||'set'}`,dataE.length===0?'No /data':'No fileencryption= on /data');

  const fbeSpec=dataE.find(e=>e.fbe)?.fbeSpec||'';

  chk('fstab_spec','Fstab','FBE Cipher Valid',fbeSpec&&/aes-256/i.test(fbeSpec),5,`Valid: ${fbeSpec}`,fbeSpec?`Unusual: ${fbeSpec}`:'No spec');

  chk('fstab_meta','Fstab','metadata_encryption',dataE.some(e=>e.metaEnc)||!dataE.some(e=>e.fbe),4,

    dataE.some(e=>e.metaEnc)?`${dataE.find(e=>e.metaEnc)?.metaSpec||'set'}`:'Not required','FBE but no metadata_encryption');

  if(dataE.some(e=>e.wrapped)){

    const support=Object.values(bc).some(v=>/inlinecrypt|INLINE_ENCRYPTION/i.test(v))||

      (bc['BOARD_KERNEL_CMDLINE']||'').includes('inlinecrypt');

    chk('fstab_wrapped','Fstab','wrappedkey Kernel Support',support,10,

      'inlinecrypt support found','wrappedkey_v0 but NO inlinecrypt support','critical');

  }

  const hasFstabFBE=dataE.some(e=>e.fbe);

  const hasFstabEncrypt=dataE.some(e=>e.fbe||e.forced);

  const modernRecovery=!bc['TW_INCLUDE_CRYPTO']&&!bc['TW_INCLUDE_CRYPTO_FBE']&&hasFstabFBE;

  if(modernRecovery){

    chk('bc_crypto','BoardConfig','Crypto Config',true,14,'Modern build — auto-detected from fstab (TW_INCLUDE_CRYPTO not needed)','');

    chk('bc_fbe','BoardConfig','FBE Config',true,14,'Modern build — auto-detected from fstab (TW_INCLUDE_CRYPTO_FBE not needed)','');

  }else{

    chk('bc_crypto','BoardConfig','TW_INCLUDE_CRYPTO',

      bc['TW_INCLUDE_CRYPTO']==='true'||hasFstabEncrypt,12,

      bc['TW_INCLUDE_CRYPTO']==='true'?'Explicitly enabled':(hasFstabEncrypt?'Auto-detected from fstab':'Not configured'),

      'No crypto config','auto');

    chk('bc_fbe','BoardConfig','TW_INCLUDE_CRYPTO_FBE',

      bc['TW_INCLUDE_CRYPTO_FBE']==='true'||hasFstabFBE,12,

      bc['TW_INCLUDE_CRYPTO_FBE']==='true'?'Explicitly enabled':(hasFstabFBE?'Auto-detected from fstab FBE':'Not configured'),

      'No FBE config','auto');

  }

  chk('bc_meta','BoardConfig','FBE Metadata Decrypt',

    !dataE.some(e=>e.metaEnc)||bc['TW_INCLUDE_FBE_METADATA_DECRYPT']==='true'||modernRecovery,8,

    dataE.some(e=>e.metaEnc)?(bc['TW_INCLUDE_FBE_METADATA_DECRYPT']==='true'?'Explicitly enabled':'Auto-handled'):'Not required',

    'metadata_encryption in fstab but flag not set');

  chk('bc_patch','BoardConfig','PLATFORM_SECURITY_PATCH',!!bc['PLATFORM_SECURITY_PATCH'],16,

    bc['PLATFORM_SECURITY_PATCH'],'NOT SET! Keymaster uses this for key derivation.','critical');

  if(bc['PLATFORM_SECURITY_PATCH']){

    chk('bc_patch_fmt','BoardConfig','Patch Format (YYYY-MM-DD)',/^\d{4}-\d{2}-\d{2}$/.test(bc['PLATFORM_SECURITY_PATCH']),5,

      `Valid: ${bc['PLATFORM_SECURITY_PATCH']}`,`Invalid: "${bc['PLATFORM_SECURITY_PATCH']}"`);

  }

  chk('bc_ver','BoardConfig','PLATFORM_VERSION',!!bc['PLATFORM_VERSION'],5,bc['PLATFORM_VERSION']||'?','Not set');

  chk('bc_fscrypt','BoardConfig','TW_USE_FSCRYPT_POLICY',

    !!bc['TW_USE_FSCRYPT_POLICY']||hasFstabFBE,3,

    bc['TW_USE_FSCRYPT_POLICY']?`= ${bc['TW_USE_FSCRYPT_POLICY']}`:'Auto-detected (not required)',

    'Not set — minor');

  const hwsvcInRC=/hwservicemanager/i.test(allRC);

  chk('hwsvc','Services','hwservicemanager',true,3,

    hwsvcInRC?'Referenced in init.rc':'Auto-started by recovery (OK)','');

  const teeClass=teeSvcs[0]?.className||'';const kmClass=kmSvcs[0]?.className||'';

  const classOrder={core:0,main:1,early_hal:2,hal:3,late_start:4};

  const orderOk=teeSvcs.length===0||kmSvcs.length===0||(classOrder[teeClass]||0)<=(classOrder[kmClass]||99)||teeSvcs.some(s=>s.triggers.length>0);

  chk('svc_order','Services','TEE→Keymaster Order',orderOk,6,`TEE:${teeClass||'?'} KM:${kmClass||'?'}`,

    `TEE (${teeClass}) after KM (${kmClass})`);

  const hasSeclabel=S.initServices.filter(s=>s.isCrypto||s.isTEE).some(s=>s.seclabel.includes('recovery'));

  chk('seclabel','Services','Recovery SELabel',hasSeclabel||S.initServices.filter(s=>s.isCrypto||s.isTEE).length===0,4,

    'seclabel u:r:recovery:s0','No recovery seclabel on crypto services');

  const critBins=S.binaryChecks.filter(b=>b.isCritical);

  const critOk=critBins.filter(b=>b.status==='found'||b.status==='copied').length;

  chk('bins_complete','Binaries',`Crypto Binaries (${critOk}/${critBins.length})`,

    critBins.length===0||critOk===critBins.length,15,

    `${critOk}/${critBins.length} present`,

    `ONLY ${critOk}/${critBins.length}! Missing: ${critBins.filter(b=>b.status==='missing').map(b=>b.binName).join(', ')}`,'critical');

  const propPatch=S.props.all['ro.build.version.security_patch']||S.props.all['ro.vendor.build.security_patch']||'';

  const bcPatch=bc['PLATFORM_SECURITY_PATCH']||'';

  if(propPatch&&bcPatch){

    chk('cross_patch','CrossCheck','Patch Level Match',propPatch===bcPatch,10,

      `Match: ${propPatch}`,`MISMATCH! Props:${propPatch} BC:${bcPatch}`,'critical');

  }

  if(dataE.some(e=>e.fbe)){

    chk('cross_fstab_bc','CrossCheck','Fstab↔BoardConfig FBE',

      bc['TW_INCLUDE_CRYPTO_FBE']==='true'||hasFstabFBE,3,

      bc['TW_INCLUDE_CRYPTO_FBE']==='true'?'Both explicit':'Fstab has FBE — auto-detected',

      'No FBE anywhere');

  }

  // === Android Version-Specific Checks ===
  if(S.androidVersion && S.androidVersion.version){
    const ver = S.androidVersion.version;
    const verFlags = VERSION_FLAGS[ver] || { required: [], optional: [], removed: [] };
    const verLibs = VERSION_LIBRARIES[ver] || [];
    const verServiceClass = VERSION_SERVICE_CLASS[ver] || { tee: 'core', keymaster: 'hal', gatekeeper: 'hal' };
    
    // Version Badge
    chk('android_version','Version',`${S.androidVersion.name} (API ${S.androidVersion.apiLevel})`,true,3,
      `Detected via ${S.androidVersion.source}`,'');
    
    // === Version-Specific Flag Checks ===
    // Check required flags
    for(const flag of (verFlags.required || [])){
      const hasFlag = bc[flag] === 'true';
      chk(`ver_flag_${flag.toLowerCase()}`,'Version Flags',flag,hasFlag,8,
        `${flag} := true`,`MISSING: ${flag} := true — Required for Android ${ver}`,'high');
    }
    
    // Check removed flags (should NOT be present)
    for(const flag of (verFlags.removed || [])){
      const hasFlag = bc[flag] === 'true';
      if(hasFlag){
        chk(`ver_flag_removed_${flag.toLowerCase()}`,'Version Flags',`${flag} (Removed)`,false,6,
          '','SHOULD BE REMOVED: ${flag} is deprecated for Android ${ver}','high');
      }
    }
    
    // === Version-Specific Service Class Checks ===
    if(teeSvcs.length > 0){
      const teeClassOk = teeSvcs.some(s => s.className === verServiceClass.tee);
      chk('ver_tee_class','Version Services',`TEE class '${verServiceClass.tee}'`,teeClassOk,5,
        `TEE daemon uses class ${verServiceClass.tee}`,
        `TEE daemon should use class ${verServiceClass.tee} for Android ${ver}`);
    }
    
    if(kmSvcs.length > 0){
      const kmClassOk = kmSvcs.some(s => s.className === verServiceClass.keymaster);
      chk('ver_km_class','Version Services',`Keymaster class '${verServiceClass.keymaster}'`,kmClassOk,7,
        `Keymaster uses class ${verServiceClass.keymaster}`,
        `Keymaster should use class ${verServiceClass.keymaster} for Android ${ver}`);
    }
    
    if(gkSvcs.length > 0){
      const gkClassOk = gkSvcs.some(s => s.className === verServiceClass.gatekeeper);
      chk('ver_gk_class','Version Services',`Gatekeeper class '${verServiceClass.gatekeeper}'`,gkClassOk,4,
        `Gatekeeper uses class ${verServiceClass.gatekeeper}`,
        `Gatekeeper should use class ${verServiceClass.gatekeeper} for Android ${ver}`);
    }
    
    // === Version-Specific Library Checks ===
    const modules = S.recoveryLibs?.modules || [];
    const sourceFiles = S.recoveryLibs?.sourceFiles || [];
    const missingVerLibs = verLibs.filter(lib => {
      return !modules.some(m => m.toLowerCase().includes(lib.toLowerCase())) &&
             !sourceFiles.some(s => s.toLowerCase().includes(lib.toLowerCase()));
    });
    
    if(missingVerLibs.length > 0){
      chk('ver_libraries','Version Libraries',`Android ${ver} Libraries`,false,10,
        'All version-specific libraries configured',
        `MISSING for Android ${ver}: ${missingVerLibs.join(', ')}`,'high');
    }
    
    // === Version-Specific Package Checks ===
    const verPkgs = VERSION_PACKAGES[ver] || [];
    if(verPkgs.length > 0){
      const missingPkgs = verPkgs.filter(pkg => {
        return !S.deviceMk.packages.some(p => p.toLowerCase().includes(pkg.toLowerCase()));
      });
      chk('ver_packages','Version Packages',`Android ${ver} Packages`,missingPkgs.length===0,8,
        `All ${verPkgs.length} packages configured`,
        `MISSING for Android ${ver}: ${missingPkgs.join(', ')}`,'high');
    }
    
    // === Version-Specific Keymaster Version Check ===
    // A11: 4.0 is fine
    // A12: 4.1 recommended (warning if missing)
    // A13+: 4.1 REQUIRED (error if missing)
    if(ver >= 12 && kmSvcs.length > 0){
      const hasKm41 = kmSvcs.some(s => 
        s.binary.includes('keymaster@4.1') || 
        s.binary.includes('keymaster-4-1') ||
        s.interfaceDecls?.some(i => i.includes('@4.1'))
      );
      
      if(ver >= 13){
        // A13+: Keymaster 4.1 REQUIRED
        chk('ver_km_41','Version Keymaster','Keymaster 4.1 Support',hasKm41,8,
          'Keymaster 4.1 service found',
          'Android 13+ requires Keymaster 4.1 for proper decryption','critical');
      } else if(ver === 12){
        // A12: Keymaster 4.1 recommended
        chk('ver_km_41','Version Keymaster','Keymaster 4.1 Support',hasKm41,4,
          'Keymaster 4.1 service found (recommended)',
          'Android 12 recommends Keymaster 4.1 for full compatibility');
      }
    }
    
    // === fscrypt v2 Check (Android 13+ ONLY) ===
    if(ver >= 13){
      const fscryptV2 = dataE.some(e => 
        e.fbeSpec && (e.fbeSpec.includes('v2') || e.fbeSpec.includes('v3'))
      );
      chk('ver_fscrypt_v2','Version Crypto','fscrypt v2+ Policy',fscryptV2,6,
        'fscrypt v2+ encryption policy detected',
        'Android 13+ requires fscrypt v2+ policy','high');
    }
    
    // === wrappedkey Check (Android 12+ ONLY) ===
    if(ver >= 12 && dataE.some(e => e.wrapped)){
      const inlineSupport = Object.values(bc).some(v => /inlinecrypt|INLINE_ENCRYPTION/i.test(v)) ||
                           (bc['BOARD_KERNEL_CMDLINE'] || '').includes('inlinecrypt');
      chk('ver_wrappedkey','Version Crypto','wrappedkey + inlinecrypt',inlineSupport,7,
        'inlinecrypt kernel support detected',
        'wrappedkey_v0 requires inlinecrypt kernel support for Android 12+','high');
    }
  }

  // === A15+ Specific Checks ===
  // Only run if Android version is 15+
  const isActuallyA15Plus = S.androidVersion && S.androidVersion.version >= 15;
  if(isActuallyA15Plus){
    chk('a15_compat','A15+','Platform Version (A15+ Compat)',true,5,
      `${S.a15plus.platformVersion} — A15+ compatibility mode detected`,'');
    
    // Check security packages for A15+
    const securityPkgs = S.deviceMk.packages.filter(p => p.includes('android.hardware.security'));
    const missingPkgs = A15_SECURITY_PACKAGES.filter(p => !securityPkgs.includes(p));
    
    chk('a15_security_pkgs','A15+','Security HAL Packages',missingPkgs.length===0,12,
      `All present: ${securityPkgs.join(', ')}`,
      `MISSING: ${missingPkgs.join(', ')} — Required for A15+ decryption`,'critical');
    
    // Check metadata decrypt flag (should be removed for A15+)
    chk('a15_metadata','A15+','Metadata Decrypt (Removed)',!bc['TW_INCLUDE_FBE_METADATA_DECRYPT'],5,
      'Correctly removed for A15+','TW_INCLUDE_FBE_METADATA_DECRYPT should be removed for A15+');
    
    // Check keymaster uses early_hal class
    const kmEarlyHal = kmSvcs.some(s => s.className === 'early_hal');
    chk('a15_km_class','A15+','Keymaster class early_hal',kmEarlyHal||kmSvcs.length===0,8,
      kmSvcs.length>0?'Keymaster uses early_hal class':'N/A',
      'Keymaster should use class early_hal for A15+');
    
    // Check keymaster has interface declarations
    const kmHasInterfaces = kmSvcs.some(s => s.interfaceDecls.length > 0);
    chk('a15_km_interfaces','A15+','Keymaster Interface Declarations',kmHasInterfaces||kmSvcs.length===0,6,
      kmSvcs.length>0?`Found: ${kmSvcs.find(s=>s.interfaceDecls.length>0)?.interfaceDecls.length||0} interfaces`:'N/A',
      'Add interface declarations for proper HAL registration');
    
    // Check keymaster user (should be nobody for security)
    const kmSecureUser = kmSvcs.some(s => s.user === 'nobody');
    chk('a15_km_user','A15+','Keymaster User Security',kmSecureUser||kmSvcs.length===0,4,
      kmSvcs.length>0?'user nobody (secure)':'N/A',
      'Consider using user nobody instead of root');
  }else{
    // Not A15+ compat mode - check platform version is reasonable
    const pv = bc['PLATFORM_VERSION'] || '';
    if(pv && A15_COMPAT_VERSION.test(pv)){
      chk('a15_platform_version','BoardConfig','Platform Version',true,5,pv,'');
    }
  }
  
  // === Filesystem Fallback Checks ===
  if(S.fstabFallbacks && S.fstabFallbacks.length > 0){
    const optimalCount = S.fstabFallbacks.filter(f => f.status === 'optimal').length;
    const warningCount = S.fstabFallbacks.filter(f => f.status === 'warning').length;
    
    chk('fstab_fallback','Fstab','Filesystem Fallback (EROFS→ext4)',optimalCount>0,6,
      `${optimalCount} partitions with fallback`,
      warningCount>0?`${warningCount} EROFS-only partitions - add ext4 fallback`:'No fallback configured');
  }
  
  // === Recovery Library Checks ===
  if(S.recoveryLibs && S.recoveryLibs.missing && S.recoveryLibs.missing.length > 0){
    chk('recovery_libs','Libraries','Keymaster Recovery Libraries',false,10,
      'All libraries configured',
      `Missing: ${S.recoveryLibs.missing.join(', ')} — Add to TARGET_RECOVERY_DEVICE_MODULES`,'high');
  }else if(S.recoveryLibs && S.recoveryLibs.modules && S.recoveryLibs.modules.length > 0){
    chk('recovery_libs','Libraries','Keymaster Recovery Libraries',true,5,
      `${S.recoveryLibs.modules.length} modules configured`,'');
  }
  
  // === Service Trigger Checks ===
  if(S.serviceTriggers){
    const hasTrigger = S.serviceTriggers.hwservicemanager || S.serviceTriggers.vendorListener;
    chk('service_triggers','Services','Service Startup Triggers',hasTrigger,8,
      S.serviceTriggers.hwservicemanager?'hwservicemanager.ready trigger found':
      S.serviceTriggers.vendorListener?'vendor.sys.listener trigger found':'Trigger configured',
      'No service startup triggers found - services may not start automatically');
    
    // Check for init.tee.rc pattern (Trustonic best practice)
    if(S.tee.type === 'trustonic'){
      chk('init_tee_rc','Services','init.tee.rc Pattern',S.serviceTriggers.initTeeRc,4,
        'init.tee.rc file found (recommended pattern)',
        'Consider splitting TEE config into init.tee.rc');
    }
  }
  
  // === Trustonic drbin Checks ===
  if(S.tee.type === 'trustonic' && S.drbinFiles && S.drbinFiles.length > 0){
    const criticalDrbins = S.drbinFiles.filter(d => d.critical);
    const missingCritical = criticalDrbins.filter(d => !d.inTree && !d.referenced);
    
    chk('drbin_critical','Trustonic','Critical drbin Files',missingCritical.length === 0,8,
      'All critical drbins configured',
      `Missing critical drbins: ${missingCritical.map(d=>d.filename).join(', ')}`);
    
    const referencedNotInTree = S.drbinFiles.filter(d => d.referenced && !d.inTree);
    if(referencedNotInTree.length > 0){
      chk('drbin_files','Trustonic','drbin Files in Tree',false,5,
        'All referenced drbins in tree',
        `${referencedNotInTree.length} drbins referenced but not in tree`);
    }
  }
  
  // === TW_FORCE_KEYMASTER_VER Check ===
  if(bc['TW_FORCE_KEYMASTER_VER'] === 'true'){
    chk('force_km_ver','BoardConfig','TW_FORCE_KEYMASTER_VER',true,3,
      'Enabled - forces keymaster version compatibility','N/A');
  }

  // === VINTF Manifest Checks ===
  if(S.xmlManifest && S.xmlManifest.services.length > 0){
    const manifestServices = S.xmlManifest.services;
    
    // Check for keymaster in manifest
    const hasKmManifest = manifestServices.some(s => 
      s.includes('keymaster') || s.includes('Keymaster'));
    chk('vintf_keymaster','VINTF','Keymaster in Manifest',hasKmManifest,6,
      'Keymaster HAL declared in manifest','Keymaster not found in VINTF manifest');
    
    // Check for gatekeeper in manifest
    const hasGkManifest = manifestServices.some(s => 
      s.includes('gatekeeper') || s.includes('Gatekeeper'));
    chk('vintf_gatekeeper','VINTF','Gatekeeper in Manifest',hasGkManifest,4,
      'Gatekeeper HAL declared in manifest','Gatekeeper not found in VINTF manifest');
    
    // Version-specific VINTF checks
    if(S.androidVersion && S.androidVersion.version){
      const ver = S.androidVersion.version;
      const verVintf = VERSION_VINTF_MANIFESTS[ver] || { required: [], optional: [] };
      
      // Check required VINTF declarations
      for(const req of (verVintf.required || [])){
        const hasReq = manifestServices.some(s => s.includes(req));
        chk(`vintf_${req.replace(/[^a-z0-9]/gi,'_')}`,'VINTF',`${req}`,hasReq,7,
          `${req} declared in manifest`,
          `MISSING: ${req} required for Android ${ver} VINTF`,'high');
      }
      
      // Android 15+ specific VINTF checks
      if(ver >= 15){
        const hasKeymint = manifestServices.some(s => s.includes('keymint') || s.includes('Keymint'));
        chk('vintf_keymint','VINTF','Keymint HAL (A15+)',hasKeymint,8,
          'Keymint HAL declared in manifest',
          'Android 15+ requires Keymint HAL in VINTF manifest','high');
        
        const hasSecureClock = manifestServices.some(s => s.includes('secureclock'));
        chk('vintf_secureclock','VINTF','SecureClock HAL (A15+)',hasSecureClock,5,
          'SecureClock HAL declared',
          'Android 15+ requires SecureClock HAL');
        
        const hasSharedSecret = manifestServices.some(s => s.includes('sharedsecret'));
        chk('vintf_sharedsecret','VINTF','SharedSecret HAL (A15+)',hasSharedSecret,5,
          'SharedSecret HAL declared',
          'Android 15+ requires SharedSecret HAL');
      }
    }
  }
  
  // === Version-Specific Init Service Checks ===
  if(S.androidVersion && S.androidVersion.version && S.tee.type !== 'unknown'){
    const ver = S.androidVersion.version;
    const verInitServices = VERSION_INIT_SERVICES[ver];
    
    if(verInitServices){
      // Check for required TEE services
      const teeSvcsFound = verInitServices.tee.filter(svc => 
        S.initServices.some(s => s.name.includes(svc) || s.binary.includes(svc))
      );
      chk('ver_tee_services','Version Services',`TEE Services (${teeSvcsFound.length}/${verInitServices.tee.length})`,
        teeSvcsFound.length === verInitServices.tee.length,6,
        `All TEE services present: ${teeSvcsFound.join(', ')}`,
        `Missing TEE services: ${verInitServices.tee.filter(s => !teeSvcsFound.includes(s)).join(', ')}`);
      
      // Check for required keymaster services
      const kmSvcsFound = verInitServices.keymaster.filter(svc => 
        S.initServices.some(s => s.name.includes(svc) || s.binary.includes(svc))
      );
      chk('ver_km_services','Version Services',`Keymaster Services (${kmSvcsFound.length}/${verInitServices.keymaster.length})`,
        kmSvcsFound.length > 0,8,
        `Keymaster service found: ${kmSvcsFound.join(', ')}`,
        `Missing keymaster services: ${verInitServices.keymaster.filter(s => !kmSvcsFound.includes(s)).join(', ')}`,'high');
      
      // Check for required services (A15+)
      if(verInitServices.required){
        const reqSvcsFound = verInitServices.required.filter(svc =>
          S.initServices.some(s => s.name.includes(svc) || s.binary.includes(svc) || s.name.includes('keymint'))
        );
        if(reqSvcsFound.length < verInitServices.required.length){
          chk('ver_required_services','Version Services','Required Services (A15+)',false,10,
            'All required services present',
            `Missing required services: ${verInitServices.required.filter(s => !reqSvcsFound.includes(s)).join(', ')}`,'critical');
        }
      }
    }
  }
  
  // === Kernel Module Requirements Check ===
  if(S.androidVersion && S.androidVersion.version){
    const ver = S.androidVersion.version;
    const kernelModules = VERSION_KERNEL_MODULES[ver] || [];
    
    // Check kernel cmdline for required modules
    const cmdline = bc['BOARD_KERNEL_CMDLINE'] || '';
    for(const mod of kernelModules){
      const hasModule = cmdline.toLowerCase().includes(mod.toLowerCase());
      chk(`kernel_${mod}`,'Kernel',`${mod} module`,hasModule,4,
        `${mod} support in kernel cmdline`,
        `Consider adding ${mod} to BOARD_KERNEL_CMDLINE`);
    }
  }

}

// VERDICT

function computeVerdict(){

  let earned=0,max=0;const reasons=[];const breakdown={};

  for(const ch of S.checks){

    max+=ch.weight;if(ch.ok)earned+=ch.weight;

    else reasons.push({weight:ch.weight,label:ch.label,msg:ch.msg,cat:ch.cat});

    if(!breakdown[ch.cat])breakdown[ch.cat]={earned:0,max:0};

    breakdown[ch.cat].max+=ch.weight;if(ch.ok)breakdown[ch.cat].earned+=ch.weight;

  }

  const pct=max>0?Math.round(earned/max*100):0;

  let result='uncertain';

  const critFails=S.checks.filter(c=>!c.ok&&(c.severity==='critical'||c.weight>=14));

  const hasMissingBin=S.binaryChecks.some(b=>b.status==='missing'&&b.isCritical);

  const noKm=!S.initServices.some(s=>s.isCrypto);

  // A15+ specific: security packages are critical for A15+ devices
  const a15SecPkgFail = S.a15plus?.isA15Compat && S.checks.some(c=>c.id==='a15_security_pkgs' && !c.ok);

  if(critFails.length>0||hasMissingBin||noKm||a15SecPkgFail)result='fail';

  else if(pct>=75)result='pass';

  if(result==='pass'&&S.binaryChecks.some(b=>b.status==='missing'&&b.isCritical))result='fail';

  reasons.sort((a,b)=>b.weight-a.weight);

  let summary='';

  // Build summary with A15+ awareness
  if(result==='pass'){
    let a15note = '';
    if(S.a15plus?.isA15Compat){
      a15note = ` (A15+ compat mode: ${S.a15plus.platformVersion})`;
    }
    summary = `All critical checks pass. Binaries found, services configured, flags set.${a15note} Decryption SHOULD work.`;
  }else if(result==='fail'){
    const top=reasons.slice(0,3).map(r=>r.label).join(', ');
    let failDetails = [];
    if(hasMissingBin) failDetails.push('Missing crypto binaries');
    if(a15SecPkgFail) failDetails.push('Missing A15+ security packages');
    if(noKm) failDetails.push('No keymaster service');
    summary = `WILL FAIL. Critical: ${top}. ${failDetails.length>0?failDetails.join('; ')+'!':''}`;
  }else{
    summary = 'Cannot confirm. Some checks pass but verification incomplete.';
  }

  S.verdict={result,score:earned,maxScore:max,pct,reasons,breakdown,summary,critFails,hasMissingBin,a15plus:S.a15plus};

}

function analyzeRootCauses(){

  S.rootCauses=[];const bc=S.boardConfig.all;

  const dataE=S.fstab.flatMap(f=>f.entries).filter(e=>e.mount==='/data');

  const tee=S.tee.type,sig=TEE_DB[tee];

  function rc(sev,prob,title,desc,evidence,fix,androidVersion=null){
    S.rootCauses.push({
      severity:sev,
      probability:prob,
      title,
      description:desc,
      evidence:evidence||[],
      fix:fix||'',
      androidVersion:androidVersion
    });
  }

  const missingBins=S.binaryChecks.filter(b=>b.status==='missing'&&b.isCritical);

  if(missingBins.length>0)rc('critical',95,'Missing Crypto Binary Files',

    `${missingBins.length} crypto service(s) reference binaries NOT in device tree.`,

    missingBins.map(b=>`"${b.svc.name}" → ${b.binPath} → ${b.status.toUpperCase()}`),

    `FILE: device/*/prebuilt/crypto/

Add: ${missingBins.map(b=>b.binName).join('\nAdd: ')}

# Extract from stock /vendor and place in prebuilt/ folder
# Then add to device.mk:
+ PRODUCT_COPY_FILES += \\
+     $(LOCAL_PATH)/prebuilt/crypto/${missingBins[0]?.binName||'binary'}:vendor/bin/${missingBins[0]?.binName||'binary'}`);

  const teeSvcs=S.initServices.filter(s=>s.isTEE);

  if(tee!=='unknown'&&teeSvcs.length===0)rc('critical',90,'TEE Daemon Not Defined',

    `${sig?.name} detected but no daemon service in init.rc.`,

    [`Expected: ${sig?.daemons.join(' or ')}`],

    `FILE: init.recovery.*.rc

# Add ${sig?.daemons[0]} service for ${sig?.name}:
+ service ${sig?.daemons[0]} /vendor/bin/${sig?.daemons[0]}
+     class core
+     user root
+     group root system
+     seclabel u:r:recovery:s0
+     oneshot`);

  if(!S.initServices.some(s=>s.isCrypto))rc('critical',95,'No Keymaster/Keymint Service',

    'No keymaster/keymint in any init.rc.',[],

    `FILE: init.recovery.*.rc

# Add keymaster HAL service for ${tee!=='unknown'?sig?.name:'your TEE'}:
+ service vendor.keymaster-${tee!=='unknown'?tee:'4.0'} /vendor/bin/hw/android.hardware.keymaster@4.0-service.${tee!=='unknown'?tee:'default'}
+     class early_hal
+     user system
+     group system drmrpc
+     seclabel u:r:recovery:s0`);

  if(!bc['PLATFORM_SECURITY_PATCH'])rc('critical',85,'PLATFORM_SECURITY_PATCH Not Set',

    'Keymaster checks this during key derivation.',[],

    `FILE: BoardConfig.mk

# Get from stock: adb shell getprop ro.build.version.security_patch
+ PLATFORM_SECURITY_PATCH := 2024-01-05

# Must match stock ROM exactly!`);

  const propPatch=S.props.all['ro.build.version.security_patch']||S.props.all['ro.vendor.build.security_patch']||'';

  const bcPatch=bc['PLATFORM_SECURITY_PATCH']||'';

  if(propPatch&&bcPatch&&propPatch!==bcPatch)rc('critical',80,'Security Patch MISMATCH',

    `Props: "${propPatch}" vs BoardConfig: "${bcPatch}". Must match stock exactly.`,

    [`Props: ${propPatch}`,`Board: ${bcPatch}`],

    `FILE: BoardConfig.mk

# Security patch mismatch detected!
- PLATFORM_SECURITY_PATCH := ${bcPatch}
+ PLATFORM_SECURITY_PATCH := ${propPatch}

# Use the value from stock ROM properties.`);

  const modernTree=!bc['TW_INCLUDE_CRYPTO']&&!bc['TW_INCLUDE_CRYPTO_FBE']&&dataE.some(e=>e.fbe);

  if(!modernTree){

    if(bc['TW_INCLUDE_CRYPTO']!=='true'&&!dataE.some(e=>e.fbe||e.forced))

      rc('critical',90,'No Crypto Configuration','Neither BoardConfig flag nor fstab encryption.',[],

        `FILE: BoardConfig.mk

# Enable decryption:
+ TW_INCLUDE_CRYPTO := true
+ TW_INCLUDE_CRYPTO_FBE := true

# Or add fileencryption= to fstab /data entry.`);

  }

  if(S.fstab.length===0)rc('critical',70,'No Fstab File','Recovery can\'t find mount instructions.',[],

    `FILE: recovery.fstab

# Create minimal recovery.fstab:
+ /data ext4 /dev/block/by-name/userdata flags=fileencryption=aes-256-xts:aes-256-cts:v2+inlinecrypt_optimized+wrappedkey_v0

# Adjust flags based on your device encryption.`);

  else if(!dataE.some(e=>e.fbe))rc('high',65,'Fstab Missing FBE on /data','/data has no fileencryption= flag.',

    dataE.map(e=>`${e.mount}: ${e.flags.substring(0,60)}`),

    `FILE: recovery.fstab

# Add fileencryption flag to /data entry:
- /data ext4 /dev/block/by-name/userdata
+ /data ext4 /dev/block/by-name/userdata flags=fileencryption=aes-256-xts:aes-256-cts:v2

# For wrappedkey devices:
+ /data f2fs /dev/block/by-name/userdata flags=fileencryption=aes-256-xts:aes-256-cts:v2+wrappedkey_v0`);

  if(dataE.some(e=>e.wrapped)){

    const support=Object.values(bc).some(v=>/inlinecrypt|INLINE_ENCRYPTION/i.test(v))||(bc['BOARD_KERNEL_CMDLINE']||'').includes('inlinecrypt');

    if(!support)rc('high',70,'wrappedkey Without Kernel Support','wrappedkey_v0 needs CONFIG_BLK_INLINE_ENCRYPTION.',[],

      `FILE: BoardConfig.mk

# Option 1: Add inlinecrypt to kernel cmdline:
+ BOARD_KERNEL_CMDLINE += inlinecrypt

# Option 2: Remove wrappedkey from fstab:
- flags=fileencryption=aes-256-xts:aes-256-cts:v2+wrappedkey_v0
+ flags=fileencryption=aes-256-xts:aes-256-cts:v2`);

  }

  for(const svc of S.initServices.filter(s=>s.isCrypto||s.isTEE)){

    if(svc.disabled&&svc.triggers.length===0)rc('high',75,`Service "${svc.name}" Dead`,

      'Disabled with no trigger.',[`File: ${svc.file}:${svc.line}`],'Remove "disabled" or add trigger.');

  }

  if(tee==='trustkernel'&&!S.initServices.some(s=>/tee[-_]supplicant/i.test(s.name+s.binary)))

    rc('high',55,'TrustKernel: Missing tee-supplicant','TKCore needs tee-supplicant for key ops.',[],'Add tee-supplicant service');

  // === Android Version-Specific Issues ===
  if(S.androidVersion && S.androidVersion.version){
    const ver = S.androidVersion.version;
    const verFlags = VERSION_FLAGS[ver] || { required: [], optional: [], removed: [] };
    const verLibs = VERSION_LIBRARIES[ver] || [];
    const verServiceClass = VERSION_SERVICE_CLASS[ver] || {};
    
    // Check for missing version-specific flags
    const missingFlags = (verFlags.required || []).filter(f => bc[f] !== 'true');
    if(missingFlags.length > 0){
      rc('high',80,`Android ${ver} Missing Required Flags`,
        `Missing BoardConfig flags required for Android ${ver} decryption`,
        missingFlags.map(f => `${f} := true`),
        `FILE: BoardConfig.mk

# Android ${ver} required flags:
${missingFlags.map(f => `+ ${f} := true`).join('\n')}`, ver);
    }
    
    // Check for deprecated flags that should be removed
    const deprecatedFlags = (verFlags.removed || []).filter(f => bc[f] === 'true');
    if(deprecatedFlags.length > 0){
      rc('medium',65,`Android ${ver} Deprecated Flags Present`,
        `These flags are deprecated/removed for Android ${ver} and may cause issues`,
        deprecatedFlags.map(f => `${f} := ${bc[f]} (should be removed)`),
        `FILE: BoardConfig.mk

# Android ${ver}: Remove these deprecated flags:
${deprecatedFlags.map(f => `- ${f} := ${bc[f]}`).join('\n')}`, ver);
    }
    
    // Check service classes for version compliance
    const kmSvcs = S.initServices.filter(s => s.isCrypto);
    if(kmSvcs.length > 0 && verServiceClass.keymaster){
      const wrongClassKm = kmSvcs.filter(s => s.className !== verServiceClass.keymaster);
      if(wrongClassKm.length > 0){
        rc('high',75,`Android ${ver} Keymaster Class Incorrect`,
          `Keymaster should use class '${verServiceClass.keymaster}' for Android ${ver}`,
          wrongClassKm.map(s => `${s.name}: class ${s.className||'not set'}`),
          `FILE: init.recovery.*.rc

# Android ${ver} keymaster class:
  service keymaster-4-1 /vendor/bin/hw/android.hardware.keymaster@4.1-service.trustonic
-     class ${wrongClassKm[0].className || 'hal'}
+     class ${verServiceClass.keymaster}`, ver);
      }
    }
    
    // Check for missing version-specific libraries
    const modules = S.recoveryLibs?.modules || [];
    const sourceFiles = S.recoveryLibs?.sourceFiles || [];
    const missingVerLibs = verLibs.filter(lib => {
      return !modules.some(m => m.toLowerCase().includes(lib.toLowerCase())) &&
             !sourceFiles.some(s => s.toLowerCase().includes(lib.toLowerCase()));
    });
    if(missingVerLibs.length > 0){
      rc('high',75,`Android ${ver} Missing Recovery Libraries`,
        `Android ${ver} requires specific libraries for keymaster`,
        missingVerLibs.map(l => `Missing: ${l}`),
        `FILE: device.mk

# Android ${ver} recovery libraries:
+ TARGET_RECOVERY_DEVICE_MODULES += \\
${missingVerLibs.map(l => `+     ${l}`).join(' \\\n')}

+ RECOVERY_LIBRARY_SOURCE_FILES += \\
${missingVerLibs.map(l => `+     \$(TARGET_OUT_SHARED_LIBRARIES)/${l}.so`).join(' \\\n')}`, ver);
    }
    
    // Version-specific Keymaster version check
    // A11: 4.0 is fine
    // A12: 4.1 recommended
    // A13+: 4.1 REQUIRED
    if(ver >= 12){
      const kmSvcs = S.initServices.filter(s => s.isCrypto);
      const hasKm41 = kmSvcs.some(s => 
        s.binary.includes('keymaster@4.1') || 
        s.binary.includes('keymaster-4-1') ||
        (s.interfaceDecls || []).some(i => i.includes('@4.1'))
      );
      
      if(ver >= 13 && kmSvcs.length > 0 && !hasKm41){
        // A13+: Keymaster 4.1 REQUIRED
        rc('critical',85,`Android ${ver} Requires Keymaster 4.1`,
          'Android 13+ devices MUST use Keymaster 4.1 for full decryption compatibility',
          kmSvcs.map(s => `Found: ${s.binary}`),
          `FILE: device.mk or prebuilt/

# Android ${ver} requires Keymaster 4.1:
# Either add keymaster 4.1 service binary or update existing:
+ PRODUCT_PACKAGES += android.hardware.keymaster@4.1-service.trustonic

# Or in init.recovery.*.rc:
  service keymaster-4-1 /vendor/bin/hw/android.hardware.keymaster@4.1-service.trustonic
+     interface android.hardware.keymaster@4.0::IKeymasterDevice default
+     interface android.hardware.keymaster@4.1::IKeymasterDevice default
      class early_hal`, ver);
      } else if(ver === 12 && kmSvcs.length > 0 && !hasKm41){
        // A12: Keymaster 4.1 recommended
        rc('medium',60,`Android 12: Keymaster 4.1 Recommended`,
          'Android 12 works better with Keymaster 4.1, though 4.0 is still supported',
          kmSvcs.map(s => `Found: ${s.binary}`),
          `FILE: device.mk or prebuilt/

# Android 12 recommends Keymaster 4.1:
# Consider upgrading from 4.0 to 4.1 for better compatibility:
+ PRODUCT_PACKAGES += android.hardware.keymaster@4.1-service.trustonic`, ver);
      }
    }
    
    // fscrypt v2 check for Android 13+
    if(ver >= 13){
      const hasV2 = dataE.some(e => e.fbeSpec && (e.fbeSpec.includes('v2') || e.fbeSpec.includes('v3')));
      if(!hasV2 && dataE.some(e => e.fbe)){
        rc('medium',60,`Android ${ver} Should Use fscrypt v2+`,
          'Android 13+ devices should use fscrypt v2 or v3 encryption policy',
          dataE.map(e => `Current: ${e.fbeSpec||'unspecified'}`),
          `FILE: recovery.fstab

# Android ${ver} fscrypt v2 policy:
- /data f2fs /dev/block/by-name/userdata flags=fileencryption=aes-256-xts:aes-256-cts:v1
+ /data f2fs /dev/block/by-name/userdata flags=fileencryption=aes-256-xts:aes-256-cts:v2

# Or v3 for newer devices:
+ /data f2fs /dev/block/by-name/userdata flags=fileencryption=aes-256-xts:aes-256-cts:v3`, ver);
      }
    }
  }

  // === A15+ Specific Issues ===
  // Only run if Android version is 15+
  const isActuallyA15PlusIssues = S.androidVersion && S.androidVersion.version >= 15;
  if(isActuallyA15PlusIssues){
    const securityPkgs = S.deviceMk.packages.filter(p => p.includes('android.hardware.security'));
    const missingPkgs = A15_SECURITY_PACKAGES.filter(p => !securityPkgs.includes(p));
    
    if(missingPkgs.length > 0){
      rc('critical',95,'A15+ Missing Security Packages',
        `Android 15+ requires keymint/security HAL packages. Missing: ${missingPkgs.join(', ')}`,
        [`Platform version: ${S.a15plus.platformVersion}`],
        `FILE: device.mk

# Add required A15+ security packages:
+ PRODUCT_PACKAGES += \\
+     android.hardware.security.keymint \\
+     android.hardware.security.secureclock \\
+     android.hardware.security.sharedsecret`, 15);
    }
    
    const kmSvcs = S.initServices.filter(s => s.isCrypto);
    if(kmSvcs.length > 0){
      // Check keymaster uses early_hal
      if(kmSvcs.some(s => s.className !== 'early_hal')){
        rc('high',70,'A15+ Keymaster Class Should Be early_hal',
          'Keymaster should use class early_hal for A15+ compatibility',
          kmSvcs.map(s => `${s.name}: class ${s.className||'not set'}`),
          `FILE: init.recovery.*.rc

# Change keymaster class to early_hal:
- service vendor.keymaster ... \n-     class hal
+ service vendor.keymaster ... \n+     class early_hal`, 15);
      }
      
      // Check keymaster has interface declarations
      if(kmSvcs.some(s => !s.interfaceDecls || s.interfaceDecls.length === 0)){
        rc('medium',60,'A15+ Keymaster Missing Interface Declarations',
          'Interface declarations are required for proper HAL registration on A15+',
          kmSvcs.filter(s => !s.interfaceDecls?.length).map(s => s.name),
          `FILE: init.recovery.*.rc

# Add interface declarations to keymaster service:
  service vendor.keymaster-4-1-trustonic /vendor/bin/hw/android.hardware.keymaster@4.1-service.trustonic
+     interface android.hardware.keymaster@4.0::IKeymasterDevice default
+     interface android.hardware.keymaster@4.1::IKeymasterDevice default
      class early_hal`, 15);
      }
    }
    
    // Check for BOARD_SUPPRESS_SECURE_ERASE
    if(bc['BOARD_SUPPRESS_SECURE_ERASE'] !== 'true'){
      rc('low',40,'A15+ Consider BOARD_SUPPRESS_SECURE_ERASE',
        'This flag helps prevent secure erase failures in recovery on some devices',
        [],
        `FILE: BoardConfig.mk

# Add to prevent secure erase issues:
+ BOARD_SUPPRESS_SECURE_ERASE := true`, 15);
    }
  }
  
  // === Filesystem Fallback Issues ===
  if(S.fstabFallbacks && S.fstabFallbacks.some(f => f.status === 'warning')){
    const warnings = S.fstabFallbacks.filter(f => f.status === 'warning');
    rc('medium',50,'EROFS Partitions Without ext4 Fallback',
      'Some EROFS partitions lack ext4 fallback, which may cause mount failures in recovery',
      warnings.map(f => f.message),
      `FILE: fstab.mt6833 or recovery.fstab

# Add ext4 fallback entries for EROFS partitions:
  system /system erofs ro wait,slotselect,avb=vbmeta_system,logical,first_stage_mount
+ system /system ext4 ro wait,slotselect,avb=vbmeta_system,logical,first_stage_mount

  vendor /vendor erofs ro wait,slotselect,avb,logical,first_stage_mount
+ vendor /vendor ext4 ro wait,slotselect,avb,logical,first_stage_mount`);
  }
  
  // === Recovery Library Issues ===
  if(S.recoveryLibs && S.recoveryLibs.missing && S.recoveryLibs.missing.length > 0){
    rc('high',70,'Missing Keymaster Recovery Libraries',
      'Keymaster requires specific libraries for decryption. Missing libraries may cause keymaster to fail.',
      S.recoveryLibs.missing.map(l => `Missing: ${l}`),
      `FILE: device.mk

# Add missing keymaster libraries:
+ TARGET_RECOVERY_DEVICE_MODULES += \\
+     libkeymaster4 \\
+     libkeymaster41 \\
+     libpuresoftkeymasterdevice \\
+     libion \\
+     libxml2

+ RECOVERY_LIBRARY_SOURCE_FILES += \\
+     \$(TARGET_OUT_SHARED_LIBRARIES)/libkeymaster4.so \\
+     \$(TARGET_OUT_SHARED_LIBRARIES)/libkeymaster41.so \\
+     \$(TARGET_OUT_SHARED_LIBRARIES)/libpuresoftkeymasterdevice.so \\
+     \$(TARGET_OUT_SHARED_LIBRARIES)/libion.so \\
+     \$(TARGET_OUT_SHARED_LIBRARIES)/libxml2.so`);
  }
  
  // === Service Trigger Issues ===
  if(S.serviceTriggers && !S.serviceTriggers.hwservicemanager && !S.serviceTriggers.vendorListener){
    const teeSvcs = S.initServices.filter(s => s.isTEE);
    const kmSvcs = S.initServices.filter(s => s.isCrypto);
    if(teeSvcs.length > 0 || kmSvcs.length > 0){
      rc('medium',60,'Missing Service Startup Triggers',
        'Services are disabled but have no startup triggers. They may never start.',
        ['Expected: on property:hwservicemanager.ready=true or on property:vendor.sys.listener.registered=true'],
        `FILE: init.recovery.*.rc

# Add trigger to start crypto services:
+ on property:hwservicemanager.ready=true
+     start mobicore
+     start keymaster-4-1
+     start gatekeeper-1-0`);
    }
  }
  
  // === Trustonic drbin Issues ===
  if(S.tee.type === 'trustonic' && S.drbinFiles && S.drbinFiles.length > 0){
    const missingCritical = S.drbinFiles.filter(d => d.critical && !d.inTree && !d.referenced);
    if(missingCritical.length > 0){
      rc('high',75,'Trustonic Missing Critical drbin Files',
        'Critical drbin files are not configured. These are required for keymaster/drm functionality.',
        missingCritical.map(d => `${d.filename} (${d.description})`),
        `FILE: init.tee.rc or init.recovery.*.rc

# Ensure mobicore service includes critical drbin files:
  service mobicore /vendor/bin/mcDriverDaemon --sfs-reformat --P1 /mnt/vendor/persist/mcRegistry \\
+     -r /vendor/app/mcRegistry/06090000000000000000000000000000.drbin \\
+     -r /vendor/app/mcRegistry/020f0000000000000000000000000000.drbin \\
+     -r /vendor/app/mcRegistry/05120000000000000000000000000000.drbin \\
      ...

# These drbin files should be extracted from stock vendor partition`);
    }
    
    // Check if mcDriverDaemon has correct arguments
    const teeSvc = S.initServices.find(s => s.isTEE);
    if(teeSvc && teeSvc.args){
      const hasSfsReformat = teeSvc.args.includes('--sfs-reformat');
      const hasP1 = teeSvc.args.includes('--P1');
      if(!hasSfsReformat || !hasP1){
        rc('medium',55,'Trustonic Daemon Missing Arguments',
          'mcDriverDaemon should include --sfs-reformat and --P1 arguments for proper recovery operation',
          [`Current args: ${teeSvc.args}`],
          `FILE: init.tee.rc

  service mobicore /vendor/bin/mcDriverDaemon --sfs-reformat --P1 /mnt/vendor/persist/mcRegistry \\
      -r /vendor/app/mcRegistry/xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx.drbin \\
      ...`);
      }
    }
  }

  // === VINTF Manifest Issues ===
  if(S.xmlManifest && S.xmlManifest.services){
    const manifestServices = S.xmlManifest.services;
    
    // Check for missing keymaster in manifest
    const hasKmManifest = manifestServices.some(s => 
      s.toLowerCase().includes('keymaster') || s.toLowerCase().includes('keymint'));
    if(!hasKmManifest){
      rc('high',70,'VINTF Missing Keymaster/Keymint HAL',
        'No keymaster or keymint HAL declared in VINTF manifest. This may cause HAL registration failures.',
        ['Checked: manifest.xml, compatibility_matrix.xml, vintf manifest files'],
        `FILE: manifest.xml or device.mk

# Add VINTF manifest for keymaster:
+ <hal format="hidl">
+     <name>android.hardware.keymaster@4.1</name>
+     <transport>hwbinder</transport>
+     <version>4.1</version>
+     <interface>
+         <name>IKeymasterDevice</name>
+         <instance>default</instance>
+     </interface>
+ </hal>

# Or in device.mk:
+ PRODUCT_PACKAGES += android.hardware.keymaster@4.1-service.trustonic`);
    }
    
    // Version-specific VINTF issues
    if(S.androidVersion && S.androidVersion.version){
      const ver = S.androidVersion.version;
      const verVintf = VERSION_VINTF_MANIFESTS[ver] || { required: [], optional: [] };
      
      const missingVintf = (verVintf.required || []).filter(req => 
        !manifestServices.some(s => s.includes(req))
      );
      
      if(missingVintf.length > 0){
        rc('high',80,`Android ${ver} Missing VINTF Declarations`,
          `Required VINTF declarations for Android ${ver} are missing`,
          missingVintf.map(v => `Missing: ${v}`),
          `FILE: manifest.xml or device.mk

# Android ${ver} required VINTF declarations:
${missingVintf.map(v => `+ Ensure ${v} is declared in manifest or built from source`).join('\n')}`, ver);
      }
      
      // A15+ Keymint check
      if(ver >= 15){
        const hasKeymint = manifestServices.some(s => s.toLowerCase().includes('keymint'));
        if(!hasKeymint){
          rc('critical',90,'Android 15+ Missing Keymint HAL',
            'Android 15+ requires Keymint HAL instead of Keymaster for FBE decryption',
            [`Current: keymaster detected, but A15+ requires keymint`],
            `FILE: device.mk

# Android 15+ requires Keymint packages:
+ PRODUCT_PACKAGES += \\
+     android.hardware.security.keymint \\
+     android.hardware.security.secureclock \\
+     android.hardware.security.sharedsecret`, 15);
        }
      }
    }
  }
  
  // === Kernel Module Issues ===
  if(S.androidVersion && S.androidVersion.version){
    const ver = S.androidVersion.version;
    const kernelModules = VERSION_KERNEL_MODULES[ver] || [];
    const cmdline = bc['BOARD_KERNEL_CMDLINE'] || '';
    
    const missingModules = kernelModules.filter(mod => 
      !cmdline.toLowerCase().includes(mod.toLowerCase())
    );
    
    if(missingModules.length > 0){
      rc('medium',50,`Missing Kernel Module Support`,
        `Kernel modules required for Android ${ver} encryption may not be enabled`,
        missingModules.map(m => `Missing: ${m}`),
        `FILE: BoardConfig.mk

# Add kernel cmdline for encryption modules:
+ BOARD_KERNEL_CMDLINE += ${missingModules.join(' ')}

# Or ensure kernel config has:
# CONFIG_INLINE_ENCRYPTION=y
# CONFIG_FS_ENCRYPTION=y`, ver);
    }
  }
  
  // === Version-Specific Service Issues ===
  if(S.androidVersion && S.androidVersion.version && S.tee.type !== 'unknown'){
    const ver = S.androidVersion.version;
    const verInitServices = VERSION_INIT_SERVICES[ver];
    
    if(verInitServices){
      // Check TEE services
      const teeSvcsFound = verInitServices.tee.filter(svc => 
        S.initServices.some(s => s.name.includes(svc) || s.binary.includes(svc))
      );
      if(teeSvcsFound.length < verInitServices.tee.length){
        const missing = verInitServices.tee.filter(svc => !teeSvcsFound.includes(svc));
        rc('medium',60,'Missing TEE Service for Android Version',
          `Expected TEE service(s) not found for Android ${ver}`,
          missing.map(m => `Expected: ${m}`),
          `FILE: init.recovery.*.rc

# Add missing TEE service:
+ service ${missing[0]} /vendor/bin/${missing[0]}
+     class core
+     user root
+     group root system
+     disabled
+     seclabel u:r:recovery:s0`, ver);
      }
      
      // Check keymaster services
      const kmSvcsFound = verInitServices.keymaster.filter(svc => 
        S.initServices.some(s => s.name.includes(svc) || s.binary.includes(svc))
      );
      if(kmSvcsFound.length === 0 && S.initServices.filter(s=>s.isCrypto).length === 0){
        rc('high',75,`Android ${ver} Missing Keymaster Service`,
          `Expected keymaster service for Android ${ver} not found`,
          verInitServices.keymaster.map(k => `Expected: ${k}`),
          `FILE: init.recovery.*.rc

# Add keymaster service for Android ${ver}:
+ service ${verInitServices.keymaster[0]} /vendor/bin/hw/android.hardware.keymaster@4.${ver >= 13 ? '1' : '0'}-service.${S.tee.type}
+     class early_hal
+     user system
+     group system drmrpc
+     disabled
+     seclabel u:r:recovery:s0`, ver);
      }
      
      // A15+ required services
      if(verInitServices.required && ver >= 15){
        const reqSvcsFound = verInitServices.required.filter(svc =>
          S.initServices.some(s => s.name.toLowerCase().includes(svc.toLowerCase()) || 
                                    s.binary.toLowerCase().includes(svc.toLowerCase()) ||
                                    s.name.toLowerCase().includes('keymint'))
        );
        if(reqSvcsFound.length < verInitServices.required.length){
          rc('critical',85,'Android 15+ Missing Required Keymint Services',
            `Android 15+ requires Keymint services for FBE decryption`,
            verInitServices.required.filter(s => !reqSvcsFound.includes(s)),
            `FILE: device.mk and init.recovery.*.rc

# Android 15+ requires Keymint:
+ PRODUCT_PACKAGES += android.hardware.security.keymint-service

# In init.recovery.*.rc:
+ service vendor.keymint-service /vendor/bin/hw/android.hardware.security.keymint-service
+     class early_hal
+     user nobody
+     group system drmrpc
+     seclabel u:r:recovery:s0`, 15);
        }
      }
    }
  }

  S.rootCauses.sort((a,b)=>b.probability-a.probability);

}

// GENERATE FIXES

// =================================================================

function generateFixes(){

  S.fixes=[];const tee=S.tee.type,sig=TEE_DB[tee],bc=S.boardConfig.all;

  const dataE=S.fstab.flatMap(f=>f.entries).filter(e=>e.mount==='/data');

  const hasFstabFBE_=dataE.some(e=>e.fbe);

  const isModern_=!bc['TW_INCLUDE_CRYPTO']&&!bc['TW_INCLUDE_CRYPTO_FBE']&&hasFstabFBE_;

  // General: always useful fixes

  const genLines=[];

  genLines.push({type:'header',text:'@@ General Recovery Decryption Recommendations @@'});

  genLines.push({type:'context',text:'# These apply to ALL MediaTek recovery trees'});

  genLines.push({type:'add',text:'# 1. Ensure PLATFORM_SECURITY_PATCH matches stock ROM exactly'});

  genLines.push({type:'add',text:'# 2. Ensure TEE daemon, keymaster, and gatekeeper binaries are present'});

  genLines.push({type:'add',text:'# 3. All crypto services need: seclabel u:r:recovery:s0'});

  genLines.push({type:'add',text:'# 4. TEE daemon must start BEFORE keymaster (class core vs early_hal)'});

  genLines.push({type:'add',text:'# 5. Check /dev nodes exist: '+

    (tee!=='unknown'?sig.devNodes.join(', '):'/dev/tee0, /dev/mobicore')});

  S.fixes.push({title:'General Recommendations',file:'README',lines:genLines,prio:'Info',

    raw:genLines.filter(l=>l.type==='add').map(l=>l.text).join('\n')});

  // BoardConfig fixes

  const bcLines=[];

  bcLines.push({type:'header',text:'@@ BoardConfig.mk — Decryption Flags @@'});

  if(isModern_){

    bcLines.push({type:'context',text:'# Modern build: crypto auto-detected from fstab'});

    bcLines.push({type:'context',text:'# TW_INCLUDE_CRYPTO and TW_INCLUDE_CRYPTO_FBE not needed'});

  }else{

    const bcChecks=[

      {key:'TW_INCLUDE_CRYPTO',val:'true',cur:bc['TW_INCLUDE_CRYPTO'],note:'Enable decryption'},

      {key:'TW_INCLUDE_CRYPTO_FBE',val:'true',cur:bc['TW_INCLUDE_CRYPTO_FBE'],note:'Enable FBE'},

      {key:'TW_INCLUDE_FBE_METADATA_DECRYPT',val:'true',cur:bc['TW_INCLUDE_FBE_METADATA_DECRYPT'],note:dataE.some(e=>e.metaEnc)?'Required: fstab has metadata_encryption':'Optional'},

      {key:'BOARD_USES_METADATA_PARTITION',val:'true',cur:bc['BOARD_USES_METADATA_PARTITION'],note:'Metadata partition'},

      {key:'TW_USE_FSCRYPT_POLICY',val:'2',cur:bc['TW_USE_FSCRYPT_POLICY'],note:'Optional: TWRP can auto-detect'},

    ];

    for(const c of bcChecks){

      if(c.cur===c.val){bcLines.push({type:'context',text:`${c.key} := ${c.val}`});}

      else{

        if(c.cur)bcLines.push({type:'remove',text:`${c.key} := ${c.cur}`});

        bcLines.push({type:'add',text:`${c.key} := ${c.val} # ${c.note}`});

      }

    }

  }

  bcLines.push({type:'header',text:'@@ Platform — MUST match stock ROM! @@'});

  const patchChecks=[

    {key:'PLATFORM_VERSION',val:bc['PLATFORM_VERSION']||'14.0.0',cur:bc['PLATFORM_VERSION']},

    {key:'PLATFORM_SECURITY_PATCH',val:bc['PLATFORM_SECURITY_PATCH']||'2024-01-05',cur:bc['PLATFORM_SECURITY_PATCH']},

    {key:'VENDOR_SECURITY_PATCH',val:bc['VENDOR_SECURITY_PATCH']||'2024-01-05',cur:bc['VENDOR_SECURITY_PATCH']},

  ];

  for(const c of patchChecks){

    if(c.cur){bcLines.push({type:'context',text:`${c.key} := ${c.cur}`});}

    else{bcLines.push({type:'add',text:`${c.key} := ${c.val}`});}

  }

  S.fixes.push({title:'BoardConfig.mk — Crypto Flags',file:'BoardConfig.mk',lines:bcLines,prio:'P0',

    raw:bcLines.filter(l=>l.type==='add'||l.type==='context').map(l=>l.text).join('\n')});

  if(tee!=='unknown'){

    const rcLines=[];

    rcLines.push({type:'header',text:`@@ ${sig.name} — Recovery Init Service @@`});

    const daemon=sig.daemons[0];

    const binPath=tee==='trustonic'?'/vendor/bin/mcDriverDaemon':`/vendor/bin/${daemon}`;

    const existingTEE=S.initServices.find(s=>s.isTEE);

    if(existingTEE){

      rcLines.push({type:'context',text:`# Existing TEE daemon: ${existingTEE.name} (${existingTEE.file})`});

      if(!S.binaryChecks.find(b=>b.svc.name===existingTEE.name&&(b.status==='found'||b.status==='copied'))){

        rcLines.push({type:'remove',text:`# Binary NOT FOUND: ${existingTEE.binary}`});

        rcLines.push({type:'add',text:`# Fix: copy ${existingTEE.binary.split('/').pop()} to prebuilt/`});

      }

    }else{

      rcLines.push({type:'add',text:`service ${daemon} ${binPath}`});

      rcLines.push({type:'add',text:'    class core'});

      rcLines.push({type:'add',text:'    user root'});

      rcLines.push({type:'add',text:'    group root'});

      rcLines.push({type:'add',text:'    disabled'});

      rcLines.push({type:'add',text:'    seclabel u:r:recovery:s0'});

      rcLines.push({type:'add',text:''});

      rcLines.push({type:'add',text:'on property:hwservicemanager.ready=true'});

      rcLines.push({type:'add',text:`    start ${daemon}`});

    }

    if(tee==='trustkernel'){

      rcLines.push({type:'header',text:'@@ TrustKernel: tee-supplicant (REQUIRED pair) @@'});

      const hasSup=S.initServices.some(s=>/tee[-_]supplicant/i.test(s.name+s.binary));

      if(!hasSup){

        rcLines.push({type:'add',text:'service tee-supplicant /vendor/bin/tee-supplicant'});

        rcLines.push({type:'add',text:'    class core'});rcLines.push({type:'add',text:'    user root'});

        rcLines.push({type:'add',text:'    group root'});rcLines.push({type:'add',text:'    disabled'});

        rcLines.push({type:'add',text:'    seclabel u:r:recovery:s0'});rcLines.push({type:'add',text:''});

        rcLines.push({type:'add',text:'on property:vendor.trustkernel.ready=true'});

        rcLines.push({type:'add',text:'    start tee-supplicant'});

      }else{rcLines.push({type:'context',text:'# tee-supplicant already defined'});}

    }

    rcLines.push({type:'header',text:'@@ Keymaster HAL @@'});

    const existingKM=S.initServices.find(s=>s.isCrypto);

    if(existingKM){

      rcLines.push({type:'context',text:`# Existing: ${existingKM.name} (${existingKM.file})`});

      if(!S.binaryChecks.find(b=>b.svc.name===existingKM.name&&(b.status==='found'||b.status==='copied'))){

        rcLines.push({type:'remove',text:`# Binary NOT FOUND: ${existingKM.binary}`});

        rcLines.push({type:'add',text:`# Fix: copy ${existingKM.binary.split('/').pop()} to prebuilt/`});

      }

    }else{

      const kmBin=sig.kmBins[0]||`android.hardware.keymaster@4.0-service.${tee}`;

      rcLines.push({type:'add',text:`service keymaster-4-0 /vendor/bin/hw/${kmBin}`});

      rcLines.push({type:'add',text:'    class early_hal'});rcLines.push({type:'add',text:'    user system'});

      rcLines.push({type:'add',text:'    group system drmrpc'});rcLines.push({type:'add',text:'    disabled'});

      rcLines.push({type:'add',text:'    seclabel u:r:recovery:s0'});rcLines.push({type:'add',text:''});

      rcLines.push({type:'add',text:'on property:hwservicemanager.ready=true'});

      rcLines.push({type:'add',text:'    start keymaster-4-0'});

    }

    rcLines.push({type:'header',text:'@@ Gatekeeper HAL @@'});

    const existingGK=S.initServices.find(s=>s.isGK);

    if(existingGK){rcLines.push({type:'context',text:`# Existing: ${existingGK.name} (${existingGK.file})`});}

    else{

      rcLines.push({type:'add',text:'service gatekeeper-1-0 /vendor/bin/hw/android.hardware.gatekeeper@1.0-service'});

      rcLines.push({type:'add',text:'    class early_hal'});rcLines.push({type:'add',text:'    user system'});

      rcLines.push({type:'add',text:'    group system'});rcLines.push({type:'add',text:'    disabled'});

      rcLines.push({type:'add',text:'    seclabel u:r:recovery:s0'});rcLines.push({type:'add',text:''});

      rcLines.push({type:'add',text:'on property:hwservicemanager.ready=true'});

      rcLines.push({type:'add',text:'    start gatekeeper-1-0'});

    }

    S.fixes.push({title:`init.recovery.${tee}.rc`,file:`init.recovery.${tee}.rc`,lines:rcLines,prio:'P0',

      raw:rcLines.filter(l=>l.type==='add'||l.type==='context').map(l=>l.text).join('\n')});

  }

  const missingBins=S.binaryChecks.filter(b=>b.status==='missing'&&b.isCritical);

  if(missingBins.length>0){

    const mbLines=[];

    mbLines.push({type:'header',text:'@@ Missing Binary Files — Extract from Stock ROM @@'});

    mbLines.push({type:'context',text:'# Step 1: Extract stock firmware'});

    mbLines.push({type:'context',text:'# Step 2: Mount vendor.img'});

    mbLines.push({type:'context',text:'# Step 3: Copy these files to prebuilt/'});

    mbLines.push({type:'context',text:''});

    for(const b of missingBins){

      mbLines.push({type:'remove',text:`# MISSING: ${b.svc.name} → ${b.binPath}`});

      mbLines.push({type:'add',text:`PRODUCT_COPY_FILES += \\`});

      mbLines.push({type:'add',text:`    $(LOCAL_PATH)/prebuilt/${b.binName}:$(TARGET_COPY_OUT_RECOVERY)/root/${b.binPath}`});

      mbLines.push({type:'context',text:''});

    }

    S.fixes.push({title:'Missing Binary COPY_FILES',file:'device.mk',lines:mbLines,prio:'P0',

      raw:mbLines.filter(l=>l.type==='add').map(l=>l.text).join('\n')});

  }

  const dbLines=[];

  dbLines.push({type:'header',text:'@@ Decrypt Debug Script @@'});

  dbLines.push({type:'add',text:'#!/sbin/sh'});

  dbLines.push({type:'add',text:'echo "=== CRYPTO STATE ==="'});

  dbLines.push({type:'add',text:'getprop ro.crypto.state'});

  dbLines.push({type:'add',text:'getprop ro.crypto.type'});

  dbLines.push({type:'add',text:''});

  dbLines.push({type:'add',text:'echo "=== PATCH LEVEL ==="'});

  dbLines.push({type:'add',text:'getprop ro.build.version.security_patch'});

  dbLines.push({type:'add',text:''});

  dbLines.push({type:'add',text:'echo "=== SERVICES ==="'});

  dbLines.push({type:'add',text:'ps -A | grep -iE "keymaster|keymint|gatekeeper|teed|mobicore|mcDriver|isee|teei"'});

  dbLines.push({type:'add',text:''});

  dbLines.push({type:'add',text:'echo "=== TEE NODES ==="'});

  dbLines.push({type:'add',text:'ls -la /dev/tee* /dev/mobicore* /dev/TEEI* /dev/isee* 2>/dev/null'});

  dbLines.push({type:'add',text:''});

  dbLines.push({type:'add',text:'echo "=== VOLD ERRORS ==="'});

  dbLines.push({type:'add',text:'logcat -d -s vold:* | grep -iE "error|fail" | tail -20'});

  dbLines.push({type:'add',text:''});

  dbLines.push({type:'add',text:'echo "=== KM ERRORS ==="'});

  dbLines.push({type:'add',text:'logcat -d | grep -iE "keymaster|keymint" | grep -iE "error|fail|die" | tail -20'});

  S.fixes.push({title:'Debug Script',file:'debug_decrypt.sh',lines:dbLines,prio:'P2',

    raw:dbLines.filter(l=>l.type==='add').map(l=>l.text).join('\n')});

  // === A15+ Specific Fixes ===
  // Only run if Android version is 15+
  const isActuallyA15PlusFixes = S.androidVersion && S.androidVersion.version >= 15;
  if(isActuallyA15PlusFixes){
    const a15Lines = [];
    
    a15Lines.push({type:'header',text:'@@ Android 15+ Compatibility @@'});
    a15Lines.push({type:'context',text:`# Platform version: ${S.a15plus.platformVersion} (A15+ compat mode)`});
    
    // Security packages
    const securityPkgs = S.deviceMk.packages.filter(p => p.includes('android.hardware.security'));
    const missingPkgs = A15_SECURITY_PACKAGES.filter(p => !securityPkgs.includes(p));
    
    if(missingPkgs.length > 0){
      a15Lines.push({type:'remove',text:'# Missing security packages for A15+'});
      a15Lines.push({type:'add',text:'PRODUCT_PACKAGES += \\'});
      for(const p of missingPkgs){
        a15Lines.push({type:'add',text:`    ${p} \\`});
      }
    }else{
      a15Lines.push({type:'context',text:'# Security packages OK'});
    }
    
    // Keymaster class
    const kmSvcs = S.initServices.filter(s => s.isCrypto);
    if(kmSvcs.length > 0 && kmSvcs.some(s => s.className !== 'early_hal')){
      a15Lines.push({type:'context',text:''});
      a15Lines.push({type:'remove',text:'# Keymaster should use class early_hal for A15+'});
      a15Lines.push({type:'add',text:'# FILE: init.recovery.*.rc'});
      a15Lines.push({type:'add',text:'service vendor.keymaster-4-1 /vendor/bin/hw/android.hardware.keymaster@4.1-service.trustonic'});
      a15Lines.push({type:'add',text:'    class early_hal'});
      a15Lines.push({type:'add',text:'    interface android.hardware.keymaster@4.0::IKeymasterDevice default'});
      a15Lines.push({type:'add',text:'    interface android.hardware.keymaster@4.1::IKeymasterDevice default'});
      a15Lines.push({type:'add',text:'    user nobody'});
      a15Lines.push({type:'add',text:'    seclabel u:r:recovery:s0'});
    }
    
    // Metadata decrypt should be removed
    if(bc['TW_INCLUDE_FBE_METADATA_DECRYPT'] === 'true'){
      a15Lines.push({type:'context',text:''});
      a15Lines.push({type:'remove',text:'# A15+: Remove metadata decrypt flags'});
      a15Lines.push({type:'remove',text:'TW_INCLUDE_FBE_METADATA_DECRYPT := true'});
      a15Lines.push({type:'remove',text:'BOARD_USES_METADATA_PARTITION := true'});
      a15Lines.push({type:'context',text:'# These flags are not needed on A15+ and may cause issues'});
    }
    
    // BOARD_SUPPRESS_SECURE_ERASE
    if(bc['BOARD_SUPPRESS_SECURE_ERASE'] !== 'true'){
      a15Lines.push({type:'context',text:''});
      a15Lines.push({type:'add',text:'# Prevent secure erase failures:'});
      a15Lines.push({type:'add',text:'BOARD_SUPPRESS_SECURE_ERASE := true'});
    }
    
    S.fixes.push({title:'A15+ Compatibility',file:'BoardConfig.mk / device.mk',lines:a15Lines,prio:'P0',
      raw:a15Lines.filter(l=>l.type==='add').map(l=>l.text).join('\n')});
  }
  
  // === Filesystem Fallback Fixes ===
  if(S.fstabFallbacks && S.fstabFallbacks.some(f => f.status === 'warning')){
    const fsLines = [];
    
    fsLines.push({type:'header',text:'@@ Filesystem Fallback for EROFS Partitions @@'});
    fsLines.push({type:'context',text:'# Add ext4 fallback entries for EROFS partitions'});
    fsLines.push({type:'context',text:'# This improves recovery compatibility'});
    
    for(const f of S.fstabFallbacks.filter(f => f.status === 'warning')){
      fsLines.push({type:'add',text:`${f.mountPoint} ${f.mountPoint} erofs ro wait,slotselect,avb,logical,first_stage_mount`});
      fsLines.push({type:'add',text:`${f.mountPoint} ${f.mountPoint} ext4 ro wait,slotselect,avb,logical,first_stage_mount`});
    }
    
    S.fixes.push({title:'Filesystem Fallback',file:'fstab.mt6833',lines:fsLines,prio:'P1',
      raw:fsLines.filter(l=>l.type==='add').map(l=>l.text).join('\n')});
  }
  
  // === Recovery Library Fixes ===
  if(S.recoveryLibs && S.recoveryLibs.missing && S.recoveryLibs.missing.length > 0){
    const libLines = [];
    
    libLines.push({type:'header',text:'@@ Keymaster Recovery Libraries @@'});
    libLines.push({type:'context',text:'# These libraries are required for keymaster to function in recovery'});
    
    libLines.push({type:'add',text:'TARGET_RECOVERY_DEVICE_MODULES += \\'});
    libLines.push({type:'add',text:'    libkeymaster4 \\'});
    libLines.push({type:'add',text:'    libkeymaster41 \\'});
    libLines.push({type:'add',text:'    libpuresoftkeymasterdevice \\'});
    libLines.push({type:'add',text:'    libion \\'});
    libLines.push({type:'add',text:'    libxml2'});
    libLines.push({type:'context',text:''});
    libLines.push({type:'add',text:'RECOVERY_LIBRARY_SOURCE_FILES += \\'});
    libLines.push({type:'add',text:'    $(TARGET_OUT_SHARED_LIBRARIES)/libkeymaster4.so \\'});
    libLines.push({type:'add',text:'    $(TARGET_OUT_SHARED_LIBRARIES)/libkeymaster41.so \\'});
    libLines.push({type:'add',text:'    $(TARGET_OUT_SHARED_LIBRARIES)/libpuresoftkeymasterdevice.so \\'});
    libLines.push({type:'add',text:'    $(TARGET_OUT_SHARED_LIBRARIES)/libion.so \\'});
    libLines.push({type:'add',text:'    $(TARGET_OUT_SHARED_LIBRARIES)/libxml2.so'});
    
    S.fixes.push({title:'Recovery Libraries',file:'device.mk',lines:libLines,prio:'P1',
      raw:libLines.filter(l=>l.type==='add').map(l=>l.text).join('\n')});
  }
  
  // === Trustonic init.tee.rc Template ===
  if(S.tee.type === 'trustonic' && !S.serviceTriggers.initTeeRc){
    const teeLines = [];
    
    teeLines.push({type:'header',text:'@@ Trustonic TEE Configuration (init.tee.rc) @@'});
    teeLines.push({type:'context',text:'# Create separate init.tee.rc for cleaner TEE configuration'});
    teeLines.push({type:'context',text:'# Reference this file in init.recovery.*.rc with: import /init.tee.rc'});
    teeLines.push({type:'context',text:''});
    teeLines.push({type:'add',text:'# Start Daemon (Registry directories should already be present)'});
    teeLines.push({type:'add',text:'service mobicore /vendor/bin/mcDriverDaemon --sfs-reformat --P1 /mnt/vendor/persist/mcRegistry \\'});
    teeLines.push({type:'add',text:'    -r /vendor/app/mcRegistry/06090000000000000000000000000000.drbin \\'});
    teeLines.push({type:'add',text:'    -r /vendor/app/mcRegistry/020f0000000000000000000000000000.drbin \\'});
    teeLines.push({type:'add',text:'    -r /vendor/app/mcRegistry/05120000000000000000000000000000.drbin'});
    teeLines.push({type:'add',text:'    user root'});
    teeLines.push({type:'add',text:'    group root'});
    teeLines.push({type:'add',text:'    disabled'});
    teeLines.push({type:'add',text:'    seclabel u:r:recovery:s0'});
    teeLines.push({type:'context',text:''});
    teeLines.push({type:'add',text:'on post-fs'});
    teeLines.push({type:'add',text:'    mkdir /mnt/vendor/persist 0771 system system'});
    teeLines.push({type:'add',text:'    mkdir /mnt/vendor/persist/mcRegistry 0771 system system'});
    teeLines.push({type:'add',text:'    mkdir /data/vendor/mcRegistry 0775 system system'});
    teeLines.push({type:'add',text:'    mkdir /data/vendor/key_provisioning 0771 system system'});
    teeLines.push({type:'context',text:''});
    teeLines.push({type:'add',text:'on property:hwservicemanager.ready=true'});
    teeLines.push({type:'add',text:'    start mobicore'});
    
    S.fixes.push({title:'init.tee.rc Template',file:'init.tee.rc',lines:teeLines,prio:'P1',
      raw:teeLines.filter(l=>l.type==='add').map(l=>l.text).join('\n')});
  }
  
  // === Android Version-Specific Fixes ===
  if(S.androidVersion && S.androidVersion.version){
    const ver = S.androidVersion.version;
    const verFlags = VERSION_FLAGS[ver] || { required: [], optional: [], removed: [] };
    const verLibs = VERSION_LIBRARIES[ver] || [];
    const verServiceClass = VERSION_SERVICE_CLASS[ver] || {};
    const verInfo = ANDROID_VERSIONS[ver] || {};
    
    const verLines = [];
    verLines.push({type:'header',text:`@@ Android ${ver} Configuration Checklist @@`});
    verLines.push({type:'context',text:`# Target: ${verInfo.name || `Android ${ver}`} (API ${S.androidVersion.apiLevel})`});
    verLines.push({type:'context',text:`# Detected via: ${S.androidVersion.source}`});
    verLines.push({type:'context',text:''});
    
    // BoardConfig flags
    verLines.push({type:'context',text:'# === BoardConfig.mk ==='});
    
    // Required flags
    const missingRequired = (verFlags.required || []).filter(f => bc[f] !== 'true');
    if(missingRequired.length > 0){
      verLines.push({type:'remove',text:'# Missing required flags:'});
      for(const f of missingRequired){
        verLines.push({type:'add',text:`${f} := true`});
      }
    } else {
      verLines.push({type:'context',text:'# All required flags present ✓'});
    }
    
    // Removed flags
    const shouldRemove = (verFlags.removed || []).filter(f => bc[f] === 'true');
    if(shouldRemove.length > 0){
      verLines.push({type:'context',text:''});
      verLines.push({type:'remove',text:'# Deprecated flags to remove:'});
      for(const f of shouldRemove){
        verLines.push({type:'remove',text:`# ${f} := ${bc[f]}  # Not used in Android ${ver}`});
      }
    }
    
    // Optional flags
    verLines.push({type:'context',text:''});
    verLines.push({type:'context',text:'# Optional flags:'});
    for(const f of (verFlags.optional || [])){
      const has = bc[f] === 'true';
      verLines.push({type:has?'context':'add',text:`${f} := ${has?'true':'false'}`});
    }
    
    // Service classes
    verLines.push({type:'context',text:''});
    verLines.push({type:'context',text:'# === Service Classes ==='});
    verLines.push({type:'context',text:`TEE: class ${verServiceClass.tee || 'core'}`});
    verLines.push({type:'context',text:`Keymaster: class ${verServiceClass.keymaster || 'hal'}`});
    verLines.push({type:'context',text:`Gatekeeper: class ${verServiceClass.gatekeeper || 'hal'}`});
    
    // Libraries
    verLines.push({type:'context',text:''});
    verLines.push({type:'context',text:'# === Required Libraries ==='});
    verLines.push({type:'add',text:'TARGET_RECOVERY_DEVICE_MODULES += \\'});
    for(let i = 0; i < verLibs.length; i++){
      const lib = verLibs[i];
      verLines.push({type:'add',text:`    ${lib}${i < verLibs.length - 1 ? ' \\' : ''}`});
    }
    
    // Version-specific requirements
    if(verInfo.requirements){
      verLines.push({type:'context',text:''});
      verLines.push({type:'context',text:'# === Version Requirements ==='});
      const req = verInfo.requirements;
      if(req.keymaster){
        verLines.push({type:'context',text:`Keymaster: ${req.keymaster}`});
      }
      if(req.metadata){
        verLines.push({type:'context',text:`Metadata decrypt: ${req.metadata}`});
      }
      if(req.wrappedkey){
        verLines.push({type:'context',text:`Wrapped key: ${req.wrappedkey}`});
      }
      if(req.fscryptV2){
        verLines.push({type:'context',text:`fscrypt v2: required`});
      }
      if(req.keymintPackages){
        verLines.push({type:'add',text:'# Keymint packages required:'});
        verLines.push({type:'add',text:'PRODUCT_PACKAGES += \\'});
        verLines.push({type:'add',text:'    android.hardware.security.keymint \\'});
        verLines.push({type:'add',text:'    android.hardware.security.secureclock \\'});
        verLines.push({type:'add',text:'    android.hardware.security.sharedsecret'});
      }
    }
    
    S.fixes.push({title:`Android ${ver} Config`,file:'BoardConfig.mk / device.mk',lines:verLines,prio:'P0',
      raw:verLines.filter(l=>l.type==='add').map(l=>l.text).join('\n')});
    
    // Add version-specific service template if Android 13+
    if(ver >= 13 && S.tee.type !== 'unknown'){
      const svcLines = [];
      svcLines.push({type:'header',text:`@@ Android ${ver} Service Template @@`});
      svcLines.push({type:'context',text:'# Keymaster service for Android 13+'});
      svcLines.push({type:'context',text:''});
      svcLines.push({type:'add',text:`service keymaster-4-1 /vendor/bin/hw/android.hardware.keymaster@4.1-service.${S.tee.type}`});
      svcLines.push({type:'add',text:'    class early_hal'});
      svcLines.push({type:'add',text:'    interface android.hardware.keymaster@4.0::IKeymasterDevice default'});
      svcLines.push({type:'add',text:'    interface android.hardware.keymaster@4.1::IKeymasterDevice default'});
      svcLines.push({type:'add',text:'    user nobody'});
      svcLines.push({type:'add',text:'    group system drmrpc'});
      svcLines.push({type:'add',text:'    disabled'});
      svcLines.push({type:'add',text:'    seclabel u:r:recovery:s0'});
      svcLines.push({type:'context',text:''});
      svcLines.push({type:'add',text:'on property:hwservicemanager.ready=true'});
      svcLines.push({type:'add',text:'    start keymaster-4-1'});
      
      S.fixes.push({title:`Android ${ver} Service`,file:`init.recovery.${S.tee.type}.rc`,lines:svcLines,prio:'P1',
        raw:svcLines.filter(l=>l.type==='add').map(l=>l.text).join('\n')});
    }
  }

}

function setStatus(t,c){const e=document.getElementById('statusBadge');e.className='md-chip '+c;e.innerHTML=t;}

function load(t,s,p){document.getElementById('loadingText').textContent=t;document.getElementById('loadingSub').textContent=s;document.getElementById('progressBar').style.width=p+'%';}

function esc(s){return s?s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):''}

function copyText(t){navigator.clipboard.writeText(t).then(()=>{

  const d=document.createElement('div');d.style.cssText='position:fixed;bottom:24px;right:24px;background:var(--md-inverse-surface);color:var(--md-inverse-on-surface);padding:12px 24px;border-radius:12px;font-weight:500;font-size:14px;z-index:999;';

  d.textContent='Copied';document.body.appendChild(d);setTimeout(()=>d.remove(),2000);});}

function gauge(pct,color,size=160){

  const r=size/2-8,c=2*Math.PI*r,off=c-(pct/100)*c;

  return `<div class="gauge-ring" style="width:${size}px;height:${size}px;">

    <svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="var(--md-surface-container-highest)" stroke-width="8"/>

    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="8" stroke-dasharray="${c}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset 1.5s ease"/></svg>

    <div style="text-align:center;z-index:1;position:relative"><div style="font-size:32px;font-weight:700;color:${color}">${pct}%</div><div class="label-small" style="color:var(--md-on-surface-variant)">CONFIDENCE</div></div></div>`;

}

function oCard(icon,title,value,sub){

  return `<div class="ov-card"><span class="mi">${icon}</span><div style="min-width:0"><div class="body-small" style="color:var(--md-on-surface-variant)">${title}</div><div class="title-small" style="word-break:break-all">${value}</div>${sub?`<div class="body-small path-text" style="color:var(--md-outline)">${sub}</div>`:''}</div></div>`;

}
