// =================================================================
// ANDROID VERSION QUICK REFERENCE
// =================================================================

function renderVersionQuickRef(){
  const ver = S.androidVersion?.version;
  if(!ver) return '';
  
  const verInfo = ANDROID_VERSIONS[ver] || {};
  const color = S.androidVersion.color || '#9E9E9E';
  const bc = S.boardConfig.all;
  
  // Build quick reference cards
  const refCards = [];
  
  // Keymaster Version
  const kmVer = verInfo.requirements?.keymaster || 'N/A';
  refCards.push({
    label: 'Keymaster',
    value: kmVer.toUpperCase(),
    icon: 'vpn_key',
    status: kmVer === 'keymint' ? (ver >= 15 ? 'ok' : 'info') : (ver >= 13 ? 'ok' : 'info')
  // info: 'KM 4.1+ for A13+, Keymint for A15+'
  });
  
  // Metadata Decrypt
  const metaReq = verInfo.requirements?.metadata || 'optional';
  refCards.push({
    label: 'Metadata Decrypt',
    value: metaReq.toUpperCase(),
    icon: 'storage',
    status: metaReq === 'removed' ? (ver >= 15 ? 'ok' : 'warning') : 'ok',
    info: metaReq === 'removed' ? 'Removed for A15+' : 'Required for A11-A14'
  });
  
  // fscrypt Version
  if(verInfo.requirements?.fscryptV2){
    refCards.push({
      label: 'fscrypt Policy',
      value: 'V2+',
      icon: 'enhanced_encryption',
      status: 'ok',
      info: 'Required for A13+'
    });
  }
  
  // Keymint Packages
  if(verInfo.requirements?.keymintPackages){
    refCards.push({
      label: 'Keymint Packages',
      value: 'REQUIRED',
      icon: 'inventory',
      status: 'ok',
      info: 'keymint, secureclock, sharedsecret'
    });
  }
  
  // Build HTML
  let h = `<div class="section-title" style="margin-top:24px">
    <span class="mi" style="color:${color}">quick_reference</span> 
    Android ${ver} Quick Reference
  </div>`;
  
  h += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px;">`;
  
  for(const card of refCards){
    const statusColor = card.status === 'ok' ? 'var(--md-success)' : 
                   card.status === 'warning' ? 'var(--md-warning)' : 
                   card.status === 'info' ? 'var(--md-primary)' : 'var(--md-outline)';
    
    h += `<div class="ov-card" style="background:linear-gradient(135deg,${statusColor}15,${statusColor}05);flex-direction:column;align-items:flex-start;">
      <div style="display:flex;align-items:center;gap:8px;width:100%;">
        <span class="mi" style="color:${statusColor};font-size:20px;">${card.icon}</span>
        <span class="label-small" style="color:var(--md-on-surface-variant);">${card.label}</span>
      </div>
      <div class="title-small" style="color:${statusColor};margin-top:4px;">${card.value}</div>
      ${card.info ? `<div class="body-small" style="color:var(--md-outline);margin-top:2px;">${card.info}</div>` : ''}
    </div>`;
  }
  
  h += `</div>`;
  
  // Add version-specific notes
  h += `<div class="md-card" style="padding:16px;margin-bottom:16px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <span class="mi" style="color:${color}">info</span>
      <span class="label-large" style="color:${color}">Android ${ver} Configuration Notes</span>
    </div>
    <div class="body-small" style="color:var(--md-on-surface-variant);">`;
  
  if(ver >= 15){
    h += `<div style="margin-bottom:8px;padding:8px;border-radius:8px;background:color-mix(in srgb,${color}10%,transparent);">
      <strong style="color:${color}">A15+ Special:</strong> Use PLATFORM_VERSION 99.x.x workaround, remove TW_INCLUDE_FBE_METADATA_DECRYPT, add keymint security packages.
    </div>`;
  } else if(ver >= 13){
    h += `<div style="margin-bottom:8px;padding:8px;border-radius:8px;background:color-mix(in srgb,${color}10%,transparent);">
      <strong style="color:${color}">A13+ Requirements:</strong> Keymaster 4.1, fscrypt v2 policy, proper service class (early_hal for keymaster).
    </div>`;
  } else if(ver >= 12){
    h += `<div style="margin-bottom:8px;padding:8px;border-radius:8px;background:color-mix(in srgb,${color}10%,transparent);">
      <strong style="color:${color}">A12+ Requirements:</strong> Keymaster 4.1 recommended, wrappedkey support, inlinecrypt kernel config.
    </div>`;
  }
  
  h += `</div></div>`;
  
  return h;
}

function renderVersionRequirementsMatrix(){
  const ver = S.androidVersion?.version;
  if(!ver) return '';
  
  const bc = S.boardConfig.all;
  const verInfo = ANDROID_VERSIONS[ver] || {};
  const verFlags = VERSION_FLAGS[ver] || { required: [], optional: [], removed: [] };
  const verLibs = VERSION_LIBRARIES[ver] || [];
  const verServiceClass = VERSION_SERVICE_CLASS[ver] || {};
  const verPkgs = VERSION_PACKAGES[ver] || [];
  const color = S.androidVersion.color || '#9E9E9E';
  
  // Build requirements checklist
  const requirements = [];
  
  // 1. BoardConfig Flags
  const flagReqs = [];
  for(const flag of (verFlags.required || [])){
    const hasIt = bc[flag] === 'true';
    flagReqs.push({ name: flag, status: hasIt ? 'ok' : 'missing', value: bc[flag] || 'not set', required: true });
  }
  for(const flag of (verFlags.optional || [])){
    const hasIt = bc[flag] === 'true';
    flagReqs.push({ name: flag, status: hasIt ? 'ok' : 'optional', value: bc[flag] || 'not set', required: false });
  }
  for(const flag of (verFlags.removed || [])){
    const hasIt = bc[flag] === 'true';
    if(hasIt){
      flagReqs.push({ name: flag, status: 'deprecated', value: bc[flag], required: false, warning: true });
    }
  }
  if(flagReqs.length > 0){
    requirements.push({ category: 'BoardConfig Flags', items: flagReqs });
  }
  
  // 2. Service Classes
  const teeSvcs = S.initServices.filter(s => s.isTEE);
  const kmSvcs = S.initServices.filter(s => s.isCrypto);
  const gkSvcs = S.initServices.filter(s => s.isGK);
  
  const classReqs = [];
  if(teeSvcs.length > 0 && verServiceClass.tee){
    const actualClass = teeSvcs[0]?.className || 'not set';
    classReqs.push({ name: 'TEE class', status: actualClass === verServiceClass.tee ? 'ok' : 'wrong', value: actualClass, expected: verServiceClass.tee });
  }
  if(kmSvcs.length > 0 && verServiceClass.keymaster){
    const actualClass = kmSvcs[0]?.className || 'not set';
    classReqs.push({ name: 'Keymaster class', status: actualClass === verServiceClass.keymaster ? 'ok' : 'wrong', value: actualClass, expected: verServiceClass.keymaster });
  }
  if(gkSvcs.length > 0 && verServiceClass.gatekeeper){
    const actualClass = gkSvcs[0]?.className || 'not set';
    classReqs.push({ name: 'Gatekeeper class', status: actualClass === verServiceClass.gatekeeper ? 'ok' : 'wrong', value: actualClass, expected: verServiceClass.gatekeeper });
  }
  if(classReqs.length > 0){
    requirements.push({ category: 'Service Classes', items: classReqs });
  }
  
  // 3. Libraries
  const modules = S.recoveryLibs?.modules || [];
  const sourceFiles = S.recoveryLibs?.sourceFiles || [];
  const libReqs = [];
  for(const lib of verLibs){
    const hasIt = modules.some(m => m.toLowerCase().includes(lib.toLowerCase())) ||
                  sourceFiles.some(s => s.toLowerCase().includes(lib.toLowerCase()));
    libReqs.push({ name: lib, status: hasIt ? 'ok' : 'missing', value: hasIt ? 'configured' : 'not found' });
  }
  if(libReqs.length > 0){
    requirements.push({ category: 'Recovery Libraries', items: libReqs });
  }
  
  // 4. Packages
  const pkgReqs = [];
  for(const pkg of verPkgs){
    const hasIt = S.deviceMk.packages.some(p => p.toLowerCase().includes(pkg.toLowerCase()));
    pkgReqs.push({ name: pkg, status: hasIt ? 'ok' : 'missing', value: hasIt ? 'installed' : 'not installed' });
  }
  if(pkgReqs.length > 0){
    requirements.push({ category: 'Required Packages', items: pkgReqs });
  }
  
  // 5. Keymaster Version
  if(ver >= 13 && kmSvcs.length > 0){
    const hasKm41 = kmSvcs.some(s => 
      s.binary.includes('keymaster@4.1') || 
      s.binary.includes('keymaster-4-1') ||
      (s.interfaceDecls || []).some(i => i.includes('@4.1'))
    );
    const kmReqs = [];
    kmReqs.push({ name: 'Keymaster 4.1', status: hasKm41 ? 'ok' : 'missing', value: hasKm41 ? 'configured' : 'Keymaster 4.0 only' });
    requirements.push({ category: 'Keymaster Version', items: kmReqs });
  }
  
  // 6. Encryption Policy
  const dataE = S.fstab.flatMap(f => f.entries).filter(e => e.mount === '/data');
  const encReqs = [];
  if(ver >= 13 && dataE.length > 0){
    const fbeSpec = dataE[0]?.fbeSpec || '';
    const hasV2 = fbeSpec.includes('v2') || fbeSpec.includes('v3');
    encReqs.push({ name: 'fscrypt v2+', status: hasV2 ? 'ok' : 'optional', value: fbeSpec || 'not specified' });
  }
  if(ver >= 12 && dataE.some(e => e.wrapped)){
    const inlineSupport = Object.values(bc).some(v => /inlinecrypt|INLINE_ENCRYPTION/i.test(v)) ||
                         (bc['BOARD_KERNEL_CMDLINE'] || '').includes('inlinecrypt');
    encReqs.push({ name: 'inlinecrypt kernel', status: inlineSupport ? 'ok' : 'missing', value: inlineSupport ? 'enabled' : 'not enabled' });
  }
  if(encReqs.length > 0){
    requirements.push({ category: 'Encryption Policy', items: encReqs });
  }
  
  // Calculate overall compliance
  const totalItems = requirements.reduce((sum, cat) => sum + cat.items.length, 0);
  const okItems = requirements.reduce((sum, cat) => sum + cat.items.filter(i => i.status === 'ok').length, 0);
  const missingItems = requirements.reduce((sum, cat) => sum + cat.items.filter(i => i.status === 'missing' || i.status === 'wrong').length, 0);
  const compliance = totalItems > 0 ? Math.round((okItems / totalItems) * 100) : 0;
  
  // Build HTML
  let h = `<div class="section-title" style="margin-top:24px">
    <span class="mi" style="color:${color}">android</span> 
    Android ${ver} Requirements Matrix
    <span class="md-chip" style="font-size:11px;background:${compliance >= 80 ? 'var(--md-success)' : compliance >= 50 ? 'var(--md-warning)' : 'var(--md-error)'}20;color:${compliance >= 80 ? 'var(--md-success)' : compliance >= 50 ? 'var(--md-warning)' : 'var(--md-error)'};border-color:${compliance >= 80 ? 'var(--md-success)' : compliance >= 50 ? 'var(--md-warning)' : 'var(--md-error)'}40">
      ${okItems}/${totalItems} compliant (${compliance}%)
    </span>
  </div>`;
  
  h += `<div class="md-card" style="margin-bottom:16px;overflow-x:auto;">`;
  h += `<table style="width:100%;border-collapse:collapse;font-size:13px;">`;
  h += `<thead><tr style="border-bottom:2px solid var(--md-outline-variant)">
    <th style="text-align:left;padding:12px 8px;color:var(--md-on-surface-variant);font-weight:500">Category</th>
    <th style="text-align:left;padding:12px 8px;color:var(--md-on-surface-variant);font-weight:500">Requirement</th>
    <th style="text-align:center;padding:12px 8px;color:var(--md-on-surface-variant);font-weight:500">Status</th>
    <th style="text-align:left;padding:12px 8px;color:var(--md-on-surface-variant);font-weight:500">Value</th>
    <th style="text-align:left;padding:12px 8px;color:var(--md-on-surface-variant);font-weight:500">Expected</th>
  </tr></thead><tbody>`;
  
  for(const cat of requirements){
    const catOk = cat.items.filter(i => i.status === 'ok').length;
    const catTotal = cat.items.length;
    const catColor = catOk === catTotal ? 'var(--md-success)' : catOk > 0 ? 'var(--md-warning)' : 'var(--md-error)';
    
    for(let i = 0; i < cat.items.length; i++){
      const item = cat.items[i];
      const statusIcon = item.status === 'ok' ? 'check_circle' : 
                        item.status === 'missing' || item.status === 'wrong' ? 'cancel' :
                        item.status === 'deprecated' ? 'warning' : 'info';
      const statusColor = item.status === 'ok' ? 'var(--md-success)' : 
                         item.status === 'missing' || item.status === 'wrong' ? 'var(--md-error)' :
                         item.status === 'deprecated' ? 'var(--md-warning)' : 'var(--md-outline)';
      
      h += `<tr style="border-bottom:1px solid var(--md-outline-variant)">
        ${i === 0 ? `<td rowspan="${cat.items.length}" style="padding:10px 8px;vertical-align:top;font-weight:500;color:${catColor};white-space:nowrap">
          ${cat.category}
          <div style="font-size:11px;color:var(--md-outline)">${catOk}/${catTotal}</div>
        </td>` : ''}
        <td style="padding:10px 8px;color:var(--md-on-surface)">${item.name}${item.required ? '<span style="color:var(--md-error);margin-left:4px">*</span>' : ''}</td>
        <td style="padding:10px 8px;text-align:center">
          <span class="mi" style="font-size:18px;color:${statusColor};vertical-align:middle">${statusIcon}</span>
        </td>
        <td style="padding:10px 8px;font-family:'Google Sans Mono',monospace;font-size:12px;color:${item.status === 'ok' ? 'var(--md-success)' : item.status === 'deprecated' ? 'var(--md-warning)' : 'var(--md-on-surface-variant)'}">
          ${esc(item.value)}
        </td>
        <td style="padding:10px 8px;font-size:12px;color:var(--md-outline)">
          ${item.expected ? esc(item.expected) : item.required ? 'required' : 'optional'}
        </td>
      </tr>`;
    }
  }
  
  h += `</tbody></table>`;
  
  // Add legend
  h += `<div style="margin-top:12px;padding:12px;border-top:1px solid var(--md-outline-variant);display:flex;gap:16px;flex-wrap:wrap;font-size:12px">
    <span><span style="color:var(--md-error)">*</span> = required for Android ${ver}</span>
    <span><span class="mi" style="font-size:14px;vertical-align:middle;color:var(--md-success)">check_circle</span> = OK</span>
    <span><span class="mi" style="font-size:14px;vertical-align:middle;color:var(--md-error)">cancel</span> = Missing/Wrong</span>
    <span><span class="mi" style="font-size:14px;vertical-align:middle;color:var(--md-warning)">warning</span> = Deprecated</span>
    <span><span class="mi" style="font-size:14px;vertical-align:middle;color:var(--md-outline)">info</span> = Optional</span>
  </div>`;
  
  h += `</div>`;
  
  return h;
}

function renderVerdict(){

  const v=S.verdict;const cls=v.result==='pass'?'verdict-pass':v.result==='fail'?'verdict-fail':'verdict-uncertain';

  const icon=v.result==='pass'?'check_circle':v.result==='fail'?'cancel':'warning';

  const label=v.result==='pass'?'DECRYPTION SHOULD WORK':v.result==='fail'?'DECRYPTION WILL FAIL':'UNCERTAIN';

  const color=v.result==='pass'?'var(--md-success)':v.result==='fail'?'var(--md-error)':'var(--md-warning)';

  const tee=S.tee.type,sig=TEE_DB[tee];

  let h=`<div class="${cls}" style="border-radius:20px;padding:28px;">

    <div style="display:flex;flex-wrap:wrap;gap:24px;align-items:center;">

      <div style="flex-shrink:0">${gauge(v.pct,color)}</div>

      <div style="flex:1;min-width:240px">

        <div class="label-small" style="color:${color};letter-spacing:.1em;margin-bottom:4px;"><span class="mi" style="font-size:16px;vertical-align:middle">${icon}</span> VERDICT</div>

        <div class="title-large" style="color:${color};margin-bottom:8px">${label}</div>

        <div class="body-medium" style="color:var(--md-on-surface-variant);margin-bottom:12px">${v.summary}</div>

        <div style="display:flex;flex-wrap:wrap;gap:8px;">

          <span class="md-chip ${v.result==='pass'?'chip-success':'chip-error'}">${v.score}/${v.maxScore} pts</span>

          ${tee!=='unknown'?`<span class="md-chip chip-tertiary"><span class="mi" style="font-size:16px">${sig.icon}</span> ${sig.name}</span>`:'<span class="md-chip chip-error">No TEE</span>'}

          ${S.androidVersion?.version?`<span class="md-chip" style="background:${S.androidVersion.color}20;color:${S.androidVersion.color};border-color:${S.androidVersion.color}40"><span class="mi" style="font-size:14px">android</span> ${S.androidVersion.name}</span>`:''}

          <span class="md-chip chip-primary">${S.checks.filter(c=>c.ok).length}/${S.checks.length} checks</span>

          <span class="md-chip ${S.binaryChecks.filter(b=>b.isCritical).every(b=>b.status==='found'||b.status==='copied')?'chip-success':'chip-error'}">

            ${S.binaryChecks.filter(b=>b.isCritical&&(b.status==='found'||b.status==='copied')).length}/${S.binaryChecks.filter(b=>b.isCritical).length} binaries

          </span>

          ${(()=>{

            const bc_=S.boardConfig.all;const dE=S.fstab.flatMap(f=>f.entries).filter(e=>e.mount==='/data');

            const isMod=!bc_['TW_INCLUDE_CRYPTO']&&!bc_['TW_INCLUDE_CRYPTO_FBE']&&dE.some(e=>e.fbe);

            return isMod?'<span class="md-chip chip-success"><span class="mi" style="font-size:14px">auto_fix_high</span> Modern</span>'

              :(bc_['TW_INCLUDE_CRYPTO']?'<span class="md-chip chip-secondary"><span class="mi" style="font-size:14px">settings</span> Legacy</span>':'');

          })()}

          ${(()=>{

            const dE=S.fstab.flatMap(f=>f.entries).filter(e=>e.mount==='/data');const fbeS=dE.find(e=>e.fbe);

            return fbeS?`<span class="md-chip chip-warning"><span class="mi" style="font-size:14px">lock</span> FBE</span>`

              :(dE.some(e=>e.forced)?'<span class="md-chip chip-warning"><span class="mi" style="font-size:14px">lock</span> FDE</span>':'');

          })()}

          ${(()=>{const dE=S.fstab.flatMap(f=>f.entries).filter(e=>e.mount==='/data');

            return dE.some(e=>e.metaEnc)?'<span class="md-chip chip-tertiary">MetaEncrypt</span>':'';})()}

          ${(()=>{const dE=S.fstab.flatMap(f=>f.entries).filter(e=>e.mount==='/data');

            return dE.some(e=>e.wrapped)?'<span class="md-chip chip-secondary">WrappedKey</span>':'';})()}

          <span class="md-chip chip-secondary">${S.fetchedCount} files</span>

        </div>`;

  if(v.result!=='pass'&&v.reasons.length>0){

    h+=`<div style="margin-top:16px;padding-top:12px;border-top:1px solid ${color}30">

      <div class="label-small" style="color:${color};margin-bottom:6px">TOP FAILURES:</div>

      ${v.reasons.slice(0,5).map(r=>`<div class="body-small" style="color:var(--md-on-surface-variant);margin:4px 0"><span style="color:var(--md-error)">✗</span> <strong>${esc(r.label)}</strong> — ${esc(r.msg)} <span style="color:var(--md-outline)">(${r.weight}pts)</span></div>`).join('')}

    </div>`;}

  h+=`</div></div></div>`;

  document.getElementById('verdictBanner').innerHTML=h;

}

    ${oCard('lock','Encryption',dataE.some(e=>e.fbe)?'FBE':'Unknown',dataE[0]?.fbeSpec?.substring(0,30)||'—')}

    if(bIdx === -1) return -1;
    return aIdx - bIdx;
  });

  const versionSpecificCategories = cats.filter(c => versionCategories.includes(c));
  
  // Render core categories first
  for(const cat of coreCategories){

    const cc=S.checks.filter(c=>c.cat===cat);

/**
 * Render GitHub-style diff for fix suggestions
 * Supports formats:
 * - Simple text (rendered as info)
 * - Lines starting with + (additions - green)
 * - Lines starting with - (removals - red)
 * - Lines starting with @@ (hunk headers)
 * - File paths in format: file:path/to/file
 */
function renderGitHubDiff(fixText){
  if(!fixText||!fixText.trim())return'<div class="diff-empty">No fix suggestion available</div>';
  
  const lines=fixText.split('\n');
  let html='<div class="diff-body">';
  let currentFile=null;
  let lineNumAdd=1;
  let lineNumRemove=1;
  let inDiff=false;
  
  for(let i=0;i<lines.length;i++){
    let line=lines[i];
    let rawLine=line;
    
    // Detect file path pattern: file:path or FILE: path
    const fileMatch=line.match(/^(?:FILE|file|File)[:\s]+(.+)$/);
    if(fileMatch){
      const filePath=fileMatch[1].trim();
      html+=`<div class="diff-file-header"><span class="mi">description</span>${esc(filePath)}</div>`;
      currentFile=filePath;
      lineNumAdd=1;
      lineNumRemove=1;
      inDiff=true;
      continue;
    }
    
    // Hunk header: @@ -1,4 +1,5 @@
    if(line.startsWith('@@')){
      html+=`<div class="diff-hunk-header">${esc(line)}</div>`;
      const numMatch=line.match(/@@\s*-\d+,?\d*\s*\+(\d+)/);
      if(numMatch)lineNumAdd=parseInt(numMatch[1])||1;
      lineNumRemove=1;
      continue;
    }
    
    // Addition line
    if(line.startsWith('+')&&!line.startsWith('++')){
      html+=`<div class="diff-line diff-add">
        <span class="diff-line-num">${lineNumAdd}</span>
        <span><span class="diff-add-text">+</span>${esc(line.substring(1))}</span>
      </div>`;
      lineNumAdd++;
      inDiff=true;
      continue;
    }
    
    // Removal line
    if(line.startsWith('-')&&!line.startsWith('--')){
      html+=`<div class="diff-line diff-remove">
        <span class="diff-line-num">${lineNumRemove}</span>
        <span><span class="diff-remove-text">-</span>${esc(line.substring(1))}</span>
      </div>`;
      lineNumRemove++;
      inDiff=true;
      continue;
    }
    
    // Context line (starts with space or no prefix in diff mode)
    if(inDiff&&(line.startsWith(' ')||line==='')){
      html+=`<div class="diff-line diff-context">
        <span class="diff-line-num">${lineNumAdd}</span>
        <span>${esc(line.startsWith(' ')?line.substring(1):line)}</span>
      </div>`;
      lineNumAdd++;
      lineNumRemove++;
      continue;
    }
    
    // Check for key-value instructions like "Add:" or "Remove:" or "Change:"
    const addMatch=line.match(/^(?:Add|ADD|add)[:\s]+(.+)$/i);
    const removeMatch=line.match(/^(?:Remove|REMOVE|remove)[:\s]+(.+)$/i);
    const changeMatch=line.match(/^(?:Change|CHANGE|change)[:\s]+(.+)$/i);
    
    if(addMatch){
      html+=`<div class="diff-line diff-add">
        <span class="diff-line-num">+</span>
        <span><span class="diff-add-text">+</span> ${esc(addMatch[1])}</span>
      </div>`;
      inDiff=true;
      continue;
    }
    
    if(removeMatch){
      html+=`<div class="diff-line diff-remove">
        <span class="diff-line-num">−</span>
        <span><span class="diff-remove-text">−</span> ${esc(removeMatch[1])}</span>
      </div>`;
      inDiff=true;
      continue;
    }
    
    if(changeMatch){
      // Parse change format: "old" → "new" or old to new
      const parts=changeMatch[1].split(/\s*(?:→|->|to)\s*/i);
      if(parts.length>=2){
        html+=`<div class="diff-line diff-remove">
          <span class="diff-line-num">−</span>
          <span><span class="diff-remove-text">−</span> ${esc(parts[0])}</span>
        </div>`;
        html+=`<div class="diff-line diff-add">
          <span class="diff-line-num">+</span>
          <span><span class="diff-add-text">+</span> ${esc(parts[1])}</span>
        </div>`;
      }else{
        html+=`<div class="diff-line diff-context">
          <span class="diff-line-num">•</span>
          <span>${esc(changeMatch[1])}</span>
        </div>`;
      }
      inDiff=true;
      continue;
    }
    
    // Bullet points or regular text - render as context
    if(line.trim()){
      // Check if it looks like a config line (key=value or key value)
      const isConfig=/^[A-Z_]+\s*[+:]?=/.test(line)||/^(TW_|BOARD_|TARGET_|PRODUCT_)/.test(line);
      if(isConfig){
        html+=`<div class="diff-line diff-add">
          <span class="diff-line-num">+</span>
          <span><span class="diff-add-text">+</span> ${esc(line)}</span>
        </div>`;
      }else{
        html+=`<div class="diff-line diff-context">
          <span class="diff-line-num">•</span>
          <span>${esc(line)}</span>
        </div>`;
      }
    }
  }
  
  html+='</div>';
  return html;
}

function renderIssues(){

function renderFlowTab(){

  const tee=S.tee.type,sig=TEE_DB[tee],bc=S.boardConfig.all;

  const dataE=S.fstab.flatMap(f=>f.entries).filter(e=>e.mount==='/data');

  const chk=id=>{const c=S.checks.find(c=>c.id===id);return c?c.ok:false;};

  const allRC=Object.entries(S.fileContents).filter(([p])=>p.endsWith('.rc'));

  const teeSvcs=S.initServices.filter(s=>s.isTEE);

  const kmSvcs=S.initServices.filter(s=>s.isCrypto);

  const gkSvcs=S.initServices.filter(s=>s.isGK);

  // Parse actual on-triggers and imports from init.rc files

  const initTriggers=[];

  const initImports=[];

  for(const[fp,content] of allRC){

    if(!content)continue;

    const lines=content.split('\n');

    for(let i=0;i<lines.length;i++){

      const t=lines[i].trim();

      if(t.startsWith('on ')){

        // Gather all actions under this trigger

        const actions=[];

        for(let j=i+1;j<lines.length;j++){

          const al=lines[j];

          if(!al.match(/^\s/)&&al.trim().length>0&&!al.trim().startsWith('#'))break;

          if(al.trim().length>0&&!al.trim().startsWith('#'))actions.push(al.trim());

        }

        initTriggers.push({trigger:t,actions,file:fp.split('/').pop(),line:i+1});

      }

      if(t.startsWith('import ')){

        initImports.push({path:t.replace('import ','').trim(),file:fp.split('/').pop(),line:i+1});

      }

    }

  }

  // Build dynamic flow steps from ACTUAL parsed data

  const steps=[];

  // === STEP 1: Recovery Boot & Init Imports ===

  const rcFiles=allRC.map(([p])=>p.split('/').pop());

  steps.push({

    t:'Recovery Boot',

    d:`init loads ${rcFiles.length} .rc file${rcFiles.length!==1?'s':''}`,

    st:'pass',

    dt:rcFiles.length>0?rcFiles.join(', '):'No .rc files found',

    ico:'restart_alt',

    details:[

      ...initImports.slice(0,6).map(im=>`import ${im.path} (${im.file}:${im.line})`),

      ...(initImports.length>6?[`... +${initImports.length-6} more imports`]:[])

    ]

  });

  // === STEP 2: Fstab Parse ===

  const fstabFiles=S.fstab.map(f=>f.path.split('/').pop());

  const dataEntry=dataE[0];

  steps.push({

    t:'Parse Fstab',

    d:S.fstab.length>0?`Found: ${fstabFiles.join(', ')}`:'No fstab files in tree!',

    st:chk('fstab_exists')&&chk('fstab_data')?'pass':'fail',

    dt:dataEntry?`/data → ${dataEntry.fs} | device: ${dataEntry.device}`:'No /data mount point found!',

    ico:'table_chart',

    details:dataEntry?[

      `Mount: ${dataEntry.mount} → ${dataEntry.fs}`,

      `Device: ${dataEntry.device}`,

      dataEntry.fbe?`fileencryption=${dataEntry.fbeSpec||'yes'}`:null,

      dataEntry.metaEnc?`metadata_encryption=${dataEntry.metaSpec||'yes'}`:null,

      dataEntry.wrapped?'wrappedkey_v0':null,

      dataEntry.inline?'inlinecrypt':null,

      dataEntry.keyDir?`keydirectory=${dataEntry.keyDir}`:null,

    ].filter(Boolean):['No /data entry']

  });

  // === STEP 3: Encryption Detection ===

  const encType=dataEntry?.fbe?'FBE':dataEntry?.forced?'FDE':'None';

  steps.push({

    t:'Detect Encryption',

    d:`/data encryption: ${encType}`,

    st:chk('fstab_fbe')?'pass':chk('fstab_data')?'warn':'fail',

    dt:dataEntry?.fbe?`FBE cipher: ${dataEntry.fbeSpec||'detected'}${dataEntry.metaEnc?' + metadata_encryption':''}${dataEntry.wrapped?' + wrappedkey':''}`

      :dataEntry?.forced?'Legacy FDE (forceencrypt)':'No encryption flags on /data',

    ico:'enhanced_encryption',

    details:dataEntry?[

      `Raw flags: ${dataEntry.flags.substring(0,120)}${dataEntry.flags.length>120?'...':''}`

    ]:[]

  });

  // === STEP 4: Crypto Config ===

  const isModern=!bc['TW_INCLUDE_CRYPTO']&&!bc['TW_INCLUDE_CRYPTO_FBE']&&dataE.some(e=>e.fbe);

  const cryptoFlags=Object.entries(S.boardConfig.crypto);

  steps.push({

    t:'Crypto Configuration',

    d:isModern?'Modern build: auto-detected from fstab':'Legacy build: BoardConfig flags',

    st:chk('bc_crypto')&&chk('bc_fbe')?'pass':chk('bc_crypto')||chk('bc_fbe')?'warn':'fail',

    dt:isModern?'TWRP/OF auto-detects crypto from fstab — no flags needed'

      :(cryptoFlags.length>0?cryptoFlags.map(([k,v])=>`${k}=${v}`).join(' | '):'No crypto flags in BoardConfig!'),

    ico:'settings',

    details:[

      ...cryptoFlags.map(([k,v])=>`${k} := ${v}`),

      isModern?'✓ Modern build: TW_INCLUDE_CRYPTO not required':null,

      bc['TW_USE_FSCRYPT_POLICY']?`TW_USE_FSCRYPT_POLICY := ${bc['TW_USE_FSCRYPT_POLICY']}`:null,

    ].filter(Boolean)

  });

  // === STEP 5: hwservicemanager ===

  const hwsvcTriggers=initTriggers.filter(t=>t.actions.some(a=>/hwservicemanager|start\s+hwservicemanager/i.test(a)));

  const hwsvcRefs=initTriggers.filter(t=>t.trigger.includes('hwservicemanager'));

  steps.push({

    t:'hwservicemanager',

    d:'HIDL/AIDL service manager for HAL registration',

    st:'pass',

    dt:'Auto-started by recovery binary (always available)',

    ico:'dns',

    details:[

      'Recovery binary starts hwservicemanager internally',

      ...hwsvcRefs.map(t=>`Trigger "${t.trigger}" in ${t.file}:${t.line}`),

      ...hwsvcTriggers.map(t=>`${t.file}:${t.line} → ${t.actions.find(a=>/hwservice/i.test(a))||t.actions[0]}`)

    ]

  });

  // === STEP 6: TEE Daemon(s) — FROM ACTUAL INIT.RC ===

  if(teeSvcs.length>0){

    for(const svc of teeSvcs){

      const bc_=S.binaryChecks.find(b=>b.svc.name===svc.name);

      const binOk=bc_&&(bc_.status==='found'||bc_.status==='copied');

      const triggerInfo=svc.triggers.length>0

        ?svc.triggers.map(t=>`${t.action} by "${t.trigger}" in ${t.file.split('/').pop()}`).join('; ')

        :(svc.disabled?'DISABLED — no trigger found!':'Starts on class '+svc.className);

      steps.push({

        t:`TEE: ${svc.name}`,

        d:`${svc.file.split('/').pop()}:${svc.line} → ${svc.binary}`,

        st:binOk?(svc.disabled&&svc.triggers.length===0?'warn':'pass'):'fail',

        dt:binOk

          ?`Binary: ${bc_.detail} | ${triggerInfo}`

          :`BINARY NOT FOUND: ${svc.binary}`,

        ico:TEE_DB[svc.teeType]?.icon||'shield',

        details:[

          `Service: ${svc.name}`,

          `Binary: ${svc.binary}`,

          `Class: ${svc.className||'(none)'}`,

          `User: ${svc.user||'root'} | Group: ${svc.group||'root'}`,

          svc.disabled?'⚠ disabled':'✓ enabled',

          svc.seclabel?`SELabel: ${svc.seclabel}`:'⚠ No seclabel',

          ...svc.triggers.map(t=>`Trigger: ${t.action} on "${t.trigger}"`),

          ...svc.props.filter(p=>!['disabled','oneshot','override'].includes(p)&&!p.startsWith('class ')&&!p.startsWith('user ')&&!p.startsWith('group ')&&!p.startsWith('seclabel ')&&!p.startsWith('writepid ')).map(p=>`Prop: ${p}`),

          `File: ${svc.file}:${svc.line}`,

          bc_?`Binary status: ${bc_.status} — ${bc_.detail}`:'Binary check: N/A',

        ]

      });

    }

    // TrustKernel: check tee-supplicant pair

    if(tee==='trustkernel'){

      const hasSup=S.initServices.some(s=>/tee[-_]supplicant/i.test(s.name+s.binary));

      if(!hasSup){

        steps.push({

          t:'tee-supplicant (MISSING!)',

          d:'TrustKernel requires tee-supplicant alongside teed',

          st:'fail',dt:'NOT FOUND — teed cannot operate without tee-supplicant',

          ico:'link_off',details:['TrustKernel TEE needs both teed and tee-supplicant','Add service tee-supplicant /vendor/bin/tee-supplicant to init.rc']

        });

      }

    }

  }else{

    steps.push({

      t:'TEE Daemon',

      d:tee!=='unknown'?`${sig.name} detected but NO daemon service in init.rc!`:'No TEE daemon found in any init.rc',

      st:'fail',

      dt:tee!=='unknown'?`Expected: ${sig.daemons.join(' or ')}`:'Cannot decrypt without TEE daemon',

      ico:'shield',

      details:tee!=='unknown'?[

        `Detected TEE type: ${sig.name} (${S.tee.confidence}% confidence)`,

        `Expected daemon: ${sig.daemons.join(' or ')}`,

        `Expected binary: /vendor/bin/${sig.daemons[0]}`,

        'Fix: Add TEE daemon service to init.recovery.*.rc'

      ]:['No TEE type detected — check init.rc files for TEE-related services']

    });

  }

  // === STEP 7: Keymaster HAL(s) — FROM ACTUAL INIT.RC ===

  if(kmSvcs.length>0){

    for(const svc of kmSvcs){

      const bc_=S.binaryChecks.find(b=>b.svc.name===svc.name);

      const binOk=bc_&&(bc_.status==='found'||bc_.status==='copied');

      const triggerInfo=svc.triggers.length>0

        ?svc.triggers.map(t=>`${t.action} by "${t.trigger}"`).join('; ')

        :(svc.disabled?'DISABLED — no trigger!':'Starts on class '+svc.className);

      steps.push({

        t:`Keymaster: ${svc.name}`,

        d:`${svc.file.split('/').pop()}:${svc.line} → ${svc.binary}`,

        st:binOk?(svc.disabled&&svc.triggers.length===0?'warn':'pass'):'fail',

        dt:binOk?`Binary OK | ${triggerInfo}`:`BINARY NOT FOUND: ${svc.binary}`,

        ico:'vpn_key',

        details:[

          `Service: ${svc.name}`,

          `Binary: ${svc.binary}`,

          `Class: ${svc.className||'(none)'}`,

          `User: ${svc.user||'system'} | Group: ${svc.group||'system'}`,

          svc.disabled?'⚠ disabled':'✓ enabled',

          svc.seclabel?`SELabel: ${svc.seclabel}`:'⚠ No seclabel',

          ...svc.triggers.map(t=>`Trigger: ${t.action} on "${t.trigger}"`),

          `File: ${svc.file}:${svc.line}`,

          bc_?`Binary: ${bc_.status} — ${bc_.detail}`:'',

        ].filter(Boolean)

      });

    }

  }else{

    steps.push({

      t:'Keymaster HAL',

      d:'No keymaster/keymint service found in any init.rc!',

      st:'fail',

      dt:'Cannot derive encryption keys without keymaster',

      ico:'vpn_key',

      details:['No service matching keymaster/keymint/km pattern found',

        tee!=='unknown'?`For ${sig.name}, expected: ${sig.kmBins[0]||'keymaster HAL binary'}`:'',

        'Fix: Add keymaster HAL service to init.recovery.*.rc'].filter(Boolean)

    });

  }

  // === STEP 8: Security Patch Level ===

  const propPatch=S.props.all['ro.build.version.security_patch']||S.props.all['ro.vendor.build.security_patch']||'';

  const bcPatch=bc['PLATFORM_SECURITY_PATCH']||'';

  const patchMatch=!propPatch||!bcPatch||propPatch===bcPatch;

  steps.push({

    t:'Security Patch Validation',

    d:'Keymaster uses PLATFORM_SECURITY_PATCH for key derivation',

    st:bcPatch?(patchMatch?'pass':'fail'):'fail',

    dt:bcPatch

      ?(patchMatch?`${bcPatch}${propPatch?' (matches props)':''}`:`MISMATCH! BoardConfig: ${bcPatch} vs Props: ${propPatch}`)

      :'PLATFORM_SECURITY_PATCH NOT SET — key derivation will fail!',

    ico:'calendar_today',

    details:[

      bcPatch?`BoardConfig: PLATFORM_SECURITY_PATCH := ${bcPatch}`:'BoardConfig: NOT SET!',

      bc['PLATFORM_VERSION']?`PLATFORM_VERSION := ${bc['PLATFORM_VERSION']}`:'PLATFORM_VERSION: not set',

      propPatch?`Props: ro.build.version.security_patch=${propPatch}`:'Props: no security_patch prop',

      bc['VENDOR_SECURITY_PATCH']?`VENDOR_SECURITY_PATCH := ${bc['VENDOR_SECURITY_PATCH']}`:'',

      !bcPatch?'Fix: Set PLATFORM_SECURITY_PATCH to match stock ROM (adb shell getprop ro.build.version.security_patch)':'',

      !patchMatch?'Fix: Make BoardConfig and prop file values match exactly':'',

    ].filter(Boolean)

  });

  // === STEP 9: Gatekeeper(s) — FROM ACTUAL INIT.RC ===

  if(gkSvcs.length>0){

    for(const svc of gkSvcs){

      const bc_=S.binaryChecks.find(b=>b.svc.name===svc.name);

      const binOk=bc_&&(bc_.status==='found'||bc_.status==='copied');

      steps.push({

        t:`Gatekeeper: ${svc.name}`,

        d:`${svc.file.split('/').pop()}:${svc.line} → ${svc.binary}`,

        st:binOk?'pass':'warn',

        dt:binOk?`Binary OK`:`Binary not found (optional for decrypt)`,

        ico:'lock_person',

        details:[`Service: ${svc.name}`,`Binary: ${svc.binary}`,`File: ${svc.file}:${svc.line}`,

          bc_?`Status: ${bc_.status} — ${bc_.detail}`:'']

      });

    }

  }else{

    steps.push({

      t:'Gatekeeper',d:'No gatekeeper service (optional — needed for lockscreen credentials)',

      st:'warn',dt:'Not found. Decrypt may still work if no lockscreen password is set.',

      ico:'lock_person',details:['Gatekeeper validates PIN/password during decrypt','If device has no lockscreen, decrypt works without it']

    });

  }

  // === STEP 10: Key Derivation (aggregate) ===

  const teeReady=teeSvcs.length>0&&S.binaryChecks.some(b=>b.svc.isTEE&&(b.status==='found'||b.status==='copied'));

  const kmReady=kmSvcs.length>0&&S.binaryChecks.some(b=>b.svc.isCrypto&&(b.status==='found'||b.status==='copied'));

  const patchReady=!!bcPatch;

  const blockers=[!teeReady&&'TEE daemon',!kmReady&&'Keymaster',!patchReady&&'Security patch'].filter(Boolean);

  steps.push({

    t:'Key Derivation',

    d:'TEE derives FBE/FDE keys via keymaster HAL',

    st:blockers.length===0?'pass':'fail',

    dt:blockers.length===0?'All prerequisites met — keys can be derived'

      :`BLOCKED by: ${blockers.join(', ')}`,

    ico:'key',

    details:[

      `TEE daemon: ${teeReady?'✓ Ready':'✗ Not ready'}`,

      `Keymaster: ${kmReady?'✓ Ready':'✗ Not ready'}`,

      `Patch level: ${patchReady?'✓ Set':'✗ Not set'}`,

      blockers.length>0?`Fix: resolve ${blockers.join(', ')} first`:'All clear for key derivation',

    ]

  });

  // === STEP 11: Mount /data ===

  const fbeReady=dataE.some(e=>e.fbe);

  const cryptoReady=chk('bc_crypto')&&chk('bc_fbe');

  const allOk=teeReady&&kmReady&&patchReady&&fbeReady;

  const mountBlockers=[!teeReady&&'TEE',!kmReady&&'Keymaster',!patchReady&&'Patch',!fbeReady&&'FBE flags',!cryptoReady&&'Crypto config'].filter(Boolean);

  steps.push({

    t:'Mount /data (Decrypted)',

    d:'Apply fscrypt policy → mount decrypted /data partition',

    st:allOk?'pass':'fail',

    dt:allOk?'✅ /data mounted with decryption — recovery can access user data'

      :`❌ FAILED — blocked by: ${mountBlockers.join(' + ')}`,

    ico:'folder_open',

    details:allOk?['Decryption chain complete','OrangeFox/TWRP can access /data']:

      [...mountBlockers.map(b=>`✗ ${b}`), 'Recovery will show encrypted /data or stuck at splash']

  });

  // Find first failure for blocking

  let ff=-1;

  for(let i=0;i<steps.length;i++){if(steps[i].st==='fail'){ff=i;break;}}

  let h=`<div class="section-title"><span class="mi">lock_open</span> Decryption Flow</div>

    <div class="body-small" style="color:var(--md-on-surface-variant);margin-bottom:20px">

      Built from <strong>actual init.rc services & triggers</strong> found in this device tree. Red = failure point.

    </div>`;

  for(let i=0;i<steps.length;i++){

    const s=steps[i];

    const blocked=ff>=0&&i>ff;

    const st=blocked?'skip':s.st;

    const ico=st==='pass'?'check_circle':st==='fail'?'cancel':st==='warn'?'warning':'block';

    const stColor=st==='pass'?'var(--md-success)':st==='fail'?'var(--md-error)':st==='warn'?'var(--md-warning)':'var(--md-outline)';

    const delay=i*0.08;

    const isLast=i===steps.length-1;

    h+=`<div class="flow-step" style="animation-delay:${delay}s">

      <div class="flow-indicator">

        <div class="flow-dot ${st}"><span class="mi" style="font-size:18px">${ico}</span></div>

        ${!isLast?`<div class="flow-connector ${st}"></div>`:''}

      </div>

      <div class="flow-body">

        <div class="flow-body-card ${st}">

          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap">

            <span class="mi" style="font-size:18px;color:${stColor}">${s.ico}</span>

            <span class="label-large">${esc(s.t)}</span>

            <span class="md-chip" style="font-size:10px;padding:2px 8px;background:${stColor}18;color:${stColor};border-color:${stColor}30">${st.toUpperCase()}</span>

          </div>

          <div class="body-small" style="color:var(--md-on-surface-variant)">${esc(s.d)}</div>

          <div class="path-text" style="margin-top:6px;color:${stColor}">${esc(s.dt)}</div>

          ${s.details&&s.details.length>0?`

          <details style="margin-top:8px">

            <summary class="label-small" style="cursor:pointer;color:var(--md-outline);display:flex;align-items:center;gap:4px">

              <span class="mi" style="font-size:14px">info</span> Details (${s.details.length})

            </summary>

            <div style="margin-top:6px;padding:8px 12px;border-radius:8px;background:color-mix(in srgb,${stColor} 4%,transparent);border:1px solid color-mix(in srgb,${stColor} 10%,transparent)">

              ${s.details.map(d=>`<div class="body-small mono" style="color:var(--md-on-surface-variant);padding:2px 0">${esc(d)}</div>`).join('')}

            </div>

          </details>`:''}

        </div>

      </div>

    </div>`;

  }

  if(ff>=0){

    h+=`<div class="issue-card issue-critical" style="margin-top:16px">

      <div class="title-small" style="color:var(--md-error)"><span class="mi" style="font-size:20px;vertical-align:middle">error</span> Decryption Chain Broken</div>

      <div class="body-small" style="margin-top:8px">Chain breaks at step <strong>${ff+1}: ${esc(steps[ff].t)}</strong></div>

      <div class="body-small" style="margin-top:4px;color:var(--md-error)">${esc(steps[ff].dt)}</div>

      ${steps[ff].details?`<div style="margin-top:8px;padding:10px 14px;border-radius:10px;background:color-mix(in srgb,var(--md-error) 6%,transparent)">

        ${steps[ff].details.map(d=>`<div class="body-small mono" style="color:var(--md-on-surface-variant)">${esc(d)}</div>`).join('')}

      </div>`:''}

      <div class="body-small" style="margin-top:8px;color:var(--md-on-surface-variant)">All ${steps.length-ff-1} subsequent steps are blocked. Fix this step first.</div>

    </div>`;

  }else if(steps.every(s=>s.st==='pass')){

    h+=`<div class="md-card" style="margin-top:16px;border-color:var(--md-success);background:color-mix(in srgb,var(--md-success) 6%,var(--md-surface-container))">

      <div class="title-small" style="color:var(--md-success)"><span class="mi" style="font-size:20px;vertical-align:middle">check_circle</span> Full Decryption Chain OK</div>

      <div class="body-small" style="margin-top:4px">All ${steps.length} steps pass. Decryption should work on this device tree.</div>

    </div>`;

  }

  document.getElementById('tab-flow').innerHTML=h;

}

function renderFilesTab(){

  let h=`<div class="files-layout">

    <div class="files-sidebar">

      <div class="label-large" style="margin-bottom:8px;color:var(--md-on-surface-variant)"><span class="mi" style="font-size:16px;vertical-align:middle">folder</span> Files</div>`;

  const cat=(l,f,ico)=>{if(!f.length)return '';

    let r=`<details ${['fstab','boardconfig','initrc'].includes(l.toLowerCase().replace(/\s/g,''))?'open':''}>

      <summary class="label-small" style="color:var(--md-outline);cursor:pointer;margin:8px 0 4px;display:flex;align-items:center;gap:4px"><span class="mi" style="font-size:14px">${ico}</span>${l} (${f.length})</summary>`;

    for(const fp of f)r+=`<div class="tree-item ${/fstab|boardconfig/i.test(fp)?'critical':''}" onclick="viewFile('${fp}')"><span class="mi" style="font-size:14px">description</span><span class="mono" style="font-size:11px;word-break:break-all">${fp.split('/').pop()}</span></div>`;

    return r+'</details>';};

  h+=cat('Fstab',S.files.fstab,'table_chart');

  h+=cat('BoardConfig',S.files.boardconfig,'settings');

  h+=cat('Init RC',S.files.initrc,'terminal');

  h+=cat('Properties',S.files.prop,'tune');

  h+=cat('Makefiles',S.files.mk,'build');

  h+=cat('SEPolicy',S.files.sepolicy,'security');

  h+=cat('XML',S.files.xml,'code');

  h+=cat('Config',S.files.conf,'settings_applications');

  h+=cat('Prebuilt',S.files.prebuilt.slice(0,40),'inventory');

  h+=cat('Other',S.files.other.slice(0,30),'draft');

  h+=`</div><div class="files-viewer"><div id="fileViewer" class="body-medium" style="color:var(--md-on-surface-variant);padding:20px">Select a file to view</div></div></div>`;

  document.getElementById('tab-files').innerHTML=h;

}

async function viewFile(path){

  const v=document.getElementById('fileViewer');

  v.innerHTML='<div style="display:flex;align-items:center;gap:8px;padding:20px"><div class="spinner" style="width:20px;height:20px"></div> Loading...</div>';

  const c=await fetchFileRaw(path);

  if(!c){v.innerHTML='<div style="color:var(--md-error);padding:20px">Failed to fetch</div>';return;}

  let h=`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--md-surface-container);border-bottom:1px solid var(--md-outline-variant);flex-wrap:wrap;gap:8px">

    <span class="path-text" style="color:var(--md-primary);font-weight:500">${esc(path)}</span>

    <button class="md-btn md-btn-tonal" style="padding:6px 14px;font-size:12px;flex-shrink:0" onclick="copyText(S.fileContents['${path}'])"><span class="mi" style="font-size:14px">content_copy</span></button></div>`;

  h+=`<pre class="code" style="max-height:500px;overflow-y:auto;border:none;border-radius:0;margin:0">`;

  c.split('\n').forEach((line,i)=>{

    let l=esc(line);

    l=l.replace(/(fileencryption|metadata_encryption|forceencrypt|wrappedkey|inlinecrypt|encryptable)/gi,'<span class="hl-r">$1</span>');

    l=l.replace(/(keymaster|gatekeeper|keymint|mobicore|trustonic|trustkernel|beanpod|microtrust|teei|isee|teed|mcDriverDaemon)/gi,'<span class="hl-r">$1</span>');

    l=l.replace(/(TW_INCLUDE_CRYPTO\w*|PLATFORM_\w+|VENDOR_SECURITY_\w+)/g,'<span class="hl-y">$1</span>');

    l=l.replace(/(service\s+\S+)/g,'<span class="hl-b">$1</span>');

    l=l.replace(/(\/vendor\/\S+|\/system\/\S+|\/dev\/\S+)/g,'<span class="hl-p">$1</span>');

    if(line.trim().startsWith('#'))l=`<span class="hl-cm">${l}</span>`;

    h+=`<span class="ln">${i+1}</span>${l}\n`;

  });

  h+=`</pre>`;v.innerHTML=h;

}

(function init(){

  initTheme();

  initTabs();

  initSwipe();

  const t=getToken();

  if(t){document.getElementById('tokenInput').value=t;updateTokenStatus(true);checkRateLimit();}

  else{updateTokenStatus(false);}

  if(location.hash){const u=decodeURIComponent(location.hash.slice(1));if(u.includes('github.com'))document.getElementById('repoInput').value=u;}

})();

</script>
